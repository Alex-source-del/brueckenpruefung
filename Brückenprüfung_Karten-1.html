<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brückenprüfung</title>
<style>
:root{--bg:#f0f4f8;--sur:#fff;--s2:#e8eef4;--ink:#16202b;--soft:#5b6b7c;--faint:#8a99a8;--line:#dde5ee;--acc:#0e7c66;--accs:#e3f3ef;--red:#c0392b;--reds:#fdecea;}
body.dark{--bg:#111518;--sur:#1a2028;--s2:#232c36;--ink:#e8eef4;--soft:#8fa3b3;--faint:#5a6e7e;--line:#2a3540;--acc:#13a386;--accs:#0e2e28;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
header{background:var(--acc);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
header h1{font-size:15px;font-weight:700;flex:1;}
.hbtn{border:0;background:rgba(255,255,255,.2);color:#fff;width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:14px;}
/* KOPF */
.kopf{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:var(--sur);border-bottom:1px solid var(--line);}
.kopf .full{grid-column:1/-1;}
.fl label{display:block;font-size:11px;color:var(--soft);margin-bottom:3px;font-weight:600;}
.fl input{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-family:inherit;font-size:13px;background:var(--s2);color:var(--ink);outline:none;}
.fl input:focus{border-color:var(--acc);}
/* GRID */
.wrap{overflow-x:auto;padding:8px 8px 0;}
.grid{display:flex;gap:5px;align-items:flex-start;min-width:min-content;}
/* STB SPALTE */
.stb{display:flex;flex-direction:column;gap:0;width:118px;flex-shrink:0;}
.stb-hdr{background:var(--acc);color:#fff;border-radius:7px 7px 0 0;padding:6px 8px;font-size:11.5px;font-weight:700;display:flex;align-items:center;}
.stb-hdr .sc{font-size:9px;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 5px;margin-left:5px;}
.stb-hdr .dx{border:0;background:rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:1px 5px;cursor:pointer;font-size:10px;margin-left:auto;}
/* KACHEL */
.ka{background:var(--sur);border:1.5px solid var(--line);cursor:pointer;transition:border-color .15s;flex:1;}
.ka.wid{background:#e8f5e9;border-color:#4caf50;}
.ka.wid .ka-name{color:#2e7d32;}
.ka.wid .ka-cnt{border-color:#4caf50;color:#2e7d32;}
.ka.wid.hat .ka-cnt{background:#4caf50;border-color:#4caf50;color:#fff;}
.ka.pf{background:#e3f2fd;border-color:#1e88e5;}
.ka.pf .ka-name{color:#1565c0;}
.ka.pf .ka-cnt{border-color:#1e88e5;color:#1565c0;}
.ka.pf.hat .ka-cnt{background:#1e88e5;border-color:#1e88e5;color:#fff;}
body.dark .ka.wid{background:#1b3a1f;border-color:#4caf50;}
body.dark .ka.pf{background:#0d2137;border-color:#1e88e5;}
.ka:hover{border-color:var(--acc);}
.ka.hat{border-color:var(--acc);background:var(--accs);}
.ka-inner{padding:6px 8px;display:flex;align-items:center;justify-content:space-between;}
.ka-name{font-size:10.5px;font-weight:700;color:var(--soft);}
.ka.hat .ka-name{color:var(--acc);}
.ka-cnt{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--faint);}
.ka.hat .ka-cnt{background:var(--acc);color:#fff;border-color:var(--acc);}
/* ÖFFNUNG KACHEL */
.oeka{background:#fff;border:1.5px solid #999;border-radius:7px;cursor:pointer;transition:border-color .15s;min-height:44px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.oeka:hover{border-color:var(--acc);}
.oeka.hat{border-color:var(--acc);background:var(--accs);}
body.dark .oeka{background:var(--sur);border-color:#555;}
.oeka:hover{border-color:var(--acc);}
.oeka.hat{border-color:var(--acc);background:var(--accs);}
.oe-hdr{padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.oe-name{font-size:10.5px;font-weight:700;color:var(--soft);}
.oeka.hat .oe-name{color:var(--acc);}
.oe-cnt{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--faint);}
.oeka.hat .oe-cnt{background:var(--acc);color:#fff;border-color:var(--acc);}

/* ADD ÖFFNUNG */
.add-oe{border:2px dashed var(--acc);background:var(--accs);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--acc);border-radius:7px;flex-shrink:0;}
.add-oe:hover{background:var(--acc);color:#fff;}
.stb-row{display:flex;align-items:stretch;gap:6px;}
/* STB BOTTOM */

/* ADD STB */
.add-stb{display:flex;justify-content:flex-start;gap:8px;margin-top:10px;padding-left:4px;}
.as{border:2px solid var(--acc);background:var(--accs);color:var(--acc);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
/* EXPORT */
.expbar{display:flex;gap:8px;padding:12px;flex-wrap:wrap;}
.expbar button{flex:1 1 auto;min-width:100px;}
.expbar button{flex:1;padding:11px;border:0;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.be{background:var(--acc);color:#fff;}
.bn{background:var(--red);color:#fff;}
/* OVERLAY */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.pan{background:var(--sur);border-radius:12px 12px 0 0;padding:18px;width:100%;max-width:100%;max-height:92vh;overflow-y:auto;}
.pbar{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 12px;}
.ptop{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ptop h3{font-size:15px;font-weight:700;color:var(--acc);flex:1;}
.bback{border:1px solid var(--line);background:var(--s2);color:var(--soft);padding:6px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;}
.sb{width:100%;padding:10px 13px;border:1px solid var(--line);background:var(--s2);border-radius:7px;text-align:left;cursor:pointer;font-size:13px;color:var(--ink);font-family:inherit;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.sb:hover,.sb.on{border-color:var(--acc);background:var(--accs);color:var(--acc);font-weight:600;}
.uc{background:var(--acc);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;}
.pan textarea{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px;font-family:inherit;font-size:14px;background:var(--s2);color:var(--ink);outline:none;height:90px;resize:none;margin-top:6px;}
.pbtns{display:flex;gap:8px;margin-top:12px;}
.pbtns button{flex:1;padding:11px;border-radius:7px;border:0;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;}
.ps{background:var(--acc);color:#fff;}
.pc{background:var(--s2);color:var(--soft);border:1px solid var(--line)!important;}
.irow{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.irow label{font-size:13px;color:var(--soft);min-width:90px;font-weight:600;}
.irow input{flex:1;border:2px solid var(--acc);border-radius:7px;padding:12px;font-size:20px;font-weight:700;background:var(--s2);color:var(--ink);outline:none;text-align:center;}
.irow span{font-size:11px;color:var(--faint);}
.sitem{background:var(--s2);border:1px solid var(--line);border-radius:7px;padding:9px;margin-bottom:7px;}
.sitem .sr{display:flex;align-items:center;gap:8px;}
.sitem span{flex:1;font-size:13px;}
.sitem button{border:0;background:var(--reds);color:var(--red);border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;}
.sitem img{max-width:100%;max-height:80px;border-radius:6px;cursor:zoom-in;margin-top:6px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;z-index:300;display:none;}
</style>
</head>
<body>
<header>
  <div style="width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;flex-shrink:0;">BP</div>
  <h1>Brückenprüfung</h1>
  <button class="hbtn" id="darkBtn">☀️</button>
</header>
<div class="kopf">
  <div class="fl"><label>Strecke</label><input id="f_str" placeholder="z.B. 5900"></div>
  <div class="fl"><label>Kilometer</label><input id="f_km" placeholder="z.B. 66,092"></div>
  <div class="fl full"><label>Brückenname</label><input id="f_br" placeholder="z.B. EÜ Musterstraße"></div>
  <div class="fl"><label>Datum</label><input id="f_dat" type="date"></div>
  <div class="fl"><label>Prüfer</label><input id="f_pr" placeholder="Name"></div>
</div>
<div style="padding:10px 12px 0;position:relative;">
  <input id="bauSearch" placeholder="🔍 Bauteil suchen (z.B. STB 2 Ö3)" style="width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 12px;font-family:inherit;font-size:13px;background:var(--s2);color:var(--ink);outline:none;">
  <div id="bauSearchResults" style="position:absolute;left:12px;right:12px;top:100%;background:var(--sur);border:1px solid var(--line);border-radius:0 0 7px 7px;box-shadow:0 4px 10px rgba(0,0,0,.15);z-index:40;display:none;max-height:220px;overflow-y:auto;"></div>
</div>
<div class="wrap"><div class="grid" id="mainGrid"></div></div>
<div id="stbBtnArea" style="padding:0 12px 12px;"></div>
<div class="expbar">
  <button class="be" onclick="doExport(true)">📄🖼 Mit Bildern</button>
  <button style="border:0;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#5b6b7c;color:#fff;" onclick="doExport(false)">📄 Nur Dokument</button>
  <button style="border:0;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#1565c0;color:#fff;" onclick="downloadFotos()">🖼 Nur Bilder</button>
  <button class="bn" onclick="doNew()">🗑 Neu</button>
</div>

<!-- BAUTEILE PANEL -->
<div class="ov" id="ovBau">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="g('ovBau').classList.remove('open')">← Zurück</button>
      <h3 id="bauTitle">Bauteile</h3>
    </div>
    <div id="bauList"></div>
  </div>
</div>

<!-- SCHÄDEN PANEL -->
<div class="ov" id="ovSch">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="g('ovSch').classList.remove('open');if(curBauKey)openBau(curBauKey,curBauTitle,lastUgr);">← Zurück</button>
      <h3 id="schTitle">Schäden</h3>
    </div>
    <div id="schUgrSwitch" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
    <div id="schList"></div>
    <button onclick="openMod()" style="width:100%;padding:9px;border:1.5px dashed var(--acc);background:transparent;color:var(--acc);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;">+ Schaden hinzufügen</button>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">
  </div>
</div>

<!-- SCHADEN MODAL -->
<div class="ov" id="ovMod">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="g('ovMod').classList.remove('open');">← Zurück</button>
      <h3>Schaden erfassen</h3>
    </div>
    <div id="mTyp"></div>
    <div id="mArt" style="display:none;margin-top:10px;"></div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);">
      <div id="mVerortung" style="font-size:13px;font-weight:700;color:var(--acc);padding:8px 10px;background:var(--accs);border-radius:7px;margin-bottom:8px;"></div>
      <label style="font-size:12px;color:var(--soft);font-weight:600;">📝 Beschreibung</label>
      <textarea id="mDesc" placeholder="Beschreibung..."></textarea>
    </div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);">
      <label style="font-size:12px;color:var(--soft);font-weight:600;">📷 Foto</label>
      <div onclick="takeMFoto()"  style="border:1.5px dashed var(--line);border-radius:7px;padding:9px;text-align:center;cursor:pointer;color:var(--faint);font-size:13px;margin-top:5px;">📷 Foto aufnehmen</div>
      <input type="file" id="mFoto" accept="image/*" capture="environment" style="display:none">
      <div id="mFotoLeiste" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;"></div>
    </div>
    <div class="pbtns">
      <button class="pc" onclick="clearResumeState();g('ovMod').classList.remove('open');">Schließen</button>
      <button class="ps" onclick="saveS()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FOTO PANEL -->
<div class="ov" id="ovFoto">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <h3 id="fotoTitle" style="flex:1;">Fotos</h3>
      <span id="fpCount" style="font-size:12px;color:var(--soft);margin-right:10px;">0/10</span>
    </div>
    <div id="fpVerortung" style="font-size:13px;font-weight:700;color:var(--acc);padding:8px 10px;background:var(--accs);border-radius:7px;margin-bottom:12px;"></div>
    <div id="fpLeiste" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:80px;"></div>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">
    <button onclick="fpTakeFoto()" id="fotoAddBtn" style="width:100%;padding:12px;border:1.5px dashed var(--acc);background:transparent;color:var(--acc);border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px;">📷 Foto aufnehmen</button>
    <button onclick="closeFotoPanel()" style="width:100%;padding:12px;background:var(--acc);color:#fff;border:0;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">✓ OK</button>
  </div>
</div>
<script>
// DATA
var SC = {
  'Beton':['Diagonale Risse','Horizontale Risse','Vertikale Risse','Betonabplatzung','Betonabplatzung m. freilieg. Bewehrung','Aussinterungen','Abschalung','Mörtelfugenschäden','Offene Fugen','Steinausbruch','Steinabplatzung','Versatz','Verschmutzung','Vegetation','Abnutzung','Lose/fehlende Verbindungsmittel'],
  'Mauerwerk':['Diagonale Risse','Horizontale Risse','Vertikale Risse','Aussinterungen','Mörtelfugenschäden','Offene Fugen','Steinausbruch','Steinabplatzung','Versatz','Feuchtigkeitsschäden','Vegetation','Verschmutzung','Abnutzung','Lose/fehlende Verbindungsmittel'],
  'Stahl':['Verformung/Verschiebung/Verkippung','Korrosion','Korrosionsschutzschäden','Entwässerung','Verschmutzung','Abnutzung','Lose/fehlende Verbindungsmittel'],
  'Gew.Beton':['Diagonale Risse','Horizontale Risse','Vertikale Risse','Betonabplatzung m. freilieg. Bewehrung','Aussinterungen','Mörtelfugenschäden','Offene Fugen','Versatz','Vegetation','Verschmutzung','Abnutzung'],
  'Gew.Mauerwk':['Diagonale Risse','Horizontale Risse','Vertikale Risse','Aussinterungen','Mörtelfugenschäden','Offene Fugen','Steinausbruch','Steinabplatzung','Versatz','Feuchtigkeitsschäden','Vegetation','Verschmutzung','Abnutzung']
};
var VL = {
  'Diagonale Risse':[{l:'Rissbreite+Länge',t:'Diagonal rissig bis {0}mm, Risslänge:{1}cm',i:[{l:'Rissbreite',u:'mm'},{l:'Risslänge',u:'cm'}]}],
  'Horizontale Risse':[{l:'Rissbreite+Länge',t:'Horizontal rissig bis {0}mm, Risslänge:{1}cm',i:[{l:'Rissbreite',u:'mm'},{l:'Risslänge',u:'cm'}]}],
  'Vertikale Risse':[{l:'Rissbreite+Länge',t:'Vertikal rissig bis {0}mm, Risslänge:{1}cm',i:[{l:'Rissbreite',u:'mm'},{l:'Risslänge',u:'cm'}]}],
  'Betonabplatzung':[{l:'LxBxT',t:'Betonabplatzung L:{0}cm B:{1}cm T:{2}cm',i:[{l:'Länge',u:'cm'},{l:'Breite',u:'cm'},{l:'Tiefe',u:'cm'}]}],
  'Betonabplatzung m. freilieg. Bewehrung':[{l:'LxBxT',t:'Betonabplatzung m.freilieg.Bewehrung L:{0}cm B:{1}cm T:{2}cm',i:[{l:'Länge',u:'cm'},{l:'Breite',u:'cm'},{l:'Tiefe',u:'cm'}]}],
  'Aussinterungen':[{l:'Trocken',t:'Aussinterungen, trocken',i:[]},{l:'Feucht',t:'Aussinterungen, feucht',i:[]}],

  'Korrosionsschutzschäden':[{l:'Vereinzelt',t:'Korrosionsschutzschaden vereinzelt',i:[]},{l:'Stellenweise',t:'Korrosionsschutzschaden stellenweise',i:[]},{l:'Mehrfach',t:'Korrosionsschutzschaden mehrfach',i:[]}],
  'Verformung/Verschiebung/Verkippung':[{l:'Verformung',t:'Verformung Maß:{0}cm',i:[{l:'Maß',u:'cm'}]},{l:'Verschiebung',t:'Verschiebung Maß:{0}cm',i:[{l:'Maß',u:'cm'}]},{l:'Verkippung',t:'Verkippung Maß:{0}cm',i:[{l:'Maß',u:'cm'}]}],
  'Versatz':[{l:'Maß',t:'Versatz Maß:{0}cm',i:[{l:'Maß',u:'cm'}]}],
  'Steinausbruch':[{l:'LxBxT',t:'Steinausbruch L:{0}cm B:{1}cm T:{2}cm',i:[{l:'Länge',u:'cm'},{l:'Breite',u:'cm'},{l:'Tiefe',u:'cm'}]}],
  'Steinabplatzung':[{l:'LxBxT',t:'Steinabplatzung L:{0}cm B:{1}cm T:{2}cm',i:[{l:'Länge',u:'cm'},{l:'Breite',u:'cm'},{l:'Tiefe',u:'cm'}]}],
  'Abschalung':[{l:'LxBxT',t:'Abschalung L:{0}cm B:{1}cm T:{2}cm',i:[{l:'Länge',u:'cm'},{l:'Breite',u:'cm'},{l:'Tiefe',u:'cm'}]}],
  'Mörtelfugenschäden':[{l:'Bestätigen',t:'Mörtelfugenschäden',i:[]}],
  'Offene Fugen':[{l:'Festgestellt',t:'Offene Fugen festgestellt',i:[]}],
  'Feuchtigkeitsschäden':[{l:'Nass',t:'Feuchtigkeitsschaden nass',i:[]},{l:'Feucht',t:'Feuchtigkeitsschaden feucht',i:[]}],
  'Entwässerung':[{l:'Verstopft',t:'Entwässerung verstopft',i:[]},{l:'Beschädigt',t:'Entwässerung beschädigt',i:[]},{l:'Fehlend',t:'Entwässerung fehlend',i:[]}],
  'Vegetation':[{l:'Festgestellt',t:'Vegetation festgestellt',i:[]}],
  'Verschmutzung':[{l:'Festgestellt',t:'Verschmutzung festgestellt',i:[]}],
  'Abnutzung':[{l:'Festgestellt',t:'Abnutzung festgestellt',i:[]}],
  'Lose/fehlende Verbindungsmittel':[{l:'Lose',t:'Lose Verbindungsmittel festgestellt',i:[]},{l:'Fehlend',t:'Fehlende Verbindungsmittel festgestellt',i:[]},{l:'Lose+Fehlend',t:'Lose und fehlende Verbindungsmittel festgestellt',i:[]}]
};
var W_UGR = ['Widerlager Beton','Widerlager Mauerwerk','Flügel Beton li','Flügel Beton re','Flügel Mauerwk li','Flügel Mauerwk re','Kammerwand vorne','Kammerwand sl li','Kammerwand sl re','Kammerwand hinten','Auflagerbank'];
var OE_B = ['Fahrbahnplatte Beton','Fahrbahnplatte Beton Untersicht','Untersicht','Kappe li','Kappe re','Radweg li','Radweg re','Schotterwand li','Schotterwand re','Geländer li','Geländer re','Entwässerung','Lager','Fugen'];
var OE_S = ['Fahrbahnplatte Stahl','Fahrbahnplatte Stahl Untersicht','Hauptträger','Querträger','Längsträger','Längsrippen','Querrippen','Beulstreifen','Konsole','Untersicht','Randweg','Geländer li','Geländer re','Entwässerung','Lager','Fugen'];
var OE_GB = ['Gewölbe Beton Untersicht','Stirnwand li','Stirnwand re','Kappe li','Kappe re','Radweg li','Radweg re','Schotterwand li','Schotterwand re','Geländer li','Geländer re','Entwässerung','Lager','Fugen'];
var OE_GM = ['Gewölbe Mauerwerk Untersicht','Stirnmauer li','Stirnmauer re','Kappe li','Kappe re','Radweg li','Radweg re','Schotterwand li','Schotterwand re','Geländer li','Geländer re','Entwässerung','Lager','Fugen'];
var PF_UGR = ['Pfeilerschaft','Pfeilerköpfe','Auflagerbank'];
var UT = {'Widerlager Beton':'Beton','Widerlager Mauerwerk':'Mauerwerk','Flügel Beton li':'Beton','Flügel Beton re':'Beton','Flügel Mauerwk li':'Mauerwerk','Flügel Mauerwk re':'Mauerwerk'};

// STATE
var stbs=[], nxtId=1, dat={};
var curKey=null, curBauKey=null, curBauTitle='', curSchTitle='', lastUgr=[];
var curTyp='Beton', curArt='', curVorl=null;
var fotoCounter=0, curFotoIdx=-1;
var mPendingFotos=[];

function g(id){return document.getElementById(id);}
function toast(m){var t=g('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ============================================================
// AUTOSAVE
// ============================================================
function autoSave(){
  try{
    localStorage.setItem('bp_dat',JSON.stringify(dat));
    localStorage.setItem('bp_stbs',JSON.stringify(stbs));
    localStorage.setItem('bp_nxtId',''+nxtId);
    localStorage.setItem('bp_fc',''+fotoCounter);
    var k={str:g('f_str').value,km:g('f_km').value,br:g('f_br').value,dat:g('f_dat').value,pr:g('f_pr').value};
    localStorage.setItem('bp_kopf',JSON.stringify(k));
  }catch(e){}
}
function loadSaved(){
  try{
    var d=localStorage.getItem('bp_dat');if(d)dat=JSON.parse(d);
    var s=localStorage.getItem('bp_stbs');if(s)stbs=JSON.parse(s);
    var n=localStorage.getItem('bp_nxtId');if(n)nxtId=parseInt(n);
    var fc=localStorage.getItem('bp_fc');if(fc)fotoCounter=parseInt(fc);
    var k=localStorage.getItem('bp_kopf');
    if(k){k=JSON.parse(k);
      if(k.str)g('f_str').value=k.str;if(k.km)g('f_km').value=k.km;
      if(k.br)g('f_br').value=k.br;if(k.dat)g('f_dat').value=k.dat;
      if(k.pr)g('f_pr').value=k.pr;
    }
  }catch(e){}
}

// ============================================================
// RENDER GRID
// ============================================================
function render(){
  var grid=g('mainGrid');grid.innerHTML='';
  if(!stbs.length){
    var empty=document.createElement('div');
    empty.style.cssText='padding:30px 20px;text-align:center;color:var(--soft);';
    empty.innerHTML='<div style="font-size:14px;margin-bottom:14px;">Noch kein Bauwerk angelegt.</div>'+
      '<button class="ps" style="padding:12px 22px;font-size:14px;" onclick="startBauwerk()">🏗 Bauwerk erstellen</button>';
    grid.appendChild(empty);
    return;
  }
  stbs.forEach(function(stb,si){
    var col=document.createElement('div');col.className='col';
    var tot=cntStb(stb);
    var hdr=document.createElement('div');hdr.className='col-hdr';
    hdr.innerHTML='STB '+(si+1)+(tot>0?' <span class="sc">'+tot+'</span>':'')
      +(stbs.length>1?' <button class="dx" onclick="rmStb('+stb.id+')">✕</button>':'');
    col.appendChild(hdr);
    var row=document.createElement('div');row.className='stb-row';
    if(stb.oeff<5){
      var ab=document.createElement('button');ab.className='add-oe';ab.textContent='+Öff';
      (function(sid){ab.onclick=function(){addOeff(sid);};})(stb.id);
      row.appendChild(ab);
    }
    var inner=document.createElement('div');inner.style.cssText='display:flex;flex-direction:column;gap:6px;flex:1;';
    inner.appendChild(mkKa('stb'+stb.id+'_w2','W2',W_UGR,'wid',stb.id));
    for(var i=stb.oeff;i>=1;i--){
      inner.appendChild(mkOe(stb,i));
      if(i>1)inner.appendChild(mkKa('stb'+stb.id+'_pf'+(i-1),'Pf '+(i-1),PF_UGR,'pf',stb.id));
    }
    inner.appendChild(mkKa('stb'+stb.id+'_w1','W1',W_UGR,'wid',stb.id));
    row.appendChild(inner);col.appendChild(row);grid.appendChild(col);
  });
  var sa=g('stbBtnArea');if(sa){sa.innerHTML='';
    if(stbs.length<5){var ab=document.createElement('button');ab.className='as';ab.textContent='+ STB';ab.onclick=addStb;sa.appendChild(ab);}
  }
}

function cntKey(key,ugr){var n=0;ugr.forEach(function(u){n+=(dat[key+'___'+u]||[]).length;});return n;}
function cntStb(stb){
  var n=cntKey('stb'+stb.id+'_w1',W_UGR)+cntKey('stb'+stb.id+'_w2',W_UGR);
  for(var i=1;i<=stb.oeff;i++){n+=cntKey('stb'+stb.id+'_oe'+i,getUgr('stb'+stb.id+'_oe'+i));if(i<stb.oeff)n+=cntKey('stb'+stb.id+'_pf'+i,PF_UGR);}
  return n;
}
function getUgr(k){var t=dat['__t_'+k]||'';return t==='Stahl'?OE_S:t==='Gew.Beton'?OE_GB:t==='Gew.Mauerwk'?OE_GM:OE_B;}

function mkKa(key,label,ugr,typ){
  var tot=cntKey(key,ugr);
  var bc=typ==='wid'?'#4caf50':typ==='pf'?'#1e88e5':'#9e9e9e';
  var bg=typ==='wid'?'#e8f5e9':typ==='pf'?'#e3f2fd':'#fff';
  var tc=typ==='wid'?'#2e7d32':typ==='pf'?'#1565c0':'#444';
  var d=document.createElement('div');
  d.style.cssText='background:'+bg+';border:2px solid '+bc+';border-radius:8px;min-height:58px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer;';
  d.innerHTML='<div style="padding:10px 12px;display:flex;align-items:center;justify-content:space-between;">'
    +'<span style="font-size:14px;font-weight:700;color:'+tc+';">'+label+'</span>'
    +'<div style="width:34px;height:34px;border-radius:50%;border:2px solid '+bc+';display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:'+(tot>0?'#fff':tc)+';background:'+(tot>0?bc:'transparent')+'">'+(tot>0?tot:'+')+'</div>'
    +'</div>';
  d.setAttribute('data-key',key);d.setAttribute('data-label',label);d.setAttribute('data-ugr',typ);
  d.onclick=function(){openBau(this.getAttribute('data-key'),this.getAttribute('data-label'),ugr);};
  return d;
}

function mkOe(stb,i){
  var key='stb'+stb.id+'_oe'+i;
  var ot=dat['__t_'+key]||'';
  var ugr=getUgr(key);
  var tot=cntKey(key,ugr);
  var d=document.createElement('div');
  d.style.cssText='background:#fff;border:2px solid '+(tot>0?'var(--acc)':'#9e9e9e')+';border-radius:8px;min-height:58px;box-shadow:0 1px 3px rgba(0,0,0,.1);';
  var hdr=document.createElement('div');
  hdr.style.cssText='padding:10px 12px;display:flex;align-items:center;gap:6px;';
  var main=document.createElement('div');
  main.style.cssText='display:flex;align-items:center;flex:1;cursor:pointer;';
  main.innerHTML='<span style="font-size:14px;font-weight:700;color:#444;">Ö'+i+(ot?' <small style="color:var(--acc);font-size:10px;margin-left:4px;">'+ot+'</small>':'')+'</span>'
    +'<div style="margin-left:auto;width:34px;height:34px;border-radius:50%;border:2px solid '+(tot>0?'var(--acc)':'#9e9e9e')+';display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:'+(tot>0?'#fff':'#757575')+';background:'+(tot>0?'var(--acc)':'transparent')+'">'+(tot>0?tot:'+')+'</div>';
  main.setAttribute('data-key',key);main.setAttribute('data-i',i);
  main.onclick=function(){openBau(this.getAttribute('data-key'),'Öffnung '+this.getAttribute('data-i'),getUgr(this.getAttribute('data-key')));};
  var del=document.createElement('button');del.textContent='✕';
  del.style.cssText='border:0;background:#ffebee;color:#c62828;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;';
  (function(sid,ii){del.onclick=function(e){e.stopPropagation();if(!confirm('Öffnung löschen?'))return;delOeff(sid,ii);};})(stb.id,i);
  hdr.appendChild(main);hdr.appendChild(del);d.appendChild(hdr);
  return d;
}

function startBauwerk(){
  stbs=[{id:1,oeff:1}];nxtId=2;
  render();toast('Bauwerk erstellt ✓');
}

function addOeff(sid){stbs.forEach(function(s){if(s.id===sid&&s.oeff<5)s.oeff++;});render();}
function delOeff(sid,i){
  stbs.forEach(function(s){if(s.id===sid&&s.oeff>1)s.oeff--;});
  Object.keys(dat).forEach(function(k){if(k.indexOf('stb'+sid+'_oe'+i+'___')===0)delete dat[k];});
  render();
}
function addStb(){
  if(stbs.length>=5)return;
  var src=stbs[0];var ns={id:nxtId++,oeff:src.oeff};stbs.push(ns);
  for(var i=1;i<=src.oeff;i++){var t=dat['__t_stb'+src.id+'_oe'+i];if(t)dat['__t_stb'+ns.id+'_oe'+i]=t;}
  render();toast('STB hinzugefügt ✓');
}
function rmStb(id){
  if(!confirm('STB entfernen?'))return;
  stbs=stbs.filter(function(s){return s.id!==id;});
  Object.keys(dat).forEach(function(k){if(k.indexOf('stb'+id+'_')===0)delete dat[k];});
  render();
}

// ============================================================
// BAUTEILE PANEL
// ============================================================
function openBau(key,title,ugr){
  curBauKey=key;curBauTitle=title;lastUgr=ugr||W_UGR;
  g('bauTitle').textContent=title;
  g('bauList').innerHTML='';
  var isOe=key.indexOf('_oe')>-1&&key.indexOf('___')===-1;
  if(isOe){
    var curOt=dat['__t_'+key]||'';
    var ugr2=getUgr(key);
    var tw=document.createElement('div');tw.style.marginBottom='12px';
    var tl=document.createElement('div');tl.style.cssText='font-size:12px;color:var(--soft);font-weight:600;margin-bottom:6px;';tl.textContent='Überbautyp:';
    tw.appendChild(tl);
    var tr=document.createElement('div');tr.style.cssText='display:flex;flex-wrap:wrap;gap:6px;';
    ['Beton','Stahl','Gew.Beton','Gew.Mauerwk'].forEach(function(t){
      var b=document.createElement('button');b.className='sb'+(curOt===t?' on':'');b.textContent=t;
      b.style.cssText='border:1px solid '+(curOt===t?'var(--acc)':'var(--line)')+';border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;background:'+(curOt===t?'var(--acc)':'transparent')+';color:'+(curOt===t?'#fff':'var(--soft)')+';';
      (function(typ){b.onclick=function(){dat['__t_'+key]=typ;render();openBau(key,title,getUgr(key));};})(t);
      tr.appendChild(b);
    });
    tw.appendChild(tr);
    if(curOt){
      var applyAll=document.createElement('button');
      applyAll.textContent='📋 Auf alle Öffnungen dieses STB anwenden';
      applyAll.style.cssText='margin-top:8px;border:0;background:none;color:var(--acc);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;padding:0;display:block;';
      applyAll.onclick=function(){
        var m=key.match(/^(stb\d+)_oe(\d+)$/);
        if(!m)return;
        var stbPrefix=m[1],stbIdNum=parseInt(m[1].replace('stb',''),10);
        var stb=stbs.filter(function(s){return s.id===stbIdNum;})[0];
        if(!stb)return;
        for(var i=1;i<=stb.oeff;i++){dat['__t_'+stbPrefix+'_oe'+i]=curOt;}
        render();openBau(key,title,getUgr(key));
        toast('Überbautyp auf alle Öffnungen übernommen ✓');
      };
      tw.appendChild(applyAll);
    }
    var hr=document.createElement('hr');hr.style.cssText='border:0;border-top:1px solid var(--line);margin:10px 0;';
    g('bauList').appendChild(tw);g('bauList').appendChild(hr);
    ugr=ugr2;
  }
  var shown={};
  ugr.forEach(function(u){
    var isRL=/ (li|re)$/.test(u);var base=isRL?u.replace(/ (li|re)$/,''):null;
    if(isRL){
      if(shown[base])return;shown[base]=true;
      var c=(dat[key+'___'+base+' li']||[]).length+(dat[key+'___'+base+' re']||[]).length;
      var b=document.createElement('button');b.className='sb'+(c>0?' on':'');
      b.innerHTML=base+' li/re'+(c>0?'<span class="uc">'+c+'</span>':'');
      (function(bk,bn,t){b.onclick=function(){openReliSel(bk,bn,t);};})(key,base,title);
      g('bauList').appendChild(b);
    } else {
      var k=key+'___'+u;var c=(dat[k]||[]).length;
      var b=document.createElement('button');b.className='sb'+(c>0?' on':'');
      b.innerHTML=u+(c>0?'<span class="uc">'+c+'</span>':'');
      (function(k2,u2,t2){b.onclick=function(){openSch(k2,u2,t2);};})(k,u,title);
      g('bauList').appendChild(b);
    }
  });
  showPanel('ovBau');
}

function openReliSel(baseKey,baseName,bereich){
  g('bauTitle').textContent=bereich+' / '+baseName;
  g('bauList').innerHTML='';
  var wrap=document.createElement('div');wrap.style.cssText='display:flex;gap:10px;';
  ['li','re'].forEach(function(side){
    var fk=baseKey+'___'+baseName+' '+side;
    var c=(dat[fk]||[]).length;
    var b=document.createElement('button');
    b.style.cssText='flex:1;padding:20px 10px;border:2px solid '+(c>0?'var(--acc)':'var(--line)')+';border-radius:10px;background:'+(c>0?'var(--accs)':'var(--s2)')+';cursor:pointer;font-size:16px;font-weight:700;font-family:inherit;color:var(--ink);text-align:center;';
    b.innerHTML=(side==='li'?'← Links':'Rechts →')+(c>0?'<br><span style="font-size:12px;color:var(--acc);">'+c+' Schäden</span>':'');
    (function(k,n,r){b.onclick=function(){openSch(k,n,r);};})(fk,baseName+' '+side,bereich);
    wrap.appendChild(b);
  });
  g('bauList').appendChild(wrap);
  showPanel('ovBau');
}

// ============================================================
// SCHÄDEN PANEL
// ============================================================
function openSch(key,ugr,bereich){
  curKey=key;curSchTitle=bereich+' / '+ugr;
  g('schTitle').textContent=curSchTitle;
  renderUgrSwitch(ugr);
  renderSch();
  showPanel('ovSch');
}

function renderUgrSwitch(activeUgr){
  var box=g('schUgrSwitch');if(!box)return;
  box.innerHTML='';
  if(!curBauKey||!lastUgr||lastUgr.length<2)return;
  // Flatten li/re pairs into individual chips so switching is a single tap
  lastUgr.forEach(function(u){
    var chip=document.createElement('button');
    chip.textContent=u;
    var isActive=(u===activeUgr);
    chip.style.cssText='border:1.5px solid '+(isActive?'var(--acc)':'var(--line)')+';background:'+(isActive?'var(--acc)':'var(--s2)')+';color:'+(isActive?'#fff':'var(--soft)')+';border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;';
    (function(uu){chip.onclick=function(){if(uu===activeUgr)return;switchUgr(uu);};})(u);
    box.appendChild(chip);
  });
}

function switchUgr(u){
  var key=curBauKey+'___'+u;
  openSch(key,u,curBauTitle);
}

function renderSch(){
  var items=dat[curKey]||[];
  var el=g('schList');el.innerHTML='';
  if(!items.length){
    el.innerHTML='<p style="color:var(--faint);font-size:13px;font-style:italic;padding:6px 0;">Keine Schäden</p>';
    return;
  }
  items.forEach(function(it,i){
    var div=document.createElement('div');div.className='sitem';
    // Location
    if(it.loc){
      var lh=document.createElement('div');
      lh.style.cssText='font-size:11px;font-weight:700;color:var(--acc);padding:4px 8px;background:var(--accs);border-radius:5px;margin-bottom:6px;';
      lh.textContent=it.loc;div.appendChild(lh);
    }
    // Text + delete
    var sr=document.createElement('div');sr.className='sr';
    var txt=document.createElement('div');txt.style.cssText='flex:1;font-size:13px;line-height:1.7;';
    var lines=(it.d||'').split('\n').map(function(p){return p.trim();}).filter(function(p){return p;});
    txt.innerHTML=lines.map(function(p){return '<div>'+(p[0]==='-'?p:'- '+p)+'</div>';}).join('');
    var del=document.createElement('button');del.textContent='✕';del.className='dx';
    (function(ii){del.onclick=function(){delS(ii);};})(i);
    sr.appendChild(txt);sr.appendChild(del);div.appendChild(sr);
    // Copy to sibling components of the same type (opt-in, description text only — no photos)
    var bMatch=curKey.match(/^(stb\d+)_(w[12]|oe\d+|pf\d+)___(.*)$/);
    if(bMatch){
      var stbPrefix2=bMatch[1],bauteilPart=bMatch[2],ugrSuffix2=bMatch[3];
      var stbIdNum2=parseInt(stbPrefix2.replace('stb',''),10);
      var stbObj=stbs.filter(function(s){return s.id===stbIdNum2;})[0];
      var siblingKeys=[],label='';
      if(stbObj){
        if(/^w[12]$/.test(bauteilPart)){
          label='📋 Auf anderes Widerlager übernehmen';
          siblingKeys=['w1','w2'].filter(function(x){return x!==bauteilPart;}).map(function(x){return stbPrefix2+'_'+x;});
        } else if(/^oe\d+$/.test(bauteilPart)){
          label='📋 In andere Öffnungen übernehmen';
          var curOeN=parseInt(bauteilPart.replace('oe',''),10);
          for(var j=1;j<=stbObj.oeff;j++){if(j!==curOeN)siblingKeys.push(stbPrefix2+'_oe'+j);}
        } else if(/^pf\d+$/.test(bauteilPart)){
          label='📋 Auf andere Pfeiler übernehmen';
          var curPfN=parseInt(bauteilPart.replace('pf',''),10);
          var pfCount=stbObj.oeff-1;
          for(var k=1;k<=pfCount;k++){if(k!==curPfN)siblingKeys.push(stbPrefix2+'_pf'+k);}
        }
      }
      if(siblingKeys.length){
        var cp=document.createElement('button');
        cp.textContent=label;
        cp.style.cssText='border:0;background:none;color:var(--acc);font-size:11.5px;text-decoration:underline;cursor:pointer;font-family:inherit;padding:0;margin-top:4px;display:block;';
        (function(it2,sKeys,ugr3){
          cp.onclick=function(){
            var count=0;
            sKeys.forEach(function(sk){
              var targetKey=sk+'___'+ugr3;
              if(!dat[targetKey])dat[targetKey]=[];
              dat[targetKey].push({d:it2.d,fotos:[],loc:it2.loc,t:it2.t,a:it2.a});
              count++;
            });
            autoSave();
            toast('Auf '+count+' weitere Stelle(n) übernommen ✓');
          };
        })(it,siblingKeys,ugrSuffix2);
        div.appendChild(cp);
      }
    }
    // Fotos
    var fotos=it.fotos||[];
    if(fotos.length){
      var leiste=document.createElement('div');
      leiste.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;';
      fotos.forEach(function(f,fi){
        var img=document.createElement('img');img.src=f.data;
        img.style.cssText='height:80px;border-radius:6px;cursor:pointer;border:2px solid var(--acc);';
        (function(fi2){img.onclick=function(){openGallery(i,fi2);};})(fi);
        leiste.appendChild(img);
      });
      div.appendChild(leiste);
    }
    // Foto button
    if(fotos.length<10){
      var fb=document.createElement('button');
      fb.style.cssText='margin-top:8px;width:100%;padding:8px;border:1.5px dashed var(--acc);background:transparent;color:var(--acc);border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;';
      fb.innerHTML='📷 '+(fotos.length>0?'Weiteres Foto':'Fotos hinzufügen');
      (function(ii){fb.onclick=function(){openFotoPanel(ii);};})(i);
      div.appendChild(fb);
    }
    el.appendChild(div);
  });
}

function delS(i){if(dat[curKey])dat[curKey].splice(i,1);renderSch();render();autoSave();}

// ============================================================
function renderMFotoLeiste(){
  var leiste=g('mFotoLeiste');if(!leiste)return;
  leiste.innerHTML='';
  mPendingFotos.forEach(function(f,fi){
    var wrap=document.createElement('div');wrap.style.cssText='position:relative;display:inline-block;';
    var img=document.createElement('img');img.src=f.data;
    img.style.cssText='height:60px;border-radius:6px;border:2px solid var(--acc);display:block;';
    var lbl=document.createElement('div');lbl.style.cssText='text-align:center;font-size:10px;color:var(--soft);margin-top:2px;';lbl.textContent='Foto '+f.nr;
    var del=document.createElement('button');
    del.style.cssText='position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;border:0;background:#e53935;color:#fff;font-size:11px;cursor:pointer;line-height:20px;padding:0;';
    del.textContent='✕';
    (function(fi2){del.onclick=function(e){
      e.stopPropagation();
      mPendingFotos.splice(fi2,1);
      renderMFotoLeiste();
    };})(fi);
    wrap.appendChild(img);wrap.appendChild(lbl);wrap.appendChild(del);leiste.appendChild(wrap);
  });
}

// FOTO PANEL
// ============================================================
function openFotoPanel(idx){
  curFotoIdx=idx;
  var it=dat[curKey]&&dat[curKey][idx];if(!it)return;
  var loc=it.loc||curSchTitle||'';
  g('fpVerortung').textContent=loc;
  g('fpCount').textContent=(it.fotos||[]).length+'/10';
  renderFotoLeiste(it);
  showPanel('ovFoto');
}

function renderFotoLeiste(it){
  var leiste=g('fpLeiste');leiste.innerHTML='';
  (it.fotos||[]).forEach(function(f,fi){
    var wrap=document.createElement('div');wrap.style.cssText='position:relative;display:inline-block;';
    var img=document.createElement('img');img.src=f.data;
    img.style.cssText='height:60px;border-radius:6px;cursor:pointer;border:2px solid var(--acc);display:block;';
    (function(fi2){img.onclick=function(){openGallery(curFotoIdx,fi2);};})(fi);
    var lbl=document.createElement('div');lbl.style.cssText='text-align:center;font-size:10px;color:var(--soft);margin-top:2px;';lbl.textContent='Foto '+f.nr;
    var del=document.createElement('button');
    del.style.cssText='position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;border:0;background:#e53935;color:#fff;font-size:11px;cursor:pointer;line-height:20px;padding:0;';
    del.textContent='✕';
    (function(fi2){del.onclick=function(e){
      e.stopPropagation();
      it.fotos.splice(fi2,1);
      g('fpCount').textContent=it.fotos.length+'/10';
      renderFotoLeiste(it);
      renderSch();autoSave();
    };})(fi);
    wrap.appendChild(img);wrap.appendChild(lbl);wrap.appendChild(del);leiste.appendChild(wrap);
  });
}

var cameraOpen=false;
var openPanels=[];

// ============================================================
// RESUME STATE — survives a full page reload if Android kills the
// background tab while the camera app is open (common on low-memory phones)
// ============================================================
function saveResumeState(extra){
  try{
    var state={
      bauKey:curBauKey,bauTitle:curBauTitle,ugr:lastUgr,
      schKey:curKey,schTitle:curSchTitle,
      ts:Date.now()
    };
    for(var k in extra)state[k]=extra[k];
    localStorage.setItem('bp_resume',JSON.stringify(state));
  }catch(e){}
}
function clearResumeState(){
  try{localStorage.removeItem('bp_resume');}catch(e){}
}
function tryResume(){
  var raw,st;
  try{raw=localStorage.getItem('bp_resume');}catch(e){raw=null;}
  if(!raw)return;
  try{st=JSON.parse(raw);}catch(e){st=null;}
  clearResumeState();
  if(!st||!st.bauKey||(Date.now()-st.ts)>30*60*1000)return; // ignore if older than 30 min
  try{
    openBau(st.bauKey,st.bauTitle,st.ugr);
    if(st.schKey){
      curKey=st.schKey;curSchTitle=st.schTitle;
      g('schTitle').textContent=curSchTitle;
      renderSch();
      showPanel('ovSch');
    }
    if(st.mode==='foto'&&typeof st.fotoIdx==='number'&&st.fotoIdx>-1){
      openFotoPanel(st.fotoIdx);
    } else if(st.mode==='mod'){
      openMod();
      if(st.desc)g('mDesc').value=st.desc;
      if(st.pendingFotos&&st.pendingFotos.length){mPendingFotos=st.pendingFotos;renderMFotoLeiste();}
    }
    toast('Weiter geht\'s — du warst hier ✓');
  }catch(e){}
}

function fpTakeFoto(){
  var it=dat[curKey]&&dat[curKey][curFotoIdx];
  if(!it||(it.fotos||[]).length>=10)return;
  // Save which panels are open
  openPanels=['ovBau','ovSch','ovMod','ovFoto'].filter(function(id){
    var el=g(id);return el&&el.classList.contains('open');
  });
  saveResumeState({mode:'foto',fotoIdx:curFotoIdx});
  cameraOpen=true;
  g('fotoInput').value='';
  setTimeout(function(){g('fotoInput').click();},50);
}

function closeFotoPanel(){
  cameraOpen=false;
  clearResumeState();
  hidePanel('ovFoto');
  renderSch();render();autoSave();
}

// Foto input handler
document.addEventListener('DOMContentLoaded',function(){
  g('fotoInput').addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;
    var it=dat[curKey]&&dat[curKey][curFotoIdx];if(!it)return;
    if(!it.fotos)it.fotos=[];
    if(it.fotos.length>=10){toast('Max. 10 Fotos erreicht');return;}

    // Return to the Schaden view immediately; heavy image work happens after
    openPanels.forEach(function(id){
      var el=g(id);if(el)el.classList.add('open');
    });
    toast('Foto wird verarbeitet…');

    fotoCounter++;
    var nr=fotoCounter;
    var loc=it.loc||curSchTitle||'';
    var label='Foto '+nr+(loc?' — '+loc:'');
    // Load via ObjectURL (memory-efficient) instead of reading the full-res file as base64 first
    var objUrl=URL.createObjectURL(f);
    var img=new Image();
    img.onload=function(){
      // Yield one tick so the browser has already repainted the restored panels
      setTimeout(function(){
        try{
          var cv=document.createElement('canvas');
          cv.width=Math.min(img.width,1000);
          cv.height=Math.round(img.height*(cv.width/img.width));
          var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,cv.width,cv.height);
          var fs=Math.max(16,Math.round(cv.width/35));
          ctx.font='bold '+fs+'px Arial';ctx.textBaseline='bottom';
          var tw=ctx.measureText(label).width,pad=8;
          ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,cv.height-fs-pad*2,tw+pad*2,fs+pad*2);
          ctx.fillStyle='#fff';ctx.fillText(label,pad,cv.height-pad);
          it.fotos.push({data:cv.toDataURL('image/jpeg',.75),nr:nr,loc:loc,w:cv.width,h:cv.height});
        }catch(err){
          toast('Foto konnte nicht verarbeitet werden');
        }
        URL.revokeObjectURL(objUrl);
        g('fpCount').textContent=it.fotos.length+'/10';
        g('fotoAddBtn').style.display=it.fotos.length>=10?'none':'block';
        renderFotoLeiste(it);
        toast('Foto '+nr+' gespeichert ✓');
        setTimeout(autoSave,0);
      },0);
    };
    img.onerror=function(){
      URL.revokeObjectURL(objUrl);
      toast('Foto konnte nicht geladen werden');
    };
    img.src=objUrl;
    g('fotoInput').value='';
  });

  // Photo capture for a NEW, not-yet-saved Schaden (mFoto button in the entry form)
  g('mFoto').addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;
    if(mPendingFotos.length>=10){toast('Max. 10 Fotos erreicht');return;}
    toast('Foto wird verarbeitet…');
    fotoCounter++;
    var nr=fotoCounter;
    var loc=curSchTitle||'';
    var label='Foto '+nr+(loc?' — '+loc:'');
    var objUrl=URL.createObjectURL(f);
    var img=new Image();
    img.onload=function(){
      setTimeout(function(){
        try{
          var cv=document.createElement('canvas');
          cv.width=Math.min(img.width,1000);
          cv.height=Math.round(img.height*(cv.width/img.width));
          var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,cv.width,cv.height);
          var fs=Math.max(16,Math.round(cv.width/35));
          ctx.font='bold '+fs+'px Arial';ctx.textBaseline='bottom';
          var tw=ctx.measureText(label).width,pad=8;
          ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,cv.height-fs-pad*2,tw+pad*2,fs+pad*2);
          ctx.fillStyle='#fff';ctx.fillText(label,pad,cv.height-pad);
          mPendingFotos.push({data:cv.toDataURL('image/jpeg',.75),nr:nr,loc:loc,w:cv.width,h:cv.height});
        }catch(err){
          toast('Foto konnte nicht verarbeitet werden');
        }
        URL.revokeObjectURL(objUrl);
        renderMFotoLeiste();
        toast('Foto '+nr+' hinzugefügt ✓');
      },0);
    };
    img.onerror=function(){
      URL.revokeObjectURL(objUrl);
      toast('Foto konnte nicht geladen werden');
    };
    img.src=objUrl;
    g('mFoto').value='';
  });
});

// GALERIE
// ============================================================
function openGallery(schadenIdx,fotoIdx){
  var it=dat[curKey]&&dat[curKey][schadenIdx];if(!it||!it.fotos||!it.fotos.length)return;
  var srcs=it.fotos.map(function(f){return f.data;});
  var nrs=it.fotos.map(function(f){return f.nr;});
  var idx=fotoIdx||0;

  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;touch-action:none;';

  // Close button
  var cb=document.createElement('button');
  cb.style.cssText='position:absolute;top:14px;right:14px;z-index:2;border:0;background:rgba(255,255,255,.3);color:#fff;width:48px;height:48px;border-radius:50%;font-size:24px;cursor:pointer;';
  cb.textContent='✕';
  cb.onclick=function(){document.body.removeChild(ov);};

  // Counter
  var ctr=document.createElement('div');
  ctr.style.cssText='position:absolute;top:18px;left:16px;z-index:2;color:#fff;font-size:14px;font-weight:700;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:20px;';

  // Image
  var imgEl=document.createElement('img');
  imgEl.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:95vw;max-height:85vh;border-radius:8px;object-fit:contain;';

  // Nav
  var prev=document.createElement('button');
  prev.style.cssText='position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:2;border:0;background:rgba(255,255,255,.25);color:#fff;width:48px;height:48px;border-radius:50%;font-size:28px;cursor:pointer;';
  prev.textContent='‹';
  var next=document.createElement('button');
  next.style.cssText='position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:2;border:0;background:rgba(255,255,255,.25);color:#fff;width:48px;height:48px;border-radius:50%;font-size:28px;cursor:pointer;';
  next.textContent='›';

  function show(i){
    idx=((i%srcs.length)+srcs.length)%srcs.length;
    imgEl.src=srcs[idx];
    ctr.textContent='Foto '+nrs[idx]+' ('+( idx+1)+'/'+srcs.length+')';
    prev.style.display=srcs.length>1?'':'none';
    next.style.display=srcs.length>1?'':'none';
  }
  prev.onclick=function(){show(idx-1);};
  next.onclick=function(){show(idx+1);};

  // Swipe
  var tx=0;
  ov.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
  ov.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>40){show(dx<0?idx+1:idx-1);}
  },{passive:true});

  ov.appendChild(cb);ov.appendChild(ctr);ov.appendChild(imgEl);
  ov.appendChild(prev);ov.appendChild(next);
  document.body.appendChild(ov);
  show(idx);
}

function openMod(){
  curTyp='Beton';curArt='';curVorl=null;
  g('mDesc').value='';
  mPendingFotos=[];
  renderMFotoLeiste();
  var vEl=g('mVerortung');if(vEl)vEl.textContent=curSchTitle||'';
  g('mArt').style.display='block';
  var u=curKey?curKey.split('___')[1]||'':'';
  var at=UT[u];
  if(at){curTyp=at;g('mTyp').style.display='none';bldArt();}
  else{g('mTyp').style.display='block';bldTyp();bldArt();}
  showPanel('ovMod');
}

function takeMFoto(){
  if(mPendingFotos.length>=10){toast('Max. 10 Fotos erreicht');return;}
  saveResumeState({mode:'mod',desc:g('mDesc').value,pendingFotos:mPendingFotos});
  g('mFoto').value='';
  document.getElementById('mFoto').click();
}

function bldTyp(){
  var isW=curKey&&(/_w[12]___/.test(curKey));
  var T=isW?['Beton','Mauerwerk']:['Beton','Stahl','Gew.Beton','Gew.Mauerwk'];
  g('mTyp').innerHTML='<label style="font-size:12px;color:var(--soft);font-weight:600;display:block;margin-bottom:8px;">Bauwerkstyp</label>';
  T.forEach(function(t){
    var b=document.createElement('button');b.className='sb'+(t===curTyp?' on':'');b.textContent=t;
    (function(tt){b.onclick=function(){curTyp=tt;bldTyp();bldArt();};})(t);
    g('mTyp').appendChild(b);
  });
}

function bldArt(){
  var arts=SC[curTyp]||[];
  g('mArt').innerHTML='';
  var lbl=document.createElement('label');
  lbl.style.cssText='font-size:12px;color:var(--soft);font-weight:600;display:block;margin:10px 0 8px;';
  lbl.textContent='Schadensart';
  g('mArt').appendChild(lbl);
  arts.forEach(function(a){
    var b=document.createElement('button');b.className='sb';b.textContent=a;
    (function(art){b.onclick=function(){selArt(art,this);};})(a);
    g('mArt').appendChild(b);
  });
}

function selArt(a,btn){
  curArt=a;
  var old=g('artInline');if(old)old.parentNode.removeChild(old);
  g('mArt').querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var vl=VL[a]||[];
  var wrap=document.createElement('div');wrap.id='artInline';
  wrap.style.cssText='margin:4px 0 12px;padding:12px;background:var(--accs);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;';
  var hasInp=vl.some(function(v){return v.i&&v.i.length>0;});
  if(!vl.length){
    addConfirmBtn(wrap,a,function(){appendDesc(a);wrap.parentNode.removeChild(wrap);g('mArt').querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});});
  } else if(!hasInp){
    vl.forEach(function(v){
      var vb=document.createElement('button');vb.className='sb';vb.style.marginBottom='6px';vb.textContent=v.l;
      (function(vv){vb.onclick=function(){appendDesc(vv.t);wrap.parentNode.removeChild(wrap);g('mArt').querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});};})(v);
      wrap.appendChild(vb);
    });
  } else if(vl.length===1){
    curVorl=vl[0];buildInpFields(wrap,vl[0]);
  } else {
    vl.forEach(function(v){
      var vb=document.createElement('button');vb.className='sb';vb.style.marginBottom='6px';vb.textContent=v.l;
      (function(vv){vb.onclick=function(){
        var oi=g('vorlInline');if(oi)oi.parentNode.removeChild(oi);
        wrap.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});this.classList.add('on');
        if(!vv.i||!vv.i.length){appendDesc(vv.t);return;}
        curVorl=vv;
        var iw=document.createElement('div');iw.id='vorlInline';
        iw.style.cssText='margin-top:8px;padding:10px;background:var(--sur);border:1px solid var(--acc);border-radius:8px;';
        buildInpFields(iw,vv);
        this.parentNode.insertBefore(iw,this.nextSibling);
        var f=g('vi0');if(f)f.focus();
      };})(v);
      wrap.appendChild(vb);
    });
  }
  if(btn)btn.parentNode.insertBefore(wrap,btn.nextSibling);else g('mArt').appendChild(wrap);
  wrap.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function addConfirmBtn(container,label,cb){
  var b=document.createElement('button');
  b.style.cssText='width:100%;padding:12px;background:var(--acc);color:#fff;border:0;border-radius:7px;cursor:pointer;font-weight:700;font-family:inherit;font-size:15px;';
  b.textContent='✓ '+label;b.onclick=cb;container.appendChild(b);
}

function buildInpFields(container,vorl){
  var p=document.createElement('div');p.style.cssText='font-size:12px;color:var(--acc);font-weight:600;margin-bottom:10px;';
  p.textContent=vorl.t.replace(/\{[0-9]\}/g,'___');container.appendChild(p);
  vorl.i.forEach(function(inp,i){
    var row=document.createElement('div');row.className='irow';
    var lbl=document.createElement('label');lbl.textContent=inp.l+':';
    var input=document.createElement('input');input.type='number';input.id='vi'+i;input.placeholder='0';
    var unit=document.createElement('span');unit.textContent=inp.u;
    row.appendChild(lbl);row.appendChild(input);row.appendChild(unit);container.appendChild(row);
    input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();noc(i,vorl.i.length);}});
  });
  var ok=document.createElement('button');
  ok.style.cssText='width:100%;padding:12px;background:var(--acc);color:#fff;border:0;border-radius:7px;cursor:pointer;font-weight:700;font-family:inherit;font-size:15px;margin-top:8px;';
  ok.textContent='✓ OK';ok.onclick=confVorl;container.appendChild(ok);
  setTimeout(function(){var f=g('vi0');if(f)f.focus();},100);
}

function appendDesc(text){
  var ta=g('mDesc');var cur=ta.value.trim();
  ta.value=cur?cur+'\n- '+text:'- '+text;
  ta.scrollIntoView({behavior:'smooth',block:'center'});
}

function noc(i,tot){if(i<tot-1){var n=g('vi'+(i+1));if(n){n.focus();return;}}confVorl();}

function confVorl(){
  if(!curVorl)return;
  var t=curVorl.t;
  curVorl.i.forEach(function(inp,i){var f=g('vi'+i);t=t.replace('{'+i+'}',f?f.value.trim():'___');});
  appendDesc(t);
  var ai=g('artInline');if(ai)ai.parentNode.removeChild(ai);
  var vi=g('vorlInline');if(vi)vi.parentNode.removeChild(vi);
  g('mArt').querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});
  curVorl=null;
}

function saveS(){
  var desc=g('mDesc').value.trim();
  if(!desc){toast('Bitte Schaden wählen und bestätigen');return;}
  if(!curKey){toast('Fehler: kein Bauteil gewählt');return;}
  if(!dat[curKey])dat[curKey]=[];
  dat[curKey].push({d:desc,fotos:mPendingFotos.slice(),loc:curSchTitle||'',t:curTyp,a:curArt});
  mPendingFotos=[];
  clearResumeState();
  hidePanel('ovMod');
  renderSch();render();autoSave();
  toast('Gespeichert ✓');
}

// ============================================================
// PANEL MANAGEMENT - simple show/hide, no history manipulation
// ============================================================
var panelStack=[];

function showPanel(id){
  g(id).classList.add('open');
  if(panelStack.indexOf(id)===-1)panelStack.push(id);
}

function hidePanel(id){
  g(id).classList.remove('open');
  panelStack=panelStack.filter(function(p){return p!==id;});
}

// Back button - only close top panel
window.addEventListener('popstate',function(){
  history.pushState(null,null,location.href);
  if(cameraOpen){
    // Camera returned - restore all saved panels
    openPanels.forEach(function(id){
      var el=g(id);if(el)el.classList.add('open');
    });
    return;
  }
  // Priority order
  var order=['ovFoto','ovMod','ovSch','ovBau'];
  for(var i=0;i<order.length;i++){
    var el=g(order[i]);
    if(el&&el.classList.contains('open')){
      el.classList.remove('open');
      return;
    }
  }
});

// Restore panels when page becomes visible after camera
document.addEventListener('visibilitychange',function(){
  if(!document.hidden&&cameraOpen){
    openPanels.forEach(function(id){
      var el=g(id);if(el)el.classList.add('open');
    });
  }
});

// Minimal ZIP creator (pure JS, no dependencies)
function PureZip(){
  this.files=[];
}
PureZip.prototype.file=function(name,data,opts){
  this.files.push({name:name,data:data,opts:opts||{}});
};
PureZip.prototype.generateAsync=function(opts){
  var self=this;
  return new Promise(function(resolve){
    var parts=[];
    var centralDir=[];
    var offset=0;
    self.files.forEach(function(f){
      var nameBytes=strToBytes(f.name);
      var dataBytes=f.opts.base64?base64ToBytes(f.data):strToBytes(f.data);
      var crc=crc32(dataBytes);
      var localHeader=makeLocalHeader(nameBytes,dataBytes,crc);
      centralDir.push({nameBytes:nameBytes,dataBytes:dataBytes,crc:crc,offset:offset});
      parts.push(localHeader);
      parts.push(dataBytes);
      offset+=localHeader.length+dataBytes.length;
    });
    var cdStart=offset;
    centralDir.forEach(function(e){
      parts.push(makeCentralDir(e.nameBytes,e.dataBytes,e.crc,e.offset));
    });
    var cdEnd=offset;
    centralDir.forEach(function(e){
      cdEnd+=46+e.nameBytes.length;
    });
    parts.push(makeEndRecord(centralDir.length,cdEnd-offset,cdStart));
    resolve(new Blob(parts.map(function(p){return p instanceof Uint8Array?p:new Uint8Array(p);}),{type:'application/zip'}));
  });
};
function strToBytes(s){
  var bytes=[];
  for(var i=0;i<s.length;i++){
    var c=s.codePointAt(i);
    if(c>0xFFFF)i++; // consumed a surrogate pair
    if(c<0x80){
      bytes.push(c);
    } else if(c<0x800){
      bytes.push(0xc0|(c>>6), 0x80|(c&0x3f));
    } else if(c<0x10000){
      bytes.push(0xe0|(c>>12), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f));
    } else {
      bytes.push(0xf0|(c>>18), 0x80|((c>>12)&0x3f), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f));
    }
  }
  return new Uint8Array(bytes);
}
function base64ToBytes(b64){
  var bin=atob(b64);
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return bytes;
}
function crc32(data){
  var table=crc32.table||(function(){var t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=((c&1)?0xedb88320:0)^(c>>>1);t[n]=c;}return crc32.table=t;})();
  var crc=0xffffffff;
  for(var i=0;i<data.length;i++)crc=(crc>>>8)^table[(crc^data[i])&0xff];
  return (crc^0xffffffff)>>>0;
}
function u16(n){return [n&0xff,(n>>8)&0xff];}
function u32(n){return [n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff];}
function makeLocalHeader(name,data,crc){
  var h=[0x50,0x4b,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00];
  h=h.concat(u32(crc));
  h=h.concat(u32(data.length));
  h=h.concat(u32(data.length));
  h=h.concat(u16(name.length));
  h=h.concat([0x00,0x00]);
  return new Uint8Array(h.concat(Array.from(name)));
}
function makeCentralDir(name,data,crc,offset){
  var h=[0x50,0x4b,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00];
  h=h.concat(u32(crc));
  h=h.concat(u32(data.length));
  h=h.concat(u32(data.length));
  h=h.concat(u16(name.length));
  h=h.concat([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]);
  h=h.concat(u32(offset));
  return new Uint8Array(h.concat(Array.from(name)));
}
function makeEndRecord(count,cdSize,cdOffset){
  var h=[0x50,0x4b,0x05,0x06,0x00,0x00,0x00,0x00];
  h=h.concat(u16(count));
  h=h.concat(u16(count));
  h=h.concat(u32(cdSize));
  h=h.concat(u32(cdOffset));
  h=h.concat([0x00,0x00]);
  return new Uint8Array(h);
}

// Download all photos as ZIP
function downloadFotos(){
  var zip=new PureZip();
  var count=0;
  stbs.forEach(function(stb){
    var blist=[{k:'stb'+stb.id+'_w1',u:W_UGR},{k:'stb'+stb.id+'_w2',u:W_UGR}];
    for(var i=1;i<=stb.oeff;i++){
      var ok='stb'+stb.id+'_oe'+i;
      var ot=dat['__t_'+ok]||'';
      blist.push({k:ok,u:ot==='Stahl'?OE_S:ot==='Gew.Beton'?OE_GB:ot==='Gew.Mauerwk'?OE_GM:OE_B});
      if(i<stb.oeff)blist.push({k:'stb'+stb.id+'_pf'+i,u:PF_UGR});
    }
    blist.forEach(function(b){
      b.u.forEach(function(u){
        (dat[b.k+'___'+u]||[]).forEach(function(it){
          (it.fotos||[]).forEach(function(foto){
            count++;
            var ext=foto.data.indexOf('jpeg')>-1||foto.data.indexOf('jpg')>-1?'jpg':'png';
            var b64=foto.data.split(',')[1];
            zip.file('Foto_'+(foto.nr||count)+'.'+ext, b64, {base64:true});
          });
        });
      });
    });
  });
  if(!count){toast('Keine Fotos vorhanden');return;}
  zip.generateAsync({type:'blob'}).then(function(blob){
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='Fotos_Pruefprotokoll.zip';
    a.click();
    toast(count+' Fotos heruntergeladen ✓');
  });
}



function xmlEsc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}
function docxPara(text,style){
  return '<w:p>'+(style?'<w:pPr><w:pStyle w:val="'+style+'"/></w:pPr>':'')+'<w:r><w:t xml:space="preserve">'+xmlEsc(text)+'</w:t></w:r></w:p>';
}
function docxImagePara(rId,widthPx,heightPx,caption){
  var maxCx=5029200; // ~5.5in max width so photos fit the printed page
  var cx=Math.round((widthPx||900)*9525),cy=Math.round((heightPx||600)*9525);
  if(cx>maxCx){var sc=maxCx/cx;cx=maxCx;cy=Math.round(cy*sc);}
  var picId=rId.replace('rId','');
  var drawing='<w:p><w:r><w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0">'+
    '<wp:extent cx="'+cx+'" cy="'+cy+'"/>'+
    '<wp:docPr id="'+picId+'" name="Bild'+picId+'"/>'+
    '<a:graphic><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">'+
    '<pic:pic><pic:nvPicPr><pic:cNvPr id="0" name="Bild'+picId+'"/><pic:cNvPicPr/></pic:nvPicPr>'+
    '<pic:blipFill><a:blip r:embed="'+rId+'"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>'+
    '<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+cx+'" cy="'+cy+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>'+
    '</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>';
  return drawing+(caption?docxPara(caption,null):'');
}

function doExport(includeImages){
  if(includeImages===undefined)includeImages=true;
  var str=g('f_str').value||'—',km=g('f_km').value||'—',br=g('f_br').value||'—',dt=g('f_dat').value||'—',pr=g('f_pr').value||'—';

  var body='';
  body+=docxPara('Brückenprüfungsprotokoll','Title');
  body+=docxPara('Strecke: '+str+'    Kilometer: '+km,null);
  body+=docxPara('Brücke: '+br,null);
  body+=docxPara('Datum: '+dt+'    Prüfer: '+pr,null);

  var rels=[{id:'rId1',target:'styles.xml',type:'http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles'}],mediaFiles=[],relCounter=1;

  stbs.forEach(function(stb,si){
    body+=docxPara('STB '+(si+1),'Heading1');
    var blist=[{k:'stb'+stb.id+'_w1',l:'Widerlager 1',u:W_UGR}];
    for(var i=1;i<=stb.oeff;i++){
      var ok='stb'+stb.id+'_oe'+i;
      var ot=dat['__t_'+ok]||'';
      blist.push({k:ok,l:'Öffnung '+i,u:ot==='Stahl'?OE_S:ot==='Gew.Beton'?OE_GB:ot==='Gew.Mauerwk'?OE_GM:OE_B});
      if(i<stb.oeff)blist.push({k:'stb'+stb.id+'_pf'+i,l:'Pfeiler '+i,u:PF_UGR});
    }
    blist.push({k:'stb'+stb.id+'_w2',l:'Widerlager 2',u:W_UGR});

    blist.forEach(function(b){
      var hasItems=false;
      b.u.forEach(function(u){if((dat[b.k+'___'+u]||[]).length)hasItems=true;});
      if(!hasItems)return;
      body+=docxPara(b.l,'Heading2');
      b.u.forEach(function(u){
        var items=dat[b.k+'___'+u]||[];
        if(!items.length)return;
        body+=docxPara(u,'Heading3');
        items.forEach(function(it){
          var parts=it.d.split(/,\s*/);
          parts.forEach(function(p){body+=docxPara('- '+p.trim(),null);});
          if(includeImages){
            (it.fotos||[]).forEach(function(foto){
              relCounter++;
              var rId='rId'+relCounter;
              var mediaName='image'+relCounter+'.jpg';
              var b64=(foto.data.split(',')[1])||'';
              mediaFiles.push({name:mediaName,base64:b64});
              rels.push({id:rId,target:'media/'+mediaName,type:'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image'});
              body+=docxImagePara(rId,foto.w,foto.h,'Foto '+(foto.nr||''));
            });
          } else if((it.fotos||[]).length){
            body+=docxPara('📷 '+it.fotos.length+' Foto(s) vorhanden (nicht im Dokument, siehe separater Bilder-Export)',null);
          }
        });
      });
    });
  });

  body+='<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1417" w:right="1417" w:bottom="1417" w:left="1417"/></w:sectPr>';

  var documentXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" '+
    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" '+
    'xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" '+
    'xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" '+
    'xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">'+
    '<w:body>'+body+'</w:body></w:document>';

  var contentTypes='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
    '<Default Extension="jpg" ContentType="image/jpeg"/>'+
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'+
    '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>'+
    '</Types>';

  var rootRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>'+
    '</Relationships>';

  var docRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    rels.map(function(r){return '<Relationship Id="'+r.id+'" Type="'+r.type+'" Target="'+r.target+'"/>';}).join('')+
    '</Relationships>';

  var stylesXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'+
    '<w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Title"><w:name w:val="Title"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:after="240"/></w:pPr><w:rPr><w:b/><w:sz w:val="36"/><w:color w:val="0E7C66"/></w:rPr></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="240" w:after="120"/></w:pPr><w:rPr><w:b/><w:sz w:val="28"/><w:color w:val="0E7C66"/></w:rPr></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="200" w:after="100"/></w:pPr><w:rPr><w:b/><w:sz w:val="24"/><w:color w:val="0E7C66"/></w:rPr></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Heading3"><w:name w:val="heading 3"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="160" w:after="80"/></w:pPr><w:rPr><w:b/><w:sz w:val="22"/><w:color w:val="444444"/></w:rPr></w:style>'+
    '</w:styles>';

  var zip=new PureZip();
  zip.file('[Content_Types].xml',contentTypes);
  zip.file('_rels/.rels',rootRels);
  zip.file('word/document.xml',documentXml);
  zip.file('word/styles.xml',stylesXml);
  zip.file('word/_rels/document.xml.rels',docRels);
  mediaFiles.forEach(function(m){zip.file('word/media/'+m.name,m.base64,{base64:true});});

  zip.generateAsync({type:'blob'}).then(function(blob){
    var docxBlob=new Blob([blob],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    var filename='Pruefprotokoll_'+str+'_'+km+'_'+dt+(includeImages?'':'_ohneBilder')+'.docx';
    var file;
    try{ file=new File([docxBlob],filename,{type:docxBlob.type}); }catch(e){ file=null; }

    if(file && navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:filename}).then(function(){
        toast('Protokoll geteilt ✓');
      }).catch(function(err){
        // User cancelled the share sheet, or it failed — fall back to a normal download
        if(err && err.name==='AbortError')return;
        triggerDownload(docxBlob,filename);
      });
    } else {
      triggerDownload(docxBlob,filename);
    }
  }).catch(function(){
    toast('Export fehlgeschlagen — bitte erneut versuchen');
  });
}
function triggerDownload(blob,filename){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  toast('Protokoll wird heruntergeladen ✓');
}

function buildSearchIndex(){
  var idx=[];
  stbs.forEach(function(stb,si){
    var lbl='STB '+(si+1);
    (function(sid,lbl){
      idx.push({txt:lbl+' Widerlager 1 (W1)',fn:function(){openBau('stb'+sid+'_w1','W1',W_UGR);}});
      idx.push({txt:lbl+' Widerlager 2 (W2)',fn:function(){openBau('stb'+sid+'_w2','W2',W_UGR);}});
    })(stb.id,lbl);
    for(var i=1;i<=stb.oeff;i++){
      (function(sid,lbl,i){
        var key='stb'+sid+'_oe'+i;
        idx.push({txt:lbl+' Öffnung '+i,fn:function(){openBau(key,'Öffnung '+i,getUgr(key));}});
      })(stb.id,lbl,i);
      if(i<stb.oeff){
        (function(sid,lbl,i){
          var key='stb'+sid+'_pf'+i;
          idx.push({txt:lbl+' Pfeiler '+i,fn:function(){openBau(key,'Pf '+i,PF_UGR);}});
        })(stb.id,lbl,i);
      }
    }
  });
  return idx;
}
(function(){
  var inp=g('bauSearch'),res=g('bauSearchResults');
  if(!inp||!res)return;
  inp.addEventListener('input',function(){
    var q=inp.value.trim().toLowerCase().replace(/\s+/g,'');
    res.innerHTML='';
    if(!q){res.style.display='none';return;}
    var matches=buildSearchIndex().filter(function(e){
      return e.txt.toLowerCase().replace(/\s+/g,'').indexOf(q)>-1;
    }).slice(0,8);
    if(!matches.length){res.style.display='none';return;}
    matches.forEach(function(m){
      var b=document.createElement('div');
      b.textContent=m.txt;
      b.style.cssText='padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line);color:var(--ink);';
      b.onclick=function(){m.fn();inp.value='';res.style.display='none';};
      res.appendChild(b);
    });
    res.style.display='block';
  });
  inp.addEventListener('blur',function(){setTimeout(function(){res.style.display='none';},150);});
})();
