// ============================================================
// STANDORT-ÜBERSCHRIFT für Öffnungen und Widerlager (z.B. "STB 1, Öffnung 1" bzw.
// "STB 1, Widerlager 1, Vorderansicht") — wird automatisch als allererste Zeile jeder
// Schadensbeschreibung gesetzt, rein lesend aus dem Navigationspfad abgeleitet, nicht
// manuell editierbar. Lager hat bereits eigene STB/Widerlager/Pfeiler-Felder und wird
// hier bewusst ausgenommen, um Dopplung zu vermeiden.
// ============================================================
// "Nackte" Überschrift OHNE Bauteilname — nur STB/Öffnung bzw. STB/Widerlager. Wird von
// beiden Varianten unten als gemeinsame Basis verwendet, damit sich der Bauteil-Anteil beim
// Bearbeiten immer eindeutig wieder heraustrennen lässt (siehe editS()).
// Passt beim "Auf ... übernehmen" die erste Zeile (die automatische Standort-Überschrift,
// z.B. "STB 1, Widerlager 1, Geländer links 1,2,4") an den Zielort an — nur STB-/Öffnungs-/
// Widerlagernummer werden ersetzt, der Bauteil-Anteil (Bereich, Bauteilname, Nummer) bleibt
// unverändert, da es ja dasselbe Bauteil an einer anderen Stelle ist. Verhindert, dass beim
// Übertragen eine veraltete STB-Nummer aus dem Ursprungsort stehen bleibt.
// Übernimmt beim "Übertragen/Übernehmen" den Bauwerkstyp (Beton/Stahl/Mauerwerk/...) auf das
// Ziel, FALLS dort noch keiner gesetzt ist — sonst würde z.B. ein übertragener Stahl-Schaden
// in einer Öffnung ohne festgelegten Typ (Standard-Fallback ist Beton) beim Zählen und in der
// Bauteil-Liste unsichtbar bleiben, bis man den Typ dort von Hand auswählt.
function copyTypeIfMissing(targetBaseKey){
  var srcBase=(S.key||'').split('___')[0];
  if(!srcBase||dat['__t_'+targetBaseKey])return;
  var t=dat['__t_'+srcBase];
  if(t)dat['__t_'+targetBaseKey]=t;
}

// Kopiert einen Eintrag zu einem Zielort (anderes Widerlager/Öffnung/Pfeiler/STB). Bei
// einem "Beide"-kombinierten Eintrag (Text erwähnt sowohl Links als auch Rechts, siehe
// isBeideEntry) wird die Kopie an BEIDEN Seiten des Ziels abgelegt — sonst stünde am
// Zielort z.B. unter "Geländer rechts" nichts, obwohl der kopierte Text Rechts-Schäden
// beschreibt.
function copyEntryToTarget(it,targetBaseKey,ugrSuffix){
  var targetUgrs=[ugrSuffix];
  if(/ links und rechts$/.test(it.loc||'')){
    var other=/ links$/.test(ugrSuffix)?ugrSuffix.replace(/ links$/,' rechts'):ugrSuffix.replace(/ rechts$/,' links');
    if(other!==ugrSuffix)targetUgrs.push(other);
  }
  copyTypeIfMissing(targetBaseKey);
  targetUgrs.forEach(function(u){
    var targetKey=targetBaseKey+'___'+u;
    if(!dat[targetKey])dat[targetKey]=[];
    dat[targetKey].push({d:retargetHeadingLine(it.d,targetBaseKey),fotos:[],loc:it.loc,t:it.t,a:it.a});
  });
}

function retargetHeadingLine(desc,targetBaseKey){
  if(!desc)return desc;
  var lines=desc.split('\n');
  var first=lines[0]||'';
  var oeM=targetBaseKey.match(/^stb(\d+)_oe(\d+)$/);
  var wM=targetBaseKey.match(/^stb(\d+)_w([12])$/);
  var pfM=targetBaseKey.match(/^stb(\d+)_pf(\d+)$/);
  var wgM=targetBaseKey.match(/^wg_w([12])$/);
  var replaced=first;
  if(oeM)replaced=first.replace(/^STB \d+, Öffnung \d+/,'STB '+oeM[1]+', Öffnung '+oeM[2]);
  else if(wM)replaced=first.replace(/^STB \d+, Widerlager [12]/,'STB '+wM[1]+', Widerlager '+wM[2]);
  else if(pfM)replaced=first.replace(/^STB \d+, Pfeiler \d+/,'STB '+pfM[1]+', Pfeiler '+pfM[2]);
  else if(wgM)replaced=first.replace(/^(STB \d+, Widerlager [12]|Widerlager [12] \(durchgehend\))/,'Widerlager '+wgM[1]+' (durchgehend)');
  lines[0]=replaced;
  return lines.join('\n');
}

function buildLocationHeadingBare(overrideBaseKey){
  if(!overrideBaseKey&&/^Lager: /.test(S.ugr||''))return '';
  var baseKey=overrideBaseKey||(S.key||'').split('___')[0];
  var oeM=baseKey.match(/^stb(\d+)_oe(\d+)$/);
  if(oeM)return 'STB '+oeM[1]+', Öffnung '+oeM[2];
  var wM=baseKey.match(/^stb(\d+)_w([12])$/);
  if(wM)return 'STB '+wM[1]+', Widerlager '+wM[2];
  var pfM=baseKey.match(/^stb(\d+)_pf(\d+)$/);
  if(pfM)return 'STB '+pfM[1]+', Pfeiler '+pfM[2];
  var wgM=baseKey.match(/^wg_w([12])$/);
  if(wgM)return 'Widerlager '+wgM[1]+' (durchgehend)';
  return '';
}

// Baut den Bauteil-Anteil ("Geländer links" bzw. mit Nummer "Geländer links 1,2,4" bzw.
// bei Doppel-Nr-Bauteilen "Beulsteife 3 an Hauptträger 2") — mitNr steuert, ob die
// eingetragene Bauteil-Nummer mit eingerechnet wird.
function buildBauteilPart(mitNr){
  if(!S.ugr)return '';
  var posOpts=BAUTEIL_POS_OPTIONS[S.ugr];
  var posSuffix=(mitNr&&posOpts&&curBauteilPos)?' ('+curBauteilPos+')':'';
  if(mitNr&&NR_PRO_SYMPTOMZEILE_BAUTEILE.indexOf(S.ugr)===-1){
    var nrRow=g('mBauteilNrRow');
    if(nrRow&&nrRow.style.display!=='none'){
      var dbl=DOPPEL_NR_BAUTEILE[S.ugr];
      var nrVal=(g('mBauteilNr')?g('mBauteilNr').value:'').trim();
      if(dbl){
        var refVal=(g('mBauteilRef')?g('mBauteilRef').value:'').trim();
        if(nrVal||refVal){
          var compWord=S.ugr.split(' an ')[0];
          var full=compWord;
          if(nrVal)full+=' '+nrVal;
          full+=' an '+dbl.refWord;
          if(refVal)full+=' '+refVal;
          return full;
        }
      } else if(nrVal){
        var nrClean=nrVal.toLowerCase()==='alle'?'Alle':nrVal.split(',').map(function(s){return s.trim();}).filter(function(s){return s;}).join(',');
        return S.ugr+' '+nrClean+posSuffix;
      }
    }
  }
  return S.ugr.replace(/^Widerlager\s+/,'')+posSuffix;
}

function buildLocationHeading(){
  var bare=buildLocationHeadingBare();
  if(!bare)return '';
  // Bauteilname (z.B. "Vorderansicht", "Geländer links", "Längsträger") gehört immer in die
  // Überschrift — für alle Bauteiltypen einheitlich. Diese "bare" Variante bleibt bewusst
  // ohne Bauteil-Nr. (wird u.a. fürs Foto-Wasserzeichen genutzt); die Nr. steht nur in der
  // erweiterten Variante buildTextLocationHeading() (für die Schadensbeschreibung selbst).
  var part=buildBauteilPart(false);
  return part?bare+', '+part:bare;
}

// Erweiterte Überschrift NUR für den gespeicherten Beschreibungstext (nicht fürs
// Foto-Wasserzeichen, das bewusst bei der schlichten buildLocationHeading() bleibt) —
// hängt bei nummerierbaren Bauteilen (Hauptträger, Querträger usw.) die tatsächliche
// Nummer einmalig mit an, z.B. "STB 1, Öffnung 1, Hauptträger 1". Die Nummer steht damit
// NUR noch hier (einmal, am Anfang) und nicht mehr zusätzlich an jeder Schadenszeile.
function buildTextLocationHeading(){
  var bare=buildLocationHeadingBare();
  if(!bare)return '';
  var part=buildBauteilPart(true);
  return part?bare+', '+part:bare;
}

function editS(i){
  var it=dat[S.key]&&dat[S.key][i];
  if(!it)return;
  resetBeideState();
  S.editIdx=i;
  S.art=it.a;S.vorl=null;
  S.typ=it.t;
  mPendingFotos=(it.fotos||[]).slice();
  renderMFotoLeiste();
  updateBauteilNrUI();
  g('mArt').style.display='block';
  g('mTyp').style.display='none';
  bldArt();
  // "Beide"-kombinierte Einträge (Überschrift "... links und rechts", Abschnitte
  // "Links:"/"Rechts:") haben eine andere Struktur als normale Einträge — die
  // Heading-/Bauteil-Nr-/Lager-Erkennung unten geht von GENAU EINER Schadensart-Zeile
  // pro Zeile aus und würde bei zwei zusammengefassten Abschnitten Zahlen aus beiden
  // Seiten durcheinanderwürfeln bzw. verlieren. Deshalb hier: Rohtext unverändert zur
  // freien Bearbeitung anbieten, keine automatische Zerlegung in Chips, keine
  // Bauteil-Nr-Felder (auch wenn das Bauteil an sich nummerierbar wäre).
  S.editIsBeide=/ links und rechts$/.test(it.loc||'');
  updateSchadenNrBadge();
  if(S.editIsBeide){
    var nrRowB=g('mBauteilNrRow'),refRowB=g('mBauteilRefRow');
    if(nrRowB)nrRowB.style.display='none';
    if(refRowB)refRowB.style.display='none';
    updateVerortungDisplay();
    g('mDesc').value=it.d||'';
    curSchadenEntries=[];
    renderSchadenChips();
    resetMassnahmeBox();
    var gboxB=g('genauBox');if(gboxB){gboxB.style.display='none';gboxB.innerHTML='';}
    pendingGenauArt=null;
    showPanel('ovMod');
    updateBeideModalUI();
    autoGrowMDesc();
    toast('Kombi-Eintrag (Links+Rechts) — wird als Rohtext bearbeitet, keine automatische Nr./Überschrift-Erkennung');
    setTimeout(function(){
      var el=g('mDesc');
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },200);
    return;
  }
  // Bestehende V/B/S-Zeile erkennen, aus dem Text lösen und in die Checkboxen zurückübersetzen
  var lines=(it.d||'').split('\n');
  var vbsLineRe=/^-?\s*((Verkehrssicherheit|Betriebssicherheit|Standsicherheit)!\s*)+$/;
  var lastLine=lines[lines.length-1]||'';
  if(vbsLineRe.test(lastLine.trim())){
    curVbsState.V=/Verkehrssicherheit!/.test(lastLine);
    curVbsState.B=/Betriebssicherheit!/.test(lastLine);
    curVbsState.S=/Standsicherheit!/.test(lastLine);
    renderVbsRow();
    lines=lines.slice(0,-1);
  }
  // Bei Lager: Messwerte-Zeilen erkennen, aus dem Text herauslösen und in die echten
  // Zahlenfelder zurückschreiben, damit sie beim Bearbeiten wieder änderbar sind — sonst
  // stünden sie nur noch als starrer Text da. saveS() baut sie beim erneuten Speichern
  // aus den (ggf. geänderten) Feldern automatisch wieder vorne an.
  var lagerDirektM=(S.ugr||'').match(/^Lager: (.+?)(?: - (.+))?$/);
  if(lagerDirektM&&!lagerDirektM[2]){
    renderLagerMesswerte();
    curLagerMesswertFelder.forEach(function(f,idx){
      var prefix='- '+f.label+':';
      for(var li=0;li<lines.length;li++){
        if(lines[li].indexOf(prefix)===0){
          var rest=lines[li].slice(prefix.length).trim();
          if(f.unit&&rest.slice(-f.unit.length)===f.unit)rest=rest.slice(0,-f.unit.length).trim();
          var el=g('lagerMw'+idx);
          if(el)el.value=rest;
          lines.splice(li,1);
          break;
        }
      }
    });
  }
  var bareOhneBauteil=buildLocationHeadingBare();
  var hatteHeading=false;
  if(bareOhneBauteil&&lines[0]&&lines[0].indexOf(bareOhneBauteil+', ')===0){
    hatteHeading=true;
    var bauteilTeil=lines[0].slice((bareOhneBauteil+', ').length);
    lines=lines.slice(1);
    // Bauteil-Nr. aus dem Bauteil-Teil der Überschrift zurückgewinnen (steht seit Juli
    // 2026 nur noch dort, einmalig — nicht mehr an jeder einzelnen Schadenszeile). Alte,
    // vor dieser Umstellung gespeicherte Einträge haben dort keine Nummer stehen (der
    // Bauteil-Teil entspricht dann einfach S.ugr) — dann bleibt das Nr.-Feld leer, wie
    // gehabt manuell nachtragbar.
    var nrRow2=g('mBauteilNrRow');
    if(S.ugr&&nrRow2&&nrRow2.style.display!=='none'){
      var dbl2=DOPPEL_NR_BAUTEILE[S.ugr];
      var esc=function(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');};
      if(dbl2){
        var compWord2=S.ugr.split(' an ')[0];
        var reHead=new RegExp('^'+esc(compWord2)+'(?: (\\S+))? an '+esc(dbl2.refWord)+'(?: (\\S+))?$');
        var mHead=bauteilTeil.match(reHead);
        if(mHead){
          if(mHead[1]&&g('mBauteilNr'))g('mBauteilNr').value=mHead[1];
          if(mHead[2]&&g('mBauteilRef'))g('mBauteilRef').value=mHead[2];
        }
      } else if(BAUTEIL_POS_OPTIONS[S.ugr]){
        var posAlt2=BAUTEIL_POS_OPTIONS[S.ugr].join('|');
        var reHeadPos=new RegExp('^'+esc(S.ugr)+'(?: (\\S+))?(?: \\(('+posAlt2+')\\))?$');
        var mHeadPos=bauteilTeil.match(reHeadPos);
        if(mHeadPos){
          if(mHeadPos[1]&&g('mBauteilNr'))g('mBauteilNr').value=mHeadPos[1];
          if(mHeadPos[2])curBauteilPos=mHeadPos[2];
        }
      } else {
        var reHead2=new RegExp('^'+esc(S.ugr)+' (.+)$');
        var mHead2=bauteilTeil.match(reHead2);
        if(mHead2&&g('mBauteilNr'))g('mBauteilNr').value=mHead2[1];
      }
    }
  }
  renderBauteilPosBtns();
  updateVerortungDisplay();
  // Sonderfall Geländer: die Nr. steht hier NICHT in der Überschrift (siehe
  // NR_PRO_SYMPTOMZEILE_BAUTEILE), sondern an jeder einzelnen Schadenszeile — von dort
  // wieder ablösen und einmalig ins Nr.-Feld zurückschreiben (identisch zur alten Logik
  // vor der Juli-2026-Umstellung), damit sie beim erneuten Speichern wieder angehängt wird.
  if(S.ugr&&NR_PRO_SYMPTOMZEILE_BAUTEILE.indexOf(S.ugr)>=0){
    var nrRowGel=g('mBauteilNrRow');
    if(nrRowGel&&nrRowGel.style.display!=='none'){
      var foundNrGel='';
      lines=lines.map(function(line){
        var arrowIdx=line.indexOf('  》》');
        var head=arrowIdx>=0?line.slice(0,arrowIdx):line;
        var tail=arrowIdx>=0?line.slice(arrowIdx):'';
        var reGel=/ ([\d,]+|Alle)$/;
        var mGel=head.match(reGel);
        if(mGel){foundNrGel=mGel[1];head=head.slice(0,mGel.index);}
        return head+tail;
      });
      if(foundNrGel&&g('mBauteilNr'))g('mBauteilNr').value=foundNrGel;
    }
  }
  // Auf Wunsch von Andreas: Ortszeile bleibt auch beim Bearbeiten sichtbar im Feld
  // (nicht mehr entfernt) und wird — inklusive der gerade aus dem Text zurückgewonnenen
  // Bauteil-Nr. — frisch neu aufgebaut. Die Chip-Zeilenindizes müssen deshalb um 1
  // verschoben werden, da sie sich sonst noch auf die (intern) überschriftfreie
  // "lines"-Liste bezögen, real im Textfeld aber die Überschrift als zusätzliche erste
  // Zeile physisch vorhanden ist.
  var frischeHeading=hatteHeading?buildTextLocationHeading():'';
  g('mDesc').value=(frischeHeading?frischeHeading+'\n':'')+lines.join('\n');
  // Für Bearbeiten-Modus: jede verbliebene Freitext-Zeile als entfernbaren Chip anbieten
  // (Label = Zeilentext ohne führendes "- " und ohne evtl. angehängte Maßnahme).
  var chipOffset=frischeHeading?1:0;
  curSchadenEntries=lines.map(function(line,li){
    var clean=line.replace(/^-\s*/,'').split('  》》')[0].split('》》')[0].trim();
    return {lineIndex:li+chipOffset,label:clean||('Zeile '+(li+1))};
  }).filter(function(e){return e.label;});
  renderSchadenChips();
  resetMassnahmeBox();
  var gbox2=g('genauBox');if(gbox2){gbox2.style.display='none';gbox2.innerHTML='';}
  pendingGenauArt=null;
  showPanel('ovMod');
  updateBeideModalUI();
  autoGrowMDesc();
  toast('Bearbeitungsmodus – Änderungen speichern nicht vergessen');
  setTimeout(function(){
    var el=g('mDesc');
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },200);
}

function renderFotoLeiste(it){

      g('fpCount').textContent=it.fotos.length+'/10';
      renderFotoLeiste(it);

    };})(fi);

  });
}

// ============================================================
// RESUME STATE — survives a full page reload if Android kills the
// background tab while the camera app is open (common on low-memory phones)
// ============================================================
function saveResumeState(extra){
  try{
    var state={
      bauKey:S.bauKey,bauTitle:S.bauTitle,ugr:S.lastUgr,
      schKey:S.key,schTitle:S.schTitle,schUgr:S.ugr,
      ts:Date.now()
    };
    for(var k in extra)state[k]=extra[k];
    localStorage.setItem('bp_resume',JSON.stringify(state));
  }catch(e){}
}
function clearResumeState(){
  try{localStorage.removeItem('bp_resume');}catch(e){}
}
function tryResume(){
  var raw,st;
  try{raw=localStorage.getItem('bp_resume');}catch(e){raw=null;}
  if(!raw)return;
  try{st=JSON.parse(raw);}catch(e){st=null;}
  clearResumeState();
  if(!st||!st.bauKey||(Date.now()-st.ts)>30*60*1000)return; // ignore if older than 30 min
  try{
    openBau(st.bauKey,st.bauTitle,st.ugr);
    if(st.schKey){
      S.key=st.schKey;S.schTitle=st.schTitle;S.ugr=st.schUgr||'';
      g('schTitle').textContent=S.schTitle;
      renderSch();
      showPanel('ovSch');
    }
    if(st.mode==='foto'&&typeof st.fotoIdx==='number'&&st.fotoIdx>-1){
      openFotoPanel(st.fotoIdx);
    } else if(st.mode==='mod'){
      openMod();
      if(st.desc){g('mDesc').value=st.desc;autoGrowMDesc();}
      if(st.pendingFotos&&st.pendingFotos.length){mPendingFotos=st.pendingFotos;renderMFotoLeiste();}
    }
    toast('Weiter geht\'s — du warst hier ✓');
  }catch(e){}
}

function fpTakeFoto(){
  var it=dat[S.key]&&dat[S.key][curFotoIdx];
  if(!it||(it.fotos||[]).length>=10)return;
  // Save which panels are open
  openPanels=['ovBau','ovSch','ovMod','ovFoto'].filter(function(id){

  });
  saveResumeState({mode:'foto',fotoIdx:curFotoIdx});
  cameraOpen=true;
  g('fotoInput').value='';
  setTimeout(function(){g('fotoInput').click();},50);
}

function closeFotoPanel(){
  cameraOpen=false;
  clearResumeState();
  hidePanel('ovFoto');
  renderSch();render();autoSave();
}

// Generische Variante: öffnet die Vollbild-Galerie direkt für eine übergebene Foto-Liste,

function openGalleryPhotos(fotos,fotoIdx){
  if(!fotos||!fotos.length)return;

  var ov=document.createElement('div');

  // sonst kennt der Zurück-Knopf diese Vollbild-Ansicht nicht und schließt stattdessen
  // fälschlich den dahinterliegenden Bearbeitungsdialog samt allen ungespeicherten Daten.
  curGalleryOv=ov;

  cb.textContent='✕';

  // Zusätzlicher, deutlich beschrifteter Zurück-Knopf oben links (wie an anderen Stellen

  var backBtn=document.createElement('button');
  backBtn.style.cssText='position:absolute;top:14px;left:14px;z-index:2;border:0;background:rgba(255,255,255,.3);color:#fff;padding:10px 16px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;';
  backBtn.textContent='← Zurück zum Schaden';
  backBtn.onclick=function(){document.body.removeChild(ov);curGalleryOv=null;};

  // Counter
  var ctr=document.createElement('div');
  ctr.style.cssText='position:absolute;top:66px;left:16px;z-index:2;color:#fff;font-size:14px;font-weight:700;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:20px;';

  // Image
  var imgEl=document.createElement('img');
  imgEl.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:95vw;max-height:85vh;border-radius:8px;object-fit:contain;';

  // Nav
  var prev=document.createElement('button');
  prev.style.cssText='position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:2;border:0;background:rgba(255,255,255,.25);color:#fff;width:48px;height:48px;border-radius:50%;font-size:28px;cursor:pointer;';
  prev.textContent='‹';
  var next=document.createElement('button');
  next.style.cssText='position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:2;border:0;background:rgba(255,255,255,.25);color:#fff;width:48px;height:48px;border-radius:50%;font-size:28px;cursor:pointer;';
  next.textContent='›';

  function show(i){
    idx=((i%srcs.length)+srcs.length)%srcs.length;
    imgEl.src=srcs[idx];
    ctr.textContent=(idx+1)+'/'+srcs.length;
    prev.style.display=srcs.length>1?'':'none';
    next.style.display=srcs.length>1?'':'none';
  }
  prev.onclick=function(){show(idx-1);};
  next.onclick=function(){show(idx+1);};

  // Swipe
  var tx=0;
  ov.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
  ov.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>40){show(dx<0?idx+1:idx-1);}
  },{passive:true});

  ov.appendChild(cb);ov.appendChild(backBtn);ov.appendChild(ctr);ov.appendChild(imgEl);
  ov.appendChild(prev);ov.appendChild(next);
  document.body.appendChild(ov);
  show(idx);
}

// ============================================================
// LIVE-KAMERA: Kamerabild direkt in der Seite (statt Wechsel zur separaten
// Android-Kamera-App). Grund: nach jedem Foto über die App-Kamera verlässt die Seite
// kurz den Vordergrund — Android/Chrome erlaubt aus Sicherheitsgründen KEIN
// automatisches Wiederöffnen ohne echtes Antippen, das "Kameramodus bleibt an"-Gefühl
// ließ sich darüber also nicht zuverlässig umsetzen (siehe Verlauf mit Andreas, Juli 2026).
// Mit der Live-Kamera bleibt man auf einem Bildschirm und braucht nur noch EIN Antippen
// des Auslösers pro Foto — kein App-Wechsel, kein Sprung mehr.
// ============================================================
var liveCamStream=null;
var liveCamPhotoCount=0;
var liveCamTrack=null;
var liveCamZoom=1;
var liveCamZoomCaps=null; // {min,max,step} falls die Kamera echten Zoom unterstützt, sonst null (Digital-Zoom-Rückfall)

function openLiveCamera(){
  if(mPendingFotos.length>=10){toast('Max. 10 Fotos erreicht');return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('⚠️ Live-Kamera wird hier nicht unterstützt — bitte "Foto aufnehmen" nutzen');
    return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false}).then(function(stream){
    liveCamStream=stream;
    liveCamPhotoCount=0;
    liveCamZoom=1;
    liveCamTrack=stream.getVideoTracks()[0]||null;
    liveCamZoomCaps=null;
    try{
      var caps=liveCamTrack&&liveCamTrack.getCapabilities?liveCamTrack.getCapabilities():null;
      if(caps&&caps.zoom)liveCamZoomCaps=caps.zoom; // {min,max,step} — echter Kamera-Zoom verfügbar
    }catch(e){}
    buildLiveCamOverlay(stream);
  }).catch(function(err){
    toast('⚠️ Kamera konnte nicht geöffnet werden (Berechtigung erlaubt?) — bitte "Foto aufnehmen" nutzen');
  });
}

function changeLiveCamZoom(dir){
  var min=1,max=3,step=0.25;
  if(liveCamZoomCaps){min=liveCamZoomCaps.min;max=liveCamZoomCaps.max;step=liveCamZoomCaps.step||((max-min)/8||0.1);}
  liveCamZoom=Math.min(max,Math.max(min,liveCamZoom+dir*step));
  applyLiveCamZoom();
}

// Zoom per Zwei-Finger-Geste (Auseinanderziehen = rein, Zusammenziehen = raus) — läuft
// parallel zu den +/- Knöpfen und nutzt dieselbe applyLiveCamZoom()-Logik, betrifft also
// automatisch auch die Foto-Aufnahme (Crop bei Digital-Zoom bzw. echter Kamera-Zoom).
var liveCamPinchStartDist=null;
var liveCamPinchStartZoom=1;

function touchDist(touches){
  var dx=touches[0].clientX-touches[1].clientX;
  var dy=touches[0].clientY-touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function attachPinchZoom(el){
  el.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      liveCamPinchStartDist=touchDist(e.touches);
      liveCamPinchStartZoom=liveCamZoom;
    }
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    if(e.touches.length===2&&liveCamPinchStartDist){
      e.preventDefault();
      var min=1,max=3;
      if(liveCamZoomCaps){min=liveCamZoomCaps.min;max=liveCamZoomCaps.max;}
      var dist=touchDist(e.touches);
      var factor=dist/liveCamPinchStartDist;
      liveCamZoom=Math.min(max,Math.max(min,liveCamPinchStartZoom*factor));
      applyLiveCamZoom();
    }
  },{passive:false});
  el.addEventListener('touchend',function(e){
    if(e.touches.length<2)liveCamPinchStartDist=null;
  });
  el.addEventListener('touchcancel',function(){liveCamPinchStartDist=null;});
}

function applyLiveCamZoom(){
  var label=g('liveCamZoomLabel');
  if(label)label.textContent=liveCamZoom.toFixed(2).replace(/0$/,'').replace(/\.$/,'')+'x';
  var video=g('liveCamVideo');
  if(liveCamZoomCaps&&liveCamTrack){
    // Echter Kamera-Zoom (optisch/hybrid) — das Videobild kommt schon gezoomt an,
    // deshalb hier KEINE zusätzliche CSS-Skalierung.
    try{liveCamTrack.applyConstraints({advanced:[{zoom:liveCamZoom}]});}catch(e){}
    if(video)video.style.transform='none';
  } else {
    // Digital-Zoom-Rückfall, falls die Kamera keinen echten Zoom meldet: Vorschau optisch
    // vergrößern (CSS), beim Aufnehmen wird passend dazu die Bildmitte ausgeschnitten
    // (siehe captureLiveCamPhoto), damit das Foto genau dem Vorschaubild entspricht.
    if(video)video.style.transform='scale('+liveCamZoom+')';
  }
}

function captureLiveCamPhoto(){
  if(mPendingFotos.length>=10){toast('Max. 10 Fotos erreicht');closeLiveCamera();return;}
  var video=g('liveCamVideo');
  if(!video||!video.videoWidth){toast('Kamerabild noch nicht bereit — kurz warten');return;}
  fotoCounter++;
  var nr=fotoCounter;
  var label=fotoLabelFromKey(S.key);
  try{
    var srcW=video.videoWidth,srcH=video.videoHeight,sx=0,sy=0,cropW=srcW,cropH=srcH;
    if(!liveCamZoomCaps&&liveCamZoom>1){
      cropW=srcW/liveCamZoom;cropH=srcH/liveCamZoom;
      sx=(srcW-cropW)/2;sy=(srcH-cropH)/2;
    }
    var cv=document.createElement('canvas');
    cv.width=Math.min(cropW,1000);
    cv.height=Math.round(cropH*(cv.width/cropW));
    var ctx=cv.getContext('2d');
    ctx.drawImage(video,sx,sy,cropW,cropH,0,0,cv.width,cv.height);
    var fs=Math.max(16,Math.round(cv.width/35));
    ctx.font='bold '+fs+'px Arial';ctx.textBaseline='bottom';
    var tw=ctx.measureText(label).width,pad=8;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,cv.height-fs-pad*2,tw+pad*2,fs+pad*2);
    ctx.fillStyle='#fff';ctx.fillText(label,pad,cv.height-pad);
    mPendingFotos.push({data:cv.toDataURL('image/jpeg',.75),nr:nr,loc:label,w:cv.width,h:cv.height,fid:genFid()});
    liveCamPhotoCount++;
    var counter=g('liveCamCounter');
    if(counter)counter.textContent=liveCamPhotoCount+' Foto(s) in dieser Runde';
    flashLiveCam();
  }catch(err){
    toast('Foto konnte nicht verarbeitet werden');
  }
  if(mPendingFotos.length>=10){toast('Max. 10 Fotos erreicht');closeLiveCamera();}
}

function flashLiveCam(){
  var ov=g('liveCamOverlay');if(!ov)return;
  var flash=document.createElement('div');
  flash.style.cssText='position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;opacity:.55;pointer-events:none;transition:opacity .25s;';
  ov.appendChild(flash);
  requestAnimationFrame(function(){flash.style.opacity='0';});
  setTimeout(function(){if(flash.parentNode)flash.parentNode.removeChild(flash);},300);
}

function closeLiveCamera(){
  if(liveCamStream){
    liveCamStream.getTracks().forEach(function(t){try{t.stop();}catch(e){}});
    liveCamStream=null;

  liveCamTrack=null;liveCamZoom=1;liveCamZoomCaps=null;liveCamPinchStartDist=null;
  var ov=g('liveCamOverlay');

}

function bldArt(){
  var u=S.ugr||(S.key?S.key.split('___')[1]||'':'');
  var arts;
  var lagerM=u.match(/^Lager: (.+?)(?: - (.+))?$/);
  var fugenM=u.match(/^Fugen: (.+)$/);
  if(u==='Geländer links'||u==='Geländer rechts'){
    S.typ='Geländer';
    arts=(SC['Geländer']||[]).slice();
  } else if(lagerM){
    if(lagerM[2]){
      // Historische Einzelbauteil-Unterschlüssel (vor der Vereinfachung) — bleiben für
      // bereits gespeicherte alte Daten nutzbar, werden für neue Einträge nicht mehr angelegt.
      S.typ='Lager:'+lagerM[1]+':'+lagerM[2];
      arts=lagerBauteilSchaeden(lagerM[2]).slice();
    } else {
      // Vereinfachte Lagererfassung: Bauteile direkt als anklickbare Liste in der
      // Schadensbeschreibung — kein separater Bauteil-Auswahlbildschirm mehr davor.
      S.typ='Lager:'+lagerM[1];
      arts=['Allgemein'].concat(LAGER_BAUTEILE[lagerM[1]]||[]);
    }
  } else if(fugenM){
    S.typ='Fugen:'+fugenM[1];
    arts=(FUGEN_SC[fugenM[1]]||[]).slice();
  } else {
    var baseKey=S.key?S.key.split('___')[0]:'';
    var parentTyp=dat['__t_'+baseKey]||'';
    S.typ=resolveSchadenTyp(baseKey,u,parentTyp);
    arts=(SC[S.typ]||[]).slice();
    if(/Untersicht$/.test(u))arts=arts.concat(UNTERSICHT_EXTRA);
  }
  g('mArt').innerHTML='';
  var lbl=document.createElement('label');
  lbl.style.cssText='font-size:12px;color:var(--soft);font-weight:600;display:block;margin:10px 0 8px;';
  lbl.textContent='Schadensart';
  g('mArt').appendChild(lbl);
  // Zweispaltig statt einspaltig gestapelt — nimmt weniger Höhe ein, damit das
  // Beschreibungsfeld darunter (der eigentliche "Bearbeitungsbereich") ohne so viel
  // Scrollen sichtbar wird. Nur für diese Liste, nicht für andere .sb-Buttons in der App.
  var artGrid=document.createElement('div');
  artGrid.id='mArtGrid';
  artGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px;';
  g('mArt').appendChild(artGrid);
  arts.forEach(function(a){
    var b=document.createElement('button');b.className='sb';b.textContent=a;b.style.marginBottom='0';
    (function(art){b.onclick=function(){selArt(art,this);};})(a);
    artGrid.appendChild(b);
  });
}

function selArt(a,btn){
  S.art=a;

  } else if(!hasInp){

      (function(vv){vb.onclick=function(){appendDesc(vv.t);wrap.parentNode.removeChild(wrap);g('mArt').querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});};})(v);
      wrap.appendChild(vb);

    vl.forEach(function(v){
      var vb=document.createElement('button');vb.className='sb';vb.style.marginBottom='6px';vb.textContent=v.l;
      (function(vv){vb.onclick=function(){
        var oi=g('vorlInline');if(oi)oi.parentNode.removeChild(oi);
        wrap.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});this.classList.add('on');
        if(!vv.i||!vv.i.length){appendDesc(vv.t);return;}

        var iw=document.createElement('div');iw.id='vorlInline';
        iw.style.cssText='margin-top:8px;padding:10px;background:var(--sur);border:1px solid var(--acc);border-radius:8px;';
        buildInpFields(iw,vv);
        this.parentNode.insertBefore(iw,this.nextSibling);
        var f=g('vi0');if(f)f.focus();
      };})(v);
      wrap.appendChild(vb);
    });

  if(btn)btn.parentNode.insertBefore(wrap,btn.nextSibling);else g('mArt').appendChild(wrap);

  // über beide Spalten hinweg volle Breite einnehmen lassen, statt in einer Spalte
  // gequetscht zu werden.

  // darunter) — das hält die Scrollbewegung minimal, damit z.B. die Lager-Messwerte-

  (btn||wrap).scrollIntoView({behavior:'smooth',block:'nearest'});

  ],
  'Bewuchs/Vegetation':[
    {term:'störender Bewuchs',massnahme:'Bewuchs entfernen'},
    {term:'Inspektion durch Bewuchs behindert',massnahme:'Bewuchs entfernen'}
  ]
};
var pendingGenauArt=null;

var curSchadenEntries=[]; // {lineIndex, label} je neu eingefügter Schadensart-Zeile in dieser Erfassung

function appendDesc(text){
  var ta=g('mDesc');var cur=ta.value.trim();
  ta.value=cur?cur+'\n- '+text:'- '+text;
  autoGrowMDesc();
  ta.scrollIntoView({behavior:'smooth',block:'center'});
  // S.art hält immer den ursprünglichen Katalog-Begriff, auch wenn "text" hier
  // bereits durch eine Vorlage (Länge, Bestätigen-Dialog usw.) umgeformt wurde —
  // deshalb für die Zuordnung S.art verwenden, nicht den übergebenen Text.
  var newLineIndex=ta.value.split('\n').length-1;
  var artKey=S.art||text;
  curSchadenEntries.push({lineIndex:newLineIndex,label:artKey});
  renderSchadenChips();
  // Wenn zu dieser Schadensart noch eine Konkretisierung (Genauigkeit) folgt, die
  // Maßnahmen-Box NICHT sofort mit der generischen Standard-Maßnahme zeigen — die
  // Konkretisierung liefert gleich danach die passendere, spezifischere Maßnahme. Sonst
  // wirkt es so, als würde die Maßnahme schon feststehen, bevor die Detaillierung
  // überhaupt gewählt wurde.
  if(!GENAUIGKEIT[artKey]){
    updateMassnahmeBtn(text,artKey);
  }
  updateGenauBox(artKey);
}

// Zeigt jede bisher in diesem Eintrag eingefügte Schadensart als kleinen Chip mit "✕" an,
// damit eine einzelne falsch gewählte Zeile gezielt entfernt werden kann — ohne die
// komplette Beschreibung über "🗑 Löschen" leeren zu müssen.
function renderSchadenChips(){
  var host=g('schadenChips');
  if(!host)return;
  host.innerHTML='';
  if(!curSchadenEntries.length){host.style.display='none';return;}
  host.style.display='flex';
  curSchadenEntries.forEach(function(entry){
    var chip=document.createElement('div');
    chip.style.cssText='display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--s2);border-radius:20px;padding:4px 6px 4px 12px;font-size:12px;color:var(--ink);';
    var lbl=document.createElement('span');lbl.textContent=entry.label;
    var del=document.createElement('button');del.type='button';del.textContent='✕';
    del.title='Diese Schadensart-Zeile entfernen';
    del.style.cssText='border:0;background:#e53935;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;line-height:20px;padding:0;flex:none;';
    del.onclick=function(){removeSchadenEntry(entry);};
    chip.appendChild(lbl);chip.appendChild(del);
    host.appendChild(chip);
  });
}

function removeSchadenEntry(entry){
  var ta=g('mDesc');
  var lines=ta.value.split('\n');
  var idx=entry.lineIndex;
  if(idx<0||idx>=lines.length)return;
  lines.splice(idx,1);
  ta.value=lines.join('\n');
  autoGrowMDesc();
  curSchadenEntries=curSchadenEntries.filter(function(e){return e!==entry;});
  curSchadenEntries.forEach(function(e){if(e.lineIndex>idx)e.lineIndex--;});
  // Verwaiste Maßnahmen-Zuordnung für diese Schadensart mit entfernen
  if(massnahmeRows[entry.label]){
    var row=massnahmeRows[entry.label].row;
    if(row&&row.parentNode)row.parentNode.removeChild(row);
    delete massnahmeRows[entry.label];
    var mb=g('massnahmeBox');
    if(mb&&!mb.children.length)mb.style.display='none';
  }
  Object.keys(massnahmeRows).forEach(function(k){if(massnahmeRows[k].lineIndex>idx)massnahmeRows[k].lineIndex--;});
  renderSchadenChips();
  toast('Zeile entfernt');
}

function updateGenauBox(text){
  var box=g('genauBox');
  if(!box)return;
  var opts=GENAUIGKEIT[text];
  if(!opts){box.style.display='none';box.innerHTML='';pendingGenauArt=null;return;}
  pendingGenauArt=text;
  box.style.display='block';
  box.innerHTML='<div style="font-size:13px;color:var(--acc);font-weight:800;margin-bottom:7px;">🔍 Genauer beschreiben? (optional)</div>';
  var row=document.createElement('div');row.style.cssText='display:flex;flex-wrap:wrap;gap:8px;';
  opts.forEach(function(o){
    var b=document.createElement('button');b.className='sb';b.textContent=o.term;
    b.style.cssText='font-size:13px;font-weight:700;padding:9px 14px;border:2px solid var(--acc);background:#fff;';
    b.onclick=function(){
      var ta=g('mDesc');
      ta.value=ta.value.trim()+' ('+o.term+')';
      autoGrowMDesc();
      if(o.massnahme)renderMassnahmeBox(o.massnahme,text);
      box.style.display='none';
    };
    row.appendChild(b);
  });
  var skip=document.createElement('button');skip.textContent='Überspringen';
  skip.style.cssText='font-size:13px;padding:9px 14px;border:2px solid var(--line);background:transparent;color:var(--soft);border-radius:20px;cursor:pointer;font-family:inherit;';
  skip.onclick=function(){box.style.display='none';};
  row.appendChild(skip);
  box.appendChild(row);
  // Erscheint direkt nach einer Schadensart-Auswahl, aber die Textfeld-Bestätigung
  // scrollt gleichzeitig zum Beschreibungsfeld — ohne diesen Extra-Scroll bliebe die Box
  // dabei oft knapp über dem sichtbaren Bereich und würde leicht übersehen.
  setTimeout(function(){box.scrollIntoView({behavior:'smooth',block:'center'});},50);
}

// Begriffe, bei denen NUR die eine passende Maßnahme sinnvoll ist — kein zusätzlicher
// "Fachgerecht instandsetzen"-Alternativknopf (macht dort fachlich keinen Sinn).
var MASSNAHME_KEINE_ALTERNATIVE={'Bewuchs/Vegetation':true};
// Bei diesen Schadensarten sollen IMMER genau diese beiden Maßnahmen zur Auswahl stehen —
// unabhängig davon, welcher Schweregrad (Konkretisierung) gewählt wurde. Auf Wunsch von
// Andreas: bei jedem Schweißnahtschaden sollen sowohl die Beobachtungs- als auch die
// Instandsetzungs-Maßnahme wählbar sein, nicht nur die zum Schweregrad passende.
var SCHADENSART_FIXED_MASSNAHMEN={
  'Schweißnahtriss':['Rissentwicklung beobachten, bei nächster Prüfung erneut kontrollieren','Schweiß-Anschluß fachgerecht instandsetzen'],
  'Schweißnahtschaden':['Rissentwicklung beobachten, bei nächster Prüfung erneut kontrollieren','Schweiß-Anschluß fachgerecht instandsetzen']
};
var massnahmeRows={}; // Schadensart -> zugehörige Zeile im Container (für Mehrfachauswahl bei kombinierten Schäden)

function updateMassnahmeBtn(text,artKey){
  artKey=artKey||text;
  var m=MASSNAHMEN_TYP_OVERRIDE[S.typ+'|'+text]||MASSNAHMEN[text]||MASSNAHMEN_TYP_OVERRIDE[S.typ+'|'+artKey]||MASSNAHMEN[artKey];
  renderMassnahmeBox(m,artKey);
}

function renderMassnahmeBox(m,schadensArt){
  var box=g('massnahmeBox');
  var fixedList=SCHADENSART_FIXED_MASSNAHMEN[schadensArt];
  if(!box||(!m&&!fixedList))return;
  // Immer nur EIN Vorschlag gleichzeitig sichtbar (wie die "Genauer beschreiben"-Box):
  // eine evtl. noch offene Empfehlung zu einer vorherigen Schadensart wird hier verworfen,
  // sobald eine neue Schadensart drankommt — nicht mehr eingefügte Vorschläge bleiben dann
  // einfach unsichtbar (kein Text wird automatisch nachgetragen).
  box.innerHTML='';
  massnahmeRows={};
  box.style.display='flex';
  var rowWrap=document.createElement('div');
  rowWrap.style.cssText='display:flex;flex-direction:column;gap:6px;';
  var lbl=document.createElement('div');
  lbl.style.cssText='font-size:13px;color:var(--acc);font-weight:800;';
  lbl.textContent='🔧 Maßnahme zu „'+schadensArt+'" (optional):';
  rowWrap.appendChild(lbl);
  var optionsList=fixedList||[m];
  optionsList.forEach(function(opt,oi){
    var btn=document.createElement('button');
    btn.className='sb';
    if(oi===0)btn.style.cssText='width:100%;border:2px solid #2e7d32;background:#e8f5e9;color:#2e7d32;border-radius:7px;padding:11px;font-size:13px;font-weight:700;';
    else btn.style.cssText='width:100%;border:2px solid var(--acc);background:#fff;color:var(--ink);border-radius:7px;padding:11px;font-size:13px;font-weight:700;';
    btn.textContent='Maßnahme einfügen: „'+opt+'"';
    btn.onclick=function(){insertMassnahme(opt,schadensArt);};
    rowWrap.appendChild(btn);
  });
  if(!fixedList){
    var alt='Fachgerecht instandsetzen';
    if(m!==alt&&!MASSNAHME_KEINE_ALTERNATIVE[schadensArt]){
      var b2=document.createElement('button');
      b2.className='sb';
      b2.style.cssText='width:100%;border:2px solid var(--acc);background:#fff;color:var(--ink);border-radius:7px;padding:11px;font-size:13px;font-weight:700;';
      b2.textContent='Maßnahme einfügen: „'+alt+'"';
      b2.onclick=function(){insertMassnahme(alt,schadensArt);};
      rowWrap.appendChild(b2);
    }
  }
  var skip=document.createElement('button');skip.textContent='Überspringen';
  skip.style.cssText='width:100%;font-size:13px;padding:9px 14px;border:2px solid var(--line);background:transparent;color:var(--soft);border-radius:20px;cursor:pointer;font-family:inherit;';
  skip.onclick=function(){box.style.display='none';box.innerHTML='';delete massnahmeRows[schadensArt];};
  rowWrap.appendChild(skip);
  box.appendChild(rowWrap);
  // Zeilenposition der soeben hinzugefügten Schadensart-Zeile merken (aktuell letzte Zeile),
  // damit die Maßnahme später direkt dahinter eingefügt werden kann statt ans Textende.
  var lineIndex=g('mDesc').value.split('\n').length-1;
  massnahmeRows[schadensArt]={row:rowWrap,lineIndex:lineIndex};
  // Wie bei der "Genauer beschreiben"-Box: aktiv in den sichtbaren Bereich scrollen, sonst
  // bleibt sie nach dem Scroll zum Beschreibungsfeld leicht oberhalb des Bildschirms hängen.
  setTimeout(function(){box.scrollIntoView({behavior:'smooth',block:'center'});},50);
}

function insertMassnahme(text,schadensArt){
  var ta=g('mDesc');
  var entry=massnahmeRows[schadensArt];
  if(entry&&entry.lineIndex!=null){
    var lines=ta.value.split('\n');
    var idx=Math.min(entry.lineIndex,lines.length-1);
    lines[idx]=lines[idx]+' 》》 Maßnahme: '+text+' 《《';
    ta.value=lines.join('\n');
  } else {
    var cur=ta.value.trim();
    ta.value=cur?cur+' 》》 Maßnahme: '+text+' 《《':'- Maßnahme: '+text+' 《《';
  }
  realignMassnahmen();
  var box=g('massnahmeBox');
  var row=entry?entry.row:null;
  if(row&&row.parentNode)box.removeChild(row);
  delete massnahmeRows[schadensArt];
  if(!box.children.length)box.style.display='none';
}

// Richtet alle Zeilen mit "》》 Maßnahme: ..." auf eine gemeinsame Spalte aus (mit Mindestabstand),
// damit die Maßnahmen bei mehreren Schäden im selben Eintrag sauber untereinanderstehen.
// Funktioniert zuverlässig, weil #mDesc auf eine Monospace-Schrift gestellt ist.
function realignMassnahmen(){
  var ta=g('mDesc');
  var GAP=3; // Mindestabstand in Zeichen vor dem Pfeil
  var lines=ta.value.split('\n');
  var maxLen=0;
  var parsed=lines.map(function(line){
    var idx=line.indexOf('》》');
    if(idx===-1)return null;
    var content=line.slice(0,idx).replace(/\s+$/,'');
    var suffix=line.slice(idx+2).replace(/^\s*/,'');
    if(content.length>maxLen)maxLen=content.length;
    return {content:content,suffix:suffix};
  });
  var target=maxLen+GAP;
  for(var i=0;i<lines.length;i++){
    if(parsed[i]){
      lines[i]=parsed[i].content+' '.repeat(target-parsed[i].content.length)+'》》 '+parsed[i].suffix;
    }
  }
  ta.value=lines.join('\n');
  autoGrowMDesc();
}

function resetMassnahmeBox(){
  var box=g('massnahmeBox');
  if(box){box.style.display='none';box.innerHTML='';}
  massnahmeRows={};
}

// Bringt #mDesc beim Antippen sichtbar in den Vordergrund, ohne die Bildschirmtastatur
// zu ignorieren: sofort nur ein sanftes "nearest" (kein hartes Zentrieren blind ins Leere),
// und sobald die Tastatur tatsächlich eingeblendet ist (visualViewport-Resize), nochmal
// präzise auf den dann wirklich sichtbaren Bereich zentrieren.
// Lässt #mDesc automatisch mit dem Inhalt mitwachsen (bis zu einer Höchsthöhe, danach
// scrollt es innerhalb des Feldes weiter) — wird sowohl bei manueller Eingabe (oninput)
// als auch nach jeder programmatischen Textänderung (Schadensart/Maßnahme/Konkretisierung) aufgerufen.
function autoGrowMDesc(){
  var el=g('mDesc');
  if(!el)return;
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

function scrollMDescIntoView(){
  var el=g('mDesc');
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(window.visualViewport){
    var handler=function(){
      if(document.activeElement===el){
        el.scrollIntoView({behavior:'smooth',block:'center'});
      }
      window.visualViewport.removeEventListener('resize',handler);
    };
    window.visualViewport.addEventListener('resize',handler);
    // Falls kein Resize-Event feuert (z.B. Desktop-Browser ohne Tastatur), nach kurzer
    // Zeit selbst aufräumen, damit kein alter Handler hängen bleibt.
    setTimeout(function(){window.visualViewport.removeEventListener('resize',handler);},1500);
  }
}

function noc(i,tot){if(i<tot-1){var n=g('vi'+(i+1));if(n){n.focus();return;}}confVorl();}

function confVorl(){
  if(!S.vorl)return;
  var t=S.vorl.t;
  var extra='';
  S.vorl.i.forEach(function(inp,i){
    var f=g('vi'+i);
    var val=f?f.value.trim():'';
    if(inp.opt){
      if(val!=='')extra+=inp.suffix.replace('{'+i+'}',val);
    } else {
      t=t.replace('{'+i+'}',val||'___');
    }
  });
  t+=extra;
  appendDesc(t);
  var ai=g('artInline');if(ai)ai.parentNode.removeChild(ai);
  var vi=g('vorlInline');if(vi)vi.parentNode.removeChild(vi);
  g('mArt').querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});
  S.vorl=null;
}

// Baut den vollständigen Beschreibungstext aus dem aktuellen Formularzustand (Bauteil-Nr,
// Lager-Messwerte, Standort-Überschrift, VBS-Zeile) — ausgelagert aus saveS(), damit die
// "Beide"-Erfassung dieselbe Logik zweimal (einmal je Seite) verwenden kann, ohne dabei
// schon in dat[] zu schreiben.
function buildFormDesc(){
  var desc=g('mDesc').value.trim();
  var locHeading=buildTextLocationHeading();
  // Die Ortszeile steht seit Juli 2026 schon während der Erfassung sichtbar im Feld
  // (siehe openMod()/editS()) und enthält bei den meisten nummerierbaren Bauteilen (z.B.
  // Hauptträger) jetzt auch die Bauteil-Nr. einmalig ("Hauptträger 1") — hier vor der
  // weiteren Verarbeitung wieder herauslösen, damit sie nicht versehentlich als
  // Lager-Messwert-Zeile behandelt wird, und am Ende sauber wieder genau einmal
  // voranstellen.
  if(locHeading){
    var descLines=desc.split('\n');
    if(descLines[0]===locHeading){
      desc=descLines.slice(1).join('\n').trim();
    }
  }
  // Sonderfall Geländer: hier steht die Nr. NICHT in der Überschrift (siehe
  // NR_PRO_SYMPTOMZEILE_BAUTEILE weiter oben), sondern wie gehabt an jeder einzelnen
  // Schadenszeile, weil sich die betroffenen Pfosten je Schadensart unterscheiden können.
  if(S.ugr&&NR_PRO_SYMPTOMZEILE_BAUTEILE.indexOf(S.ugr)>=0&&desc){
    var nrRowZeile=g('mBauteilNrRow');
    if(nrRowZeile&&nrRowZeile.style.display!=='none'){
      var nrValZeile=(g('mBauteilNr')?g('mBauteilNr').value:'').trim();
      if(nrValZeile){
        var nrCleanZeile=nrValZeile.toLowerCase()==='alle'?'Alle':nrValZeile;
        desc=desc.split('\n').map(function(line){
          var arrowIdx=line.indexOf('  》》');
          if(arrowIdx>=0)return line.slice(0,arrowIdx)+' '+nrCleanZeile+line.slice(arrowIdx);
          return line+' '+nrCleanZeile;
        }).join('\n');
      }
    }
  }
  var mwBox=g('lagerMesswerte');
  if(mwBox){
    // Widerlager und Pfeiler: sobald eines der beiden ausgefüllt ist, wird das jeweils
    // andere komplett aus der gespeicherten Beschreibung weggelassen (nicht nur leer),
    // da bei einem Lager immer nur eins von beiden zutrifft.
    var wIdx=-1,pIdx=-1;
    curLagerMesswertFelder.forEach(function(f,idx){
      if(f.label==='Widerlager')wIdx=idx;
      if(f.label==='Pfeiler')pIdx=idx;
    });
    var wVal=wIdx>=0&&g('lagerMw'+wIdx)?g('lagerMw'+wIdx).value.trim():'';
    var pVal=pIdx>=0&&g('lagerMw'+pIdx)?g('lagerMw'+pIdx).value.trim():'';
    var mwLines=curLagerMesswertFelder.filter(function(f,idx){
      if(idx===wIdx&&!wVal&&pVal)return false;
      if(idx===pIdx&&!pVal&&wVal)return false;
      var el=g('lagerMw'+idx);
      return !!(el&&el.value.trim());
    }).map(function(f){
      var idx=curLagerMesswertFelder.indexOf(f);
      var el=g('lagerMw'+idx);
      var val=el?el.value.trim():'';
      return '- '+f.label+': '+val+(f.unit||'');
    }).join('\n');
    desc=desc?mwLines+'\n'+desc:mwLines;
  }
  if(locHeading)desc=desc?locHeading+'\n'+desc:locHeading;
  if(!desc)return '';
  var vbsTxt=vbsSuffix();
  if(vbsTxt)desc=desc+'\n- '+vbsTxt;
  return desc;
}

// Entfernt die erste Zeile (Standort-/Bauteil-Überschrift) aus einem Beschreibungstext —
// wird für die "Beide"-Zusammenführung gebraucht, da dort eine gemeinsame Überschrift
// ("... links und rechts") vor die beiden Abschnitte "Links:"/"Rechts:" gesetzt wird.
function stripHeadingLine(desc){
  var lines=(desc||'').split('\n');
  lines.shift();
  return lines.join('\n');
}

// Schritt 1→2 des "Beide"-Ablaufs: der gerade fertig ausgefüllte Links-Teil wird
// zwischengespeichert, danach wird die Erfassungsmaske komplett zurückgesetzt und auf die
// Rechts-Seite desselben Bauteils umgeschaltet — der Nutzer erfasst dort ganz normal die
// (ggf. andersartigen) Schäden für Rechts.
function startBeidePhase2(desc){
  S.beideLinksDesc=desc;
  S.beideLinksFotos=mPendingFotos.slice();
  S.beideLinksTyp=S.typ;S.beideLinksArt=S.art;
  S.beidePhase=2;
  S.key=S.beideBaseKey+'___'+S.beideBaseName+' rechts';
  S.ugr=S.beideBaseName+' rechts';
  S.schTitle=S.beideBereich+' / '+S.ugr;
  openMod();
  toast('Links gespeichert — jetzt Rechts erfassen');
}

function saveS(keepOpen){
  if(S.beidePhase===1){
    var descL=buildFormDesc();
    if(!descL){toast('Bitte Schaden wählen und bestätigen');return;}
    startBeidePhase2(descL);
    return;
  }
  if(S.editIdx>=0&&S.editIsBeide){
    var rawDesc=g('mDesc').value.trim();
    if(!rawDesc){toast('Beschreibung darf nicht leer sein');return;}
    if(!dat[S.key]||!dat[S.key][S.editIdx]){toast('Fehler: Eintrag nicht gefunden');return;}
    dat[S.key][S.editIdx].d=rawDesc;
    dat[S.key][S.editIdx].fotos=mPendingFotos.slice();
    S.editIdx=-1;S.editIsBeide=false;
    mPendingFotos=[];
    clearResumeState();
    renderSch();render();autoSave();
    toast('Änderung gespeichert ✓');
    hidePanel('ovMod');
    if(g('ovGesamt')&&g('ovGesamt').classList.contains('open'))openGesamtschaeden();
    return;
  }
  var desc=buildFormDesc();
  if(!desc){toast('Bitte Schaden wählen und bestätigen');return;}
  if(!S.key){toast('Fehler: kein Bauteil gewählt');return;}
  if(S.beidePhase===2){
    var bare=buildLocationHeadingBare(S.beideBaseKey);
    var combinedHeading=(bare?bare+', ':'')+S.beideBaseName+' links und rechts';
    // Geländer ist das einzige "Beide"-fähige nummerierte Bauteil, und dort steht die
    // Bauteil-Nr. (welche Pfosten betroffen sind) bewusst an jeder einzelnen Schadenszeile
    // statt in der Überschrift (siehe NR_PRO_SYMPTOMZEILE_BAUTEILE) — bleibt beim
    // Zusammenführen dadurch automatisch erhalten, ohne dass hier extra etwas
    // herausgelöst werden müsste.
    var combinedDesc=combinedHeading+'\nLinks:\n'+stripHeadingLine(S.beideLinksDesc)+'\nRechts:\n'+stripHeadingLine(desc);
    var fkLinks=S.beideBaseKey+'___'+S.beideBaseName+' links';
    var fkRechts=S.beideBaseKey+'___'+S.beideBaseName+' rechts';
    if(!dat[fkLinks])dat[fkLinks]=[];
    if(!dat[fkRechts])dat[fkRechts]=[];
    var loc=S.beideBereich+' / '+S.beideBaseName+' links und rechts';
    // Zwei unabhängige Kopien (kein geteiltes Objekt) — dieselbe Logik wie die bestehenden
    // "Übernehmen"-Kopierfunktionen im Rest der App: nach dem Anlegen lässt sich jede Kopie
    // für sich bearbeiten/löschen, ohne die jeweils andere zu verändern.
    dat[fkLinks].push({d:combinedDesc,fotos:(S.beideLinksFotos||[]).slice(),loc:loc,t:S.typ,a:S.art});
    dat[fkRechts].push({d:combinedDesc,fotos:mPendingFotos.slice(),loc:loc,t:S.typ,a:S.art});
    resetBeideState();
    mPendingFotos=[];
    clearResumeState();
    renderSch();render();autoSave();
    toast('Gespeichert ✓ (Links + Rechts)');
    hidePanel('ovMod');
    if(g('ovGesamt')&&g('ovGesamt').classList.contains('open'))openGesamtschaeden();
    return;
  }
  if(!dat[S.key])dat[S.key]=[];
  var entry={d:desc,fotos:mPendingFotos.slice(),loc:S.schTitle||'',t:S.typ,a:S.art};
  if(S.editIdx>=0&&dat[S.key][S.editIdx]){
    dat[S.key][S.editIdx]=entry;

function doBackup(){
  autoSave();
  toast('Sicherung wird erstellt…');
  var payload={meta:{tool:'bruecken-karten-app',exported:new Date().toISOString()},data:{}};
  BACKUP_KEYS.forEach(function(k){
    var v=null;
    try{v=localStorage.getItem(k);}catch(e){}
    payload.data[k]=v;
  });
  // Bilddaten liegen jetzt in IndexedDB, nicht mehr in localStorage — für eine
  // vollständige Sicherung müssen sie hier separat mit eingesammelt werden,
  // sonst fehlen die Fotos in der exportierten Datei.
  idbGetAllFotos().then(function(photoMap){
    payload.photos=photoMap;
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var stamp=new Date().toISOString().slice(0,16).replace(/[-:T]/g,'').replace(/(\d{8})(\d{4})/,'$1_$2');
    // Strecke/Kilometer wie beim docx-Export mit in den Dateinamen aufnehmen, damit
    // Sicherungen auch anhand des Dateinamens dem richtigen Bauwerk zuzuordnen sind.
    var sStr=g('f_str')?(g('f_str').value||'').trim():'';
    var sKm=g('f_km')?(g('f_km').value||'').trim():'';
    function sani(s){return s.replace(/[\/\\?%*:|"<>]/g,'').replace(/\s+/g,'-');}
    var locPart=(sStr||sKm)?('_'+sani(sStr||'ohneStrecke')+'_'+sani(sKm||'ohneKm')):'';
    triggerDownload(blob,'bp_sicherung'+locPart+'_'+stamp+'.json');
  }).catch(function(){
    toast('⚠️ Fotos konnten nicht in die Sicherung aufgenommen werden!');
  });
}

function handleRestoreFile(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var payload=JSON.parse(reader.result);
      var data=payload.data||payload;
      if(!confirm('Aktuelle Daten werden durch die Sicherung ersetzt. Fortfahren?'))return;
      BACKUP_KEYS.forEach(function(k){
        if(data[k]!=null){try{localStorage.setItem(k,data[k]);}catch(e){}}
        else{try{localStorage.removeItem(k);}catch(e){}}
      });
      // Neue Sicherungen enthalten die Fotos separat unter payload.photos (weil
      // sie in IndexedDB statt localStorage liegen). Alte Sicherungen (vor dem
      // Umbau) haben die Bilddaten noch direkt in bp_dat eingebettet — die
      // Migration dafür läuft beim nächsten Laden automatisch (hydrateFotosFromIdb).
      var photoWrites=Object.keys(payload.photos||{}).map(function(fid){
        return idbPutFoto(fid,payload.photos[fid]);
      });
      Promise.all(photoWrites).then(function(){
        toast('Wiederhergestellt — Seite wird neu geladen ✓');
        setTimeout(function(){location.reload();},800);
      }).catch(function(){
        toast('⚠️ Fotos aus Sicherung konnten nicht geschrieben werden');
        setTimeout(function(){location.reload();},1200);
      });
    }catch(err){
      toast('Datei konnte nicht gelesen werden');
    }
  };
  reader.readAsText(file);
  g('restoreInput').value='';
}

// Minimal ZIP creator (pure JS, no dependencies)
function PureZip(){
  this.files=[];
}
PureZip.prototype.file=function(name,data,opts){
  this.files.push({name:name,data:data,opts:opts||{}});
};
PureZip.prototype.generateAsync=function(opts){
  var self=this;
  return new Promise(function(resolve){
    var parts=[];
    var centralDir=[];
    var offset=0;
    self.files.forEach(function(f){
      var nameBytes=strToBytes(f.name);
      var dataBytes=f.opts.base64?base64ToBytes(f.data):strToBytes(f.data);
      var crc=crc32(dataBytes);
      var localHeader=makeLocalHeader(nameBytes,dataBytes,crc);
      centralDir.push({nameBytes:nameBytes,dataBytes:dataBytes,crc:crc,offset:offset});
      parts.push(localHeader);
      parts.push(dataBytes);
      offset+=localHeader.length+dataBytes.length;
    });
    var cdStart=offset;
    centralDir.forEach(function(e){
      parts.push(makeCentralDir(e.nameBytes,e.dataBytes,e.crc,e.offset));
    });
    var cdEnd=offset;
    centralDir.forEach(function(e){
      cdEnd+=46+e.nameBytes.length;
    });
    parts.push(makeEndRecord(centralDir.length,cdEnd-offset,cdStart));
    resolve(new Blob(parts.map(function(p){return p instanceof Uint8Array?p:new Uint8Array(p);}),{type:'application/zip'}));
  });
};
function strToBytes(s){
  var bytes=[];
  for(var i=0;i<s.length;i++){
    var c=s.codePointAt(i);
    if(c>0xFFFF)i++; // consumed a surrogate pair
    if(c<0x80){
      bytes.push(c);
    } else if(c<0x800){
      bytes.push(0xc0|(c>>6), 0x80|(c&0x3f));
    } else if(c<0x10000){
      bytes.push(0xe0|(c>>12), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f));
    } else {
      bytes.push(0xf0|(c>>18), 0x80|((c>>12)&0x3f), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f));
    }
  }
  return new Uint8Array(bytes);
}
function base64ToBytes(b64){
  var bin=atob(b64);
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return bytes;
}
function crc32(data){
  var table=crc32.table||(function(){var t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=((c&1)?0xedb88320:0)^(c>>>1);t[n]=c;}return crc32.table=t;})();
  var crc=0xffffffff;
  for(var i=0;i<data.length;i++)crc=(crc>>>8)^table[(crc^data[i])&0xff];
  return (crc^0xffffffff)>>>0;
}
function u16(n){return [n&0xff,(n>>8)&0xff];}
function u32(n){return [n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff];}
function makeLocalHeader(name,data,crc){
  var h=[0x50,0x4b,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00];
  h=h.concat(u32(crc));
  h=h.concat(u32(data.length));
  h=h.concat(u32(data.length));
  h=h.concat(u16(name.length));
  h=h.concat([0x00,0x00]);
  return new Uint8Array(h.concat(Array.from(name)));
}
function makeCentralDir(name,data,crc,offset){
  var h=[0x50,0x4b,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00];
  h=h.concat(u32(crc));
  h=h.concat(u32(data.length));
  h=h.concat(u32(data.length));
  h=h.concat(u16(name.length));
  h=h.concat([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]);
  h=h.concat(u32(offset));
  return new Uint8Array(h.concat(Array.from(name)));
}
function makeEndRecord(count,cdSize,cdOffset){
  var h=[0x50,0x4b,0x05,0x06,0x00,0x00,0x00,0x00];
  h=h.concat(u16(count));
  h=h.concat(u16(count));
  h=h.concat(u32(cdSize));
  h=h.concat(u32(cdOffset));
  h=h.concat([0x00,0x00]);
  return new Uint8Array(h);
}

// Download all photos as ZIP
function downloadFotos(){
  var zip=new PureZip();
  var count=0;
  function processFotoBlist(blist){
    blist.forEach(function(b){
      b.u.forEach(function(u){
        (dat[b.k+'___'+u]||[]).forEach(function(it){
          (it.fotos||[]).forEach(function(foto){
            count++;
            var ext=foto.data.indexOf('jpeg')>-1||foto.data.indexOf('jpg')>-1?'jpg':'png';
            var b64=foto.data.split(',')[1];
            zip.file('Foto_'+(foto.nr||count)+'.'+ext, b64, {base64:true});
          });
        });
      });
    });
  }
  if(isDurchgehendW()){
    processFotoBlist([{k:'wg_w1',u:getUgr('wg_w1')},{k:'wg_w2',u:getUgr('wg_w2')}]);
  }
  stbs.forEach(function(stb){
    var blist=isDurchgehendW()?[]:[{k:'stb'+stb.id+'_w1',u:getUgr('stb'+stb.id+'_w1')},{k:'stb'+stb.id+'_w2',u:getUgr('stb'+stb.id+'_w2')}];
    for(var i=1;i<=stb.oeff;i++){
      var ok='stb'+stb.id+'_oe'+i;
      var extraU=['Geländer links','Geländer rechts'];
      LAGER_TYPES.forEach(function(t){extraU.push('Lager: '+t);(LAGER_BAUTEILE[t]||[]).forEach(function(teil){extraU.push('Lager: '+t+' - '+teil);});});
      FUGEN_TYPES.forEach(function(t){extraU.push('Fugen: '+t);});
      blist.push({k:ok,u:getUgr(ok).concat(extraU)});
      if(i<stb.oeff)blist.push({k:'stb'+stb.id+'_pf'+i,u:PF_UGR});
    }
    processFotoBlist(blist);
  });
  if(!count){toast('Keine Fotos vorhanden');return;}
  zip.generateAsync({type:'blob'}).then(function(blob){
    triggerDownload(blob,'Fotos_Pruefprotokoll.zip',count+' Fotos heruntergeladen ✓');
  });
}



function xmlEsc(s){

}

  var docRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    rels.map(function(r){return '<Relationship Id="'+r.id+'" Type="'+r.type+'" Target="'+r.target+'"/>';}).join('')+
    '</Relationships>';

  var stylesXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'+
    '<w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Title"><w:name w:val="Title"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:after="240"/></w:pPr><w:rPr><w:b/><w:sz w:val="36"/><w:color w:val="0E7C66"/></w:rPr></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="240" w:after="120"/></w:pPr><w:rPr><w:b/><w:sz w:val="28"/><w:color w:val="0E7C66"/></w:rPr></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="200" w:after="100"/></w:pPr><w:rPr><w:b/><w:sz w:val="24"/><w:color w:val="0E7C66"/></w:rPr></w:style>'+
    '<w:style w:type="paragraph" w:styleId="Heading3"><w:name w:val="heading 3"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="160" w:after="80"/></w:pPr><w:rPr><w:b/><w:sz w:val="22"/><w:color w:val="444444"/></w:rPr></w:style>'+
    '</w:styles>';

  var zip=new PureZip();
  zip.file('[Content_Types].xml',contentTypes);
  zip.file('_rels/.rels',rootRels);
  zip.file('word/document.xml',documentXml);
  zip.file('word/styles.xml',stylesXml);
  zip.file('word/_rels/document.xml.rels',docRels);
  mediaFiles.forEach(function(m){zip.file('word/media/'+m.name,m.base64,{base64:true});});

  zip.generateAsync({type:'blob'}).then(function(blob){
    var docxBlob=new Blob([blob],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    var filename='Pruefprotokoll_'+str+'_'+km+'_'+dt+(includeImages?'':'_ohneBilder')+'.docx';
    var file;
    try{ file=new File([docxBlob],filename,{type:docxBlob.type}); }catch(e){ file=null; }

    if(file && navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:filename}).then(function(){
        toast('Protokoll geteilt ✓');
      }).catch(function(err){
        // User cancelled the share sheet, or it failed — fall back to a normal download
        if(err && err.name==='AbortError')return;
        triggerDownload(docxBlob,filename,'Protokoll wird heruntergeladen ✓');
      });
    } else {
      triggerDownload(docxBlob,filename,'Protokoll wird heruntergeladen ✓');
    }
  }).catch(function(){
    toast('Export fehlgeschlagen — bitte erneut versuchen');
  });
}
function triggerDownload(blob,filename,successMsg){
  // data:-URI statt blob:-URI verwenden — funktioniert zuverlässig auch dann, wenn die
  // App als lokale Datei (file://) geöffnet wurde, wo Chrome blob:-Downloads aus
  // Sicherheitsgründen sonst kommentarlos blockiert.
  var reader=new FileReader();
  reader.onload=function(){
    var a=document.createElement('a');
    a.href=reader.result;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    toast(successMsg||'Herunterladen gestartet ✓');
  };
  reader.onerror=function(){
    toast('Download fehlgeschlagen — bitte erneut versuchen');
  };
  reader.readAsDataURL(blob);
}

function buildSearchIndex(){
  var idx=[];
  stbs.forEach(function(stb,si){
    var lbl='STB '+(si+1);
    var bases=[{k:'stb'+stb.id+'_w1',l:'Widerlager 1 (W1)',ugrFn:function(k){return getUgr(k);}},
               {k:'stb'+stb.id+'_w2',l:'Widerlager 2 (W2)',ugrFn:function(k){return getUgr(k);}}];
    (function(sid,lbl){
      idx.push({txt:lbl+' Widerlager 1 (W1)',fn:function(){openBau('stb'+sid+'_w1','W1',getUgr('stb'+sid+'_w1'));}});
      idx.push({txt:lbl+' Widerlager 2 (W2)',fn:function(){openBau('stb'+sid+'_w2','W2',getUgr('stb'+sid+'_w2'));}});
    })(stb.id,lbl);
    for(var i=1;i<=stb.oeff;i++){
      (function(sid,lbl,i){
        var key='stb'+sid+'_oe'+i;
        idx.push({txt:lbl+' Öffnung '+i,fn:function(){openBau(key,'Öffnung '+i,getUgr(key));}});
        bases.push({k:key,l:'Öffnung '+i});
      })(stb.id,lbl,i);
      if(i<stb.oeff){
        (function(sid,lbl,i){
          var key='stb'+sid+'_pf'+i;
          idx.push({txt:lbl+' Pfeiler '+i,fn:function(){openBau(key,'Pf '+i,PF_UGR);}});
          bases.push({k:key,l:'Pf '+i});
        })(stb.id,lbl,i);
      }
    }
    // Schadenstexte durchsuchbar machen
    bases.forEach(function(bse){
      Object.keys(dat).forEach(function(dk){
        if(dk.indexOf(bse.k+'___')!==0)return;
        var ugrName=dk.substring((bse.k+'___').length);
        (dat[dk]||[]).forEach(function(it){
          if(!it||!it.d)return;
          var firstLine=(it.d.split('\n')[0]||'').replace(/^-\s*/,'');
          idx.push({
            txt:lbl+' '+bse.l+' / '+ugrName+': '+firstLine,
            fn:(function(k,u,l){return function(){openSch(k,u,lbl+' '+l);};})(dk,ugrName,bse.l)
          });
        });
      });
    });
  });
  return idx;
}
(function(){
  var inp=g('bauSearch'),res=g('bauSearchResults');
  if(!inp||!res)return;
  inp.addEventListener('input',function(){
    var q=inp.value.trim().toLowerCase().replace(/\s+/g,'');
    res.innerHTML='';
    if(!q){res.style.display='none';return;}
    var matches=buildSearchIndex().filter(function(e){
      return e.txt.toLowerCase().replace(/\s+/g,'').indexOf(q)>-1;
    }).slice(0,8);
    if(!matches.length){res.style.display='none';return;}
    matches.forEach(function(m){
      var b=document.createElement('div');
      b.textContent=m.txt;
      b.style.cssText='padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line);color:var(--ink);';
      b.onclick=function(){m.fn();inp.value='';res.style.display='none';};
      res.appendChild(b);
    });
    res.style.display='block';
  });
  inp.addEventListener('blur',function(){setTimeout(function(){res.style.display='none';},150);});
})();
