<!DOCTYPE html>
<html lang="de"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brückenprüfung [BETA]</title>
<style>
:root{--bg:#f4f6f9;--sur:#fff;--s2:#f0f3f7;--ink:#16202b;--soft:#5b6b7c;--faint:#8a99a8;--line:#e2e8ef;--acc:#0e7c66;--accs:#e3f3ef;--red:#c0392b;--reds:#fdecea;}
body.dark{--bg:#111518;--sur:#1a2028;--s2:#232c36;--ink:#e8eef4;--soft:#8fa3b3;--faint:#5a6e7e;--line:#2a3540;--acc:#13a386;--accs:#0e2e28;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
header{background:var(--sur);color:var(--ink);border-bottom:1px solid var(--line);box-shadow:0 1px 2px rgba(16,32,43,.05);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
header h1{font-size:15px;font-weight:700;flex:1;}
.hbtn{border:0;background:var(--s2);color:var(--ink);width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:14px;}
/* KOPF */
.kopf{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:var(--sur);border-bottom:1px solid var(--line);}
.kopf .full{grid-column:1/-1;}
.fl label{display:block;font-size:11px;color:var(--soft);margin-bottom:3px;font-weight:600;}
.fl input{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-family:inherit;font-size:13px;background:var(--s2);color:var(--ink);outline:none;}
.fl input:focus{border-color:var(--acc);}
/* GRID */
.wrap{overflow-x:auto;padding:8px 8px 0;}
.grid{display:flex;gap:5px;align-items:flex-start;min-width:min-content;}
/* STB SPALTE (tatsächlich verwendete Klassen) */
.col{width:128px;flex-shrink:0;display:flex;flex-direction:column;}
.col-hdr{background:var(--acc);color:#fff;border-radius:7px 7px 0 0;padding:6px 8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;}
.col-hdr .sc{font-size:9.5px;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 6px;}
.col-hdr .dx{border:0;background:rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:1px 5px;cursor:pointer;font-size:10px;margin-left:auto;}
.dx{border:0;background:#ffebee;color:#c62828;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;}
.col-table{border:1.5px solid var(--line);border-radius:8px;overflow:hidden;flex:1;}
.wg-bar{margin:0;box-sizing:border-box;padding:14px 16px;border-radius:8px;background:#2e7d32;color:#fff;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:700;font-size:15px;}
.wg-bar .wgc{background:rgba(255,255,255,.25);border-radius:16px;padding:2px 13px;font-size:15px;}
.wg-bar .wgl{display:flex;align-items:center;gap:8px;}
#wgW2Bar:not(:empty){margin-bottom:8px;}
#wgW1Bar:not(:empty){margin-top:8px;}
.col-table>div{border-top:1.5px solid var(--line);}
.col-table>div:first-child{border-top:0;}
.stb{display:flex;flex-direction:column;gap:0;width:118px;flex-shrink:0;}
.stb-hdr{background:var(--acc);color:#fff;border-radius:7px 7px 0 0;padding:6px 8px;font-size:11.5px;font-weight:700;display:flex;align-items:center;}
.stb-hdr .sc{font-size:9px;background:rgba(255,255,255,.25);border-radius:9px;padding:1px 5px;margin-left:5px;}
.stb-hdr .dx{border:0;background:rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:1px 5px;cursor:pointer;font-size:10px;margin-left:auto;}
/* KACHEL */
.ka{background:var(--sur);border:1.5px solid var(--line);cursor:pointer;transition:border-color .15s;flex:1;}
.ka.wid{background:#e8f5e9;border-color:#4caf50;}
.ka.wid .ka-name{color:#2e7d32;}
.ka.wid .ka-cnt{border-color:#4caf50;color:#2e7d32;}
.ka.wid.hat .ka-cnt{background:#4caf50;border-color:#4caf50;color:#fff;}
.ka.pf{background:#e3f2fd;border-color:#1e88e5;}
.ka.pf .ka-name{color:#1565c0;}
.ka.pf .ka-cnt{border-color:#1e88e5;color:#1565c0;}
.ka.pf.hat .ka-cnt{background:#1e88e5;border-color:#1e88e5;color:#fff;}
body.dark .ka.wid{background:#1b3a1f;border-color:#4caf50;}
body.dark .ka.pf{background:#0d2137;border-color:#1e88e5;}
.ka:hover{border-color:var(--acc);}
.ka.hat{border-color:var(--acc);background:var(--accs);}
.ka-inner{padding:6px 8px;display:flex;align-items:center;justify-content:space-between;}
.ka-name{font-size:10.5px;font-weight:700;color:var(--soft);}
.ka.hat .ka-name{color:var(--acc);}
.ka-cnt{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--faint);}
.ka.hat .ka-cnt{background:var(--acc);color:#fff;border-color:var(--acc);}
/* ÖFFNUNG KACHEL */
.oeka{background:#fff;border:1.5px solid #999;border-radius:7px;cursor:pointer;transition:border-color .15s;min-height:44px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.oeka:hover{border-color:var(--acc);}
.oeka.hat{border-color:var(--acc);background:var(--accs);}
body.dark .oeka{background:var(--sur);border-color:#555;}
.oeka:hover{border-color:var(--acc);}
.oeka.hat{border-color:var(--acc);background:var(--accs);}
.oe-hdr{padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.oe-name{font-size:10.5px;font-weight:700;color:var(--soft);}
.oeka.hat .oe-name{color:var(--acc);}
.oe-cnt{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--faint);}
.oeka.hat .oe-cnt{background:var(--acc);color:#fff;border-color:var(--acc);}

/* ADD ÖFFNUNG */
.add-oe{border:2px dashed var(--acc);background:var(--accs);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--acc);border-radius:7px;flex-shrink:0;}
.add-oe:hover{background:var(--acc);color:#fff;}
.stb-row{display:flex;align-items:stretch;gap:6px;}
/* STB BOTTOM */

/* ADD STB */
.add-stb{display:flex;justify-content:flex-start;gap:8px;margin-top:10px;padding-left:4px;}
.as{border:2px solid var(--acc);background:var(--accs);color:var(--acc);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
/* EXPORT */
.expbar{display:flex;gap:8px;padding:12px;flex-wrap:wrap;}
.expbar button{flex:1 1 auto;min-width:100px;}
.expbar button{flex:1;padding:11px;border:0;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.be{background:var(--acc);color:#fff;}
.bn{background:var(--red);color:#fff;}
/* OVERLAY */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.pan{background:var(--sur);border-radius:12px 12px 0 0;padding:18px;width:100%;max-width:100%;max-height:92vh;overflow-y:auto;}
.pbar{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 12px;}
.ptop{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ptop h3{font-size:15px;font-weight:700;color:var(--acc);flex:1;}
#ovGesamt .ptop h3{font-size:22px;text-align:center;}
.bback{border:1px solid var(--line);background:var(--s2);color:var(--soft);padding:6px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;}
.sb{width:100%;padding:10px 13px;border:1px solid var(--line);background:var(--s2);border-radius:7px;text-align:left;cursor:pointer;font-size:13px;color:var(--ink);font-family:inherit;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.sb:hover{border-color:var(--acc);background:var(--accs);color:var(--acc);font-weight:600;}
.sb.on{border-color:var(--acc);background:var(--acc);color:#fff;font-weight:700;}
.uc{background:var(--acc);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;}
.pan textarea{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px;font-family:inherit;font-size:14px;background:var(--s2);color:var(--ink);outline:none;height:90px;resize:none;margin-top:6px;}
#mDesc{font-family:'Courier New',monospace;font-size:15px;font-weight:700;color:#000;min-height:180px;max-height:55vh;overflow-y:auto;border:2px solid var(--acc)!important;}
body.dark #mDesc{color:var(--ink);}
.pbtns{display:flex;gap:8px;margin-top:12px;}
.pbtns button{flex:1;padding:11px;border-radius:7px;border:0;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;}
.ps{background:var(--acc);color:#fff;}
.pc{background:var(--s2);color:var(--soft);border:1px solid var(--line)!important;}
.irow{display:flex;gap:8px;align-items:center;margin-bottom:8px;justify-content:center;}
.irow label{font-size:13px;color:var(--soft);width:110px;flex-shrink:0;font-weight:600;text-align:right;}
.irow input{flex:none;width:64px;border:2px solid var(--acc);border-radius:7px;padding:8px 4px;font-size:15px;font-weight:700;background:var(--s2);color:var(--ink);outline:none;text-align:center;}
.irow span{font-size:11px;color:var(--faint);width:24px;flex-shrink:0;}
.sitem{background:var(--s2);border:1px solid var(--line);border-radius:7px;padding:9px;margin-bottom:7px;}
.gbau{border:1.5px solid var(--acc);border-radius:9px;margin-bottom:10px;overflow:hidden;}
.gbau-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--accs);cursor:pointer;user-select:none;}
.gbau-hdr .gt{font-size:15px;font-weight:700;color:var(--acc);}
.gbau-hdr .gc{background:var(--acc);color:#fff;border-radius:14px;padding:2px 11px;font-size:13px;font-weight:700;}
.gbau-hdr .garr{color:var(--acc);font-size:13px;margin-left:8px;transition:transform .15s;}
.gbau-hdr.open .garr{transform:rotate(90deg);}
.gbau-body{padding:10px;display:none;}
.gbau-body.open{display:block;}
.sitem .sr{display:flex;align-items:center;gap:8px;}
.sitem span{flex:1;font-size:13px;}
.sitem button{border:0;background:var(--reds);color:var(--red);border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;}
.sitem img{max-width:100%;max-height:80px;border-radius:6px;cursor:zoom-in;margin-top:6px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;z-index:300;display:none;}
.toast.show{display:block;}
</style>
</head>
<body>
<header>
  <div style="width:30px;height:30px;background:linear-gradient(135deg,var(--acc),#13a386);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:#fff;flex-shrink:0;">BP</div>
  <h1>Brückenprüfung <span style="font-size:12px;background:#ff9800;color:#fff;padding:2px 8px;border-radius:10px;vertical-align:middle;">BETA</span></h1>
  <button class="hbtn" id="kopfToggleBtn" onclick="toggleKopf()">▾</button>
  <button class="hbtn" id="darkBtn">☀️</button>
</header>
<div class="kopf" id="kopfBox">
  <div class="fl"><label>Strecke</label><input id="f_str" placeholder="z.B. 5900" inputmode="numeric"></div>
  <div class="fl"><label>Kilometer</label><input id="f_km" placeholder="z.B. 66,092" inputmode="decimal"></div>
  <div class="fl full"><label>Brückenname</label><input id="f_br" placeholder="z.B. EÜ Musterstraße"></div>
  <div class="fl"><label>Datum</label><input id="f_dat" type="date"></div>
  <div class="fl"><label>Prüfer</label><input id="f_pr" placeholder="Name"></div>
</div>
<div style="padding:10px 12px 0;position:relative;display:flex;gap:8px;align-items:flex-start;">
  <div style="flex:1;position:relative;">
    <input id="bauSearch" placeholder="🔍 Bauteil suchen (z.B. STB 2 Ö3)" style="width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 12px;font-family:inherit;font-size:13px;background:var(--s2);color:var(--ink);outline:none;">
    <div id="bauSearchResults" style="position:absolute;left:0;right:0;top:100%;background:var(--sur);border:1px solid var(--line);border-radius:0 0 7px 7px;box-shadow:0 4px 10px rgba(0,0,0,.15);z-index:40;display:none;max-height:220px;overflow-y:auto;"></div>
  </div>
  <button onclick="S.gesamtReturnTo=null;openGesamtschaeden()" style="border:1.5px solid var(--acc);background:var(--accs);color:var(--acc);border-radius:7px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">📋 Gesamtschäden</button>
</div>

<!-- GESAMTSCHÄDEN PANEL -->
<div class="ov" id="ovGesamt">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="zurueckAusGesamtschaeden()">← Zurück</button>
      <h3>Gesamtschäden</h3>
    </div>
    <div id="gesamtList"></div>
  </div>
</div>

<div class="wrap"><div id="wgW2Bar"></div><div class="grid" id="mainGrid"></div><div id="wgW1Bar"></div></div>
<div id="stbBtnArea" style="padding:0 12px 12px;"></div>
<div class="expbar">
  <button class="be" onclick="doExport(true)">📄🖼 Mit Bildern</button>
  <button style="border:0;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#5b6b7c;color:#fff;" onclick="doExport(false)">📄 Nur Dokument</button>
  <button style="border:0;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#1565c0;color:#fff;" onclick="downloadFotos()">🖼 Nur Bilder</button>
  <button class="bn" onclick="doNew()">🗑 Neu</button>
  <button style="border:1.5px solid var(--acc);background:var(--accs);color:var(--acc);border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;" onclick="doBackup()">💾 Sichern</button>
  <button style="border:1.5px solid var(--line);background:var(--sur);color:var(--ink);border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;" onclick="g('restoreInput').click()">📂 Wiederherstellen</button>
  <input type="file" id="restoreInput" accept="application/json" style="display:none;" onchange="handleRestoreFile(this.files[0])">
</div>

<!-- BAUTEILE PANEL -->
<div class="ov" id="ovBau">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="g('ovBau').classList.remove('open')">← Zurück</button>
      <h3 id="bauTitle">Bauteile</h3>
    </div>
    <div id="bauList"></div>
  </div>
</div>

<!-- SCHÄDEN EINES BAUTEIL-BEREICHS (z.B. "Schäden Öffnung 1") — eigener Bildschirm,
     getrennt von der Kachel-Auswahl zum Anlegen neuer Schäden. "Zurück" führt einfach
     zur Kachel-Auswahl zurück, die im Hintergrund weiter offen bleibt. Wichtig: MUSS im
     HTML nach #ovBau stehen, da alle .ov-Panels denselben z-index haben und sich beim
     gleichzeitigen Offensein rein nach DOM-Reihenfolge überdecken — stand dieser Block
     vor #ovBau, wurde er komplett von #ovBau verdeckt und schien "nichts zu tun".
-->
<div class="ov" id="ovBauSchaeden">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="g('ovBauSchaeden').classList.remove('open');">← Zurück</button>
      <h3 id="bauSchaedenTitle"></h3>
    </div>
    <div id="bauSchaedenList"></div>
  </div>
</div>

<!-- SCHÄDEN PANEL -->
<div class="ov" id="ovSch">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="g('ovSch').classList.remove('open');if(S.bauKey)openBau(S.bauKey,S.bauTitle,S.lastUgr);">← Zurück</button>
      <h3 id="schTitle">Schäden</h3>

    </div>
    <div id="schUgrSwitch" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
    <div id="schList"></div>
    <button onclick="openMod()" style="width:100%;padding:9px;border:1.5px dashed var(--acc);background:transparent;color:var(--acc);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;">+ Schaden hinzufügen</button>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">
  </div>
</div>

<!-- SCHADEN MODAL -->
<div class="ov" id="ovMod">
  <div class="pan">
    <div class="pbar"></div>
    <div class="ptop">
      <button class="bback" onclick="resetBeideState();g('ovMod').classList.remove('open');">← Zurück</button>
      <h3 style="flex:1;">Schaden erfassen</h3>
      <div id="mSchadenNr" style="font-size:13px;font-weight:800;color:#fff;background:var(--acc);border-radius:10px;padding:4px 12px;white-space:nowrap;"></div>
    </div>
    <div id="mTyp"></div>
    <div id="mVerortung" style="font-size:13px;font-weight:700;color:var(--acc);padding:8px 10px;background:var(--accs);border-radius:7px;margin-bottom:8px;"></div>
    <div id="mArt" style="display:none;margin-top:10px;"></div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);">
      <div id="mBauteilNrRow" style="display:none;align-items:center;gap:8px;margin-bottom:10px;">
        <label id="mBauteilNrLabel" style="font-size:13px;color:var(--soft);font-weight:600;">Nr.:</label>
        <input id="mBauteilNr" type="text" inputmode="decimal" placeholder="z.B. 3 oder 1,2,3,4" oninput="updateVerortungDisplay();updateHeadingLineInDesc();" style="width:130px;border:2px solid var(--acc);border-radius:7px;padding:8px 8px;font-size:15px;font-weight:700;background:var(--s2);color:var(--ink);outline:none;text-align:center;">
        <button type="button" onclick="g('mBauteilNr').value='Alle';updateVerortungDisplay();" style="border:1.5px solid var(--acc);background:var(--accs);color:var(--acc);border-radius:7px;padding:8px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Alle</button>
      </div>
      <div id="mBauteilRefRow" style="display:none;align-items:center;gap:8px;margin-bottom:10px;">
        <label id="mBauteilRefLabel" style="font-size:13px;color:var(--soft);font-weight:600;">an Hauptträger Nr.:</label>
        <input id="mBauteilRef" type="text" inputmode="decimal" placeholder="z.B. 2" oninput="updateVerortungDisplay();updateHeadingLineInDesc();" style="width:100px;border:2px solid var(--acc);border-radius:7px;padding:8px 8px;font-size:15px;font-weight:700;background:var(--s2);color:var(--ink);outline:none;text-align:center;">
      </div>
      <div id="mBauteilPosRow" style="display:none;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <label style="font-size:13px;color:var(--soft);font-weight:600;">Lage:</label>
        <div id="mBauteilPosBtns" style="display:flex;gap:6px;"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <label style="font-size:12px;color:var(--soft);font-weight:600;">📝 Beschreibung</label>
        <button type="button" onclick="if(g('mDesc').value&&!confirm('Beschreibung wirklich löschen?'))return;g('mDesc').value='';autoGrowMDesc();resetMassnahmeBox();curSchadenEntries=[];renderSchadenChips();var gb=g('genauBox');if(gb){gb.style.display='none';gb.innerHTML='';}" style="border:0;background:none;color:#c62828;font-size:12px;cursor:pointer;font-family:inherit;padding:2px 4px;">🗑 Löschen</button>
      </div>
      <div id="schadenChips" style="display:none;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
      <div id="genauBox" style="display:none;background:var(--accs);border:2px solid var(--acc);border-radius:9px;padding:10px;margin-bottom:8px;"></div>
      <textarea id="mDesc" placeholder="Beschreibung..." onfocus="scrollMDescIntoView()" oninput="autoGrowMDesc()"></textarea>
      <div id="massnahmeBox" style="display:none;margin-top:6px;flex-direction:column;gap:6px;background:var(--accs);border:2px solid var(--acc);border-radius:9px;padding:10px;"></div>
      <div id="mVbsRow" style="display:flex;gap:6px;margin-top:8px;"></div>
    </div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);">
      <label style="font-size:12px;color:var(--soft);font-weight:600;">📷 Foto</label>
      <div style="display:flex;gap:6px;margin-top:5px;">
        <div id="mTakeFotoBtn" onclick="takeMFoto()" style="flex:1;border:1.5px dashed var(--line);border-radius:7px;padding:9px;text-align:center;cursor:pointer;color:var(--faint);font-size:13px;">📷 Foto aufnehmen</div>

// Bauteile, deren Schadenskatalog unabhängig vom übergeordneten Material fest vorgegeben ist
function resolveSchadenTyp(baseKey,bauteil,parentTyp){
  if(bauteil==='Auflagerbank')return 'Beton';
  if(bauteil==='Böschungsbefestigung')return 'Böschungsbefestigung';
  if(bauteil==='Übergang zum Bahnkörper')return 'Beton';
  if(bauteil==='Kabeltrog/Kabelkanal')return 'Kabeltrog';
  if(/_w[12]$/.test(baseKey))return parentTyp==='Mauerwerk'?'Mauerwerk':'Beton';
  if(/_pf\d+$/.test(baseKey))return parentTyp==='Mauerwerk'?'Mauerwerk':'Beton';
  // Öffnung
  if(bauteil==='Walzträgerunterflansch')return 'WIB-Stahl';
  if((bauteil==='Randweg links'||bauteil==='Randweg rechts')&&parentTyp==='Gew.Mauerwk')return 'BetonLQS';
  if(parentTyp==='Stahl')return 'Stahl';
  if(parentTyp==='WIB')return 'BetonLQS';
  if(parentTyp==='Gew.Beton')return 'BetonLQS';
  if(parentTyp==='Gew.Mauerwk')return 'MauerwerkLQS';
  return 'BetonLQS';
}

// ============================================================
// DATENSCHEMA (dat-Objekt) — bitte lesen, bevor an Schlüssel-Konstruktion
// (Speichern/Auslesen von Schäden) etwas geändert wird
// ============================================================
// `dat` ist ein flaches Objekt. Schaden-Einträge liegen unter zusammengesetzten
// Text-Schlüsseln nach dem Muster:
//
//     <bauteilKey>___<UgrText>          →  Array von Schaden-Einträgen
//
// Beispiele für <bauteilKey>:
//   stb<id>_w1 / stb<id>_w2   Widerlager 1/2 eines einzelnen STB
//   wg_w1 / wg_w2             Widerlager 1/2 "durchgehend" (STB-übergreifend, siehe unten)
//   stb<id>_oe<n>             Öffnung n eines STB
//   stb<id>_pf<n>             Pfeiler n eines STB
//
// <UgrText> ist einer der Bauteilbegriffe aus den *_UGR-Katalogen weiter unten
// (z.B. "Widerlager Vorderansicht", "Kammerwand links", "Querträger" ...).
//
// SONDERFALL Links/Rechts-Bauteile (z.B. "Geländer links"/"Geländer rechts",
// "Kappe links"/"Kappe rechts" usw. — überall, wo ein *_UGR-Eintrag auf " links"
// oder " rechts" endet): Links und Rechts sind zwei GETRENNTE <UgrText>-Werte,
// landen also in zwei getrennten dat[]-Arrays. Die Erfassungsmaske erkennt
// solche Paare automatisch (isRL-Prüfung in openBau/render) und bietet dort
// einen gemeinsamen Auswahlbildschirm (openReliSel) mit drei Optionen:
//   "Links"   → normaler Eintrag in <bauteilKey>___<Bauteil> links
//   "Rechts"  → normaler Eintrag in <bauteilKey>___<Bauteil> rechts
//   "Beide"   → siehe eigener Abschnitt "BEIDE-ABLAUF" weiter unten
//
// SONDERFALL Lager (bei Öffnungen, wenn kein Gewölbe-Typ gewählt ist):
//   <bauteilKey>___Lager: <LagerTyp>                    → Eintrag direkt am Lager
//   <bauteilKey>___Lager: <LagerTyp> - <LagerBauteil>    → Eintrag an einem Lager-Bauteil
//   (LagerTyp aus LAGER_TYPES, LagerBauteil aus LAGER_BAUTEILE[LagerTyp])
//
// SONDERFALL Fugen (bei Öffnungen, wenn kein Gewölbe-Typ gewählt ist):
//   <bauteilKey>___Fugen: <FugenTyp>     (FugenTyp aus FUGEN_TYPES)
//
// WICHTIG: Jede Funktion, die Schäden sucht/zählt (collectAllSchaeden, cntKey,
// mkKa, mkOe ...), muss <bauteilKey> und <UgrText> exakt genau so zusammensetzen
// wie beim Speichern (saveS/openSch) — sonst werden vorhandene Einträge nicht
// gefunden ("verschwinden" scheinbar, obwohl sie noch in dat liegen). Genau das
// war die Ursache des Widerlager-durchgehend-Bugs (Juli 2026).
//
// Zusatz-Schlüssel (kein Array, sondern Einzelwerte):
//   __t_<bauteilKey>       gewählter Bauwerks-/Überbautyp (Beton/Stahl/... ) für dieses Bauteil
//   __durchgehendW         true/false, ob Widerlager STB-übergreifend zusammengefasst sind
//   __recentArt_<S.typ>   zuletzt verwendete Schadensarten (für die Schnellauswahl)
//
// "Durchgehend"-Umschaltung (migrateWiderlagerDurchgehend) verschiebt Einträge
// zwischen stb<id>_w1/_w2 und wg_w1/wg_w2, OHNE die __t_-Typangaben zu löschen.
//
// Die sechs Kernfelder von S unten beschreiben zusammen "wo bin ich gerade":
//   S.bauKey  = aktuell geöffnetes Bauteil (z.B. "stb1_w1")
//   S.key     = aktuell geöffneter Schaden-Schlüssel (S.bauKey + "___" + S.ugr)
//   S.ugr     = aktuell gewählter Bauteilbegriff (UgrText)
//   S.schTitle= Anzeigetext "wo bin ich" (für Fotos/Export)
//   S.typ     = aufgelöster Schadenskatalog-Typ (z.B. "Stahl", "Lager:Elastomerlager")
//   S.art     = aktuell gewählte Schadensart innerhalb des Formulars
// Sie werden an mehreren Stellen (openBau, openSch, openMod, saveS) gesetzt und
// gelesen — bei Änderungen an einer dieser Funktionen prüfen, ob die anderen
// noch mit dem konsistent sind, was hier gesetzt wird.
//
// BEIDE-ABLAUF (Links+Rechts in einem Rutsch, seit Juli 2026, nur Beta):
// Eigene Zusatzfelder in S, gedanklich getrennt von den Feldern oben, weil sie
// eine zusätzliche Ebene "wo bin ich INNERHALB der Beide-Erfassung" beschreiben:
//   S.beidePhase     = null (kein Beide-Ablauf aktiv) | 1 (Links wird gerade
//                       erfasst) | 2 (Rechts wird gerade erfasst)
//   S.beideBaseKey   = <bauteilKey> des Links/Rechts-Paares (z.B. "stb1_oe1")
//   S.beideBaseName  = Bauteilname ohne Seite (z.B. "Geländer")
//   S.beideBereich   = Anzeigename der Ebene (z.B. "Öffnung 1"), für Beschriftungen
//   S.beideLinksDesc/-Fotos/-Typ/-Art = fertig gebauter Links-Teil, zwischen-
//                       gespeichert nach Phase 1, bis Phase 2 abgeschlossen ist
// Ergebnis beim finalen Speichern (Phase 2 → saveS): EIN gemeinsamer Beschreibungs-
// text ("<Bauteil> links und rechts" / Abschnitte "Links:"/"Rechts:") wird als
// ZWEI UNABHÄNGIGE Kopien angelegt — je eine in
// <bauteilKey>___<Bauteil> links UND <bauteilKey>___<Bauteil> rechts — nicht als
// gemeinsame Objekt-Referenz (sonst würde Bearbeiten/Löschen einer Kopie die
// andere unkontrolliert mit verändern). resetBeideState() räumt den kompletten
// Zwischenzustand auf; wird an jeder Stelle aufgerufen, an der man den Ablauf
// verlassen kann (Zurück/Schließen im Modal, editS(), switchUgr(), openSch() bei
// Zielwechsel), damit ein abgebrochener Beide-Versuch nie in einen späteren,
// nicht damit zusammenhängenden Speichervorgang hineinwirkt.
// ============================================================

var fotoCounter=0, curFotoIdx=-1;
function buildLagerFotoLabel(){
  // Eigene Beschriftung für Lager-Fotos: STB + Widerlager ODER Pfeiler (je nachdem, was
  // ausgefüllt ist) + Lager-Nummer — bewusst OHNE Lagertyp (z.B. "Elastomerlager"), der
  // soll laut Andreas nicht mit auf dem Bild stehen.
  if(!/^Lager: /.test(S.ugr||''))return null;
  var mwBox=g('lagerMesswerte');
  if(!mwBox||!curLagerMesswertFelder.length)return null;
  var stbM=(S.key||'').match(/^stb(\d+)_/);
  var wIdx=-1,pIdx=-1,lIdx=-1;
  curLagerMesswertFelder.forEach(function(f,idx){
    if(f.label==='Widerlager')wIdx=idx;
    if(f.label==='Pfeiler')pIdx=idx;
    if(f.label==='Lager')lIdx=idx;
  });
  var wVal=wIdx>=0&&g('lagerMw'+wIdx)?g('lagerMw'+wIdx).value.trim():'';
  var pVal=pIdx>=0&&g('lagerMw'+pIdx)?g('lagerMw'+pIdx).value.trim():'';
  var lVal=lIdx>=0&&g('lagerMw'+lIdx)?g('lagerMw'+lIdx).value.trim():'';
  var parts=[];
  if(stbM)parts.push('STB '+stbM[1]);
  if(wVal)parts.push('Widerlager '+wVal);
  else if(pVal)parts.push('Pfeiler '+pVal);
  if(lVal)parts.push('Lager '+lVal);
  return parts.length?parts.join(', '):null;
}

function fotoLabelFromKey(key){
  // Bevorzugt dieselbe automatische Standort-Überschrift wie in der Schadensbeschreibung,
  // aber bewusst OHNE Bauteil-Nummer (Fotos sollen laut Andreas nie Zahlen zeigen, auch
  // nicht bei nummerierbaren Stahlbauteilen wie Hauptträger) — deshalb hier ausdrücklich
  // die "bare" Variante buildLocationHeading(), nicht buildTextLocationHeading(). Fällt
  // bei allem, was keine der beiden Funktionen abdeckt (z.B. Fugen), auf die alte
  // schlüsselbasierte Herleitung zurück.
  var lagerLabel=buildLagerFotoLabel();
  if(lagerLabel)return lagerLabel;
  var auto=buildLocationHeading();
  if(auto)return auto;
  if(!key)return S.schTitle||'';
  var m=key.match(/^stb(\d+)_(w[12]|oe\d+|pf\d+)___(.*)$/);
  if(!m)return S.schTitle||'';
  var stbNum=m[1],part=m[2],ugr=m[3];
  var partLabel;
  if(part==='w1'){partLabel='Widerlager1';ugr=ugr.replace(/^Widerlager\s*/,'');}
  else if(part==='w2'){partLabel='Widerlager2';ugr=ugr.replace(/^Widerlager\s*/,'');}
  else if(/^oe(\d+)$/.test(part))partLabel='Öffnung'+part.replace('oe','');
  else if(/^pf(\d+)$/.test(part))partLabel='Pfeiler'+part.replace('pf','');
  else partLabel=part;
  return 'STB'+stbNum+', '+partLabel+', '+ugr;
}
var mPendingFotos=[];

// ============================================================
// FOTO-SPEICHER (IndexedDB) — löst das localStorage-Limit (5–10 MB) ab.
// Laufzeit-Verhalten bleibt unverändert: jedes Foto-Objekt behält im
// Arbeitsspeicher weiterhin sein `data`-Feld (Base64), damit Render,
// Export, Galerie und Übertragungs-Logik nichts davon merken. Nur beim
// Persistieren (autoSave/loadSaved/Backup) wird `data` ausgelagert.
// ============================================================
var IDB_NAME='bp_foto_db',IDB_STORE='fotos',idbInst=null;
var persistedFotoIds=new Set(); // fids, die schon sicher in IndexedDB liegen
function genFid(){return 'f'+Date.now().toString(36)+Math.random().toString(36).slice(2,9);}
function idbOpen(){
  if(idbInst)return Promise.resolve(idbInst);
  return new Promise(function(resolve,reject){
    if(!window.indexedDB){reject(new Error('IndexedDB nicht verfügbar'));return;}
    var req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=function(){
      var db=req.result;
      if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE,{keyPath:'fid'});
    };
    req.onsuccess=function(){idbInst=req.result;resolve(idbInst);};
    req.onerror=function(){reject(req.error);};
  });
}
function idbPutFoto(fid,data){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put({fid:fid,data:data});
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(){reject(tx.error);};
    });
  });
}
function idbGetFoto(fid){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(IDB_STORE,'readonly');
      var req=tx.objectStore(IDB_STORE).get(fid);
      req.onsuccess=function(){resolve(req.result?req.result.data:null);};
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbGetAllFotos(){
  return idbOpen().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(IDB_STORE,'readonly');
      var req=tx.objectStore(IDB_STORE).getAll();
      req.onsuccess=function(){
        var map={};(req.result||[]).forEach(function(r){map[r.fid]=r.data;});
        resolve(map);
      };
      req.onerror=function(){reject(req.error);};
    });
  });
}
function idbDeleteFoto(fid){
  return idbOpen().then(function(db){
    return new Promise(function(resolve){
      var tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).delete(fid);
      tx.oncomplete=function(){persistedFotoIds.delete(fid);resolve();};
      tx.onerror=function(){resolve();};
    });
  }).catch(function(){});
}
function idbClearAllFotos(){
  return idbOpen().then(function(db){
    return new Promise(function(resolve){
      var tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete=function(){persistedFotoIds.clear();resolve();};
      tx.onerror=function(){resolve();};
    });
  }).catch(function(){});
}
// Alle Foto-Objekte aus einem dat-Objekt einsammeln (für Persist/Hydrate/Backup)
// WICHTIG: dat enthält neben den Bauteil-Arrays auch Meta-Keys wie '__durchgehendW'
// (Boolean) oder '__t_...' (String) — nur echte Arrays dürfen durchlaufen werden,
// sonst crasht .forEach() und autoSave() bricht komplett ab.
function collectAllFotoObjs(datObj){
  var out=[];
  Object.keys(datObj||{}).forEach(function(key){
    var arr=datObj[key];
    if(!Array.isArray(arr))return;
    arr.forEach(function(it){
      (it.fotos||[]).forEach(function(f){out.push(f);});
    });
  });
  return out;
}

function g(id){return document.getElementById(id);}
function toast(m){var t=g('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ============================================================
// AUTOSAVE
// ============================================================
function autoSave(){
  try{
    // Fotos bekommen beim Speichern eine fid und werden aus dem localStorage-JSON
    // ausgeklammert (Replacer unten) — die eigentlichen Bilddaten wandern separat
    // und asynchron in IndexedDB (siehe persistFotosToIdb unten). So bleibt bp_dat
    // klein und die 5–10-MB-Grenze von localStorage wird nicht mehr durch Fotos
    // gesprengt.
    collectAllFotoObjs(dat).forEach(function(f){if(!f.fid)f.fid=genFid();});
    var datStr=JSON.stringify(dat,function(k,v){
      if(k==='data'&&this&&this.fid)return undefined;
      return v;
    });
    localStorage.setItem('bp_dat',datStr);
    localStorage.setItem('bp_stbs',JSON.stringify(stbs));
    localStorage.setItem('bp_nxtId',''+nxtId);
    localStorage.setItem('bp_fc',''+fotoCounter);
    localStorage.setItem('bp_locked',bauwerkLocked?'1':'0');
    var k={str:g('f_str').value,km:g('f_km').value,br:g('f_br').value,dat:g('f_dat').value,pr:g('f_pr').value};
    localStorage.setItem('bp_kopf',JSON.stringify(k));
    persistFotosToIdb();
  }catch(e){
    toast('⚠️ Speichern fehlgeschlagen — bitte sofort per „Sichern" exportieren!');
  }
}
// Schreibt alle noch nicht gesicherten Fotos asynchron in IndexedDB. Fotos, die
// bereits als persistiert markiert sind (persistedFotoIds), werden übersprungen,
// damit nicht bei jedem autoSave() alles neu geschrieben wird.
function persistFotosToIdb(){
  var todo=collectAllFotoObjs(dat).filter(function(f){return f.data&&f.fid&&!persistedFotoIds.has(f.fid);});
  if(!todo.length)return;
  Promise.all(todo.map(function(f){
    return idbPutFoto(f.fid,f.data).then(function(){persistedFotoIds.add(f.fid);}).catch(function(){
      toast('⚠️ Foto konnte nicht dauerhaft gespeichert werden!');
    });
  }));
}
function loadSaved(){
  try{
    var d=localStorage.getItem('bp_dat');if(d)dat=JSON.parse(d);
    var s=localStorage.getItem('bp_stbs');if(s)stbs=JSON.parse(s);
    var n=localStorage.getItem('bp_nxtId');if(n)nxtId=parseInt(n);
    var fc=localStorage.getItem('bp_fc');if(fc)fotoCounter=parseInt(fc);
    var lk=localStorage.getItem('bp_locked');if(lk!==null)bauwerkLocked=(lk==='1');
    var k=localStorage.getItem('bp_kopf');
    if(k){k=JSON.parse(k);
      if(k.str)g('f_str').value=k.str;if(k.km)g('f_km').value=k.km;
      if(k.br)g('f_br').value=k.br;if(k.dat)g('f_dat').value=k.dat;
      if(k.pr)g('f_pr').value=k.pr;
    }
  }catch(e){}
  hydrateFotosFromIdb();
}
// Lädt die eigentlichen Bilddaten aus IndexedDB nach (neues Format: fid ohne
// data) UND migriert automatisch altes Format (fid fehlt, data direkt im
// localStorage-JSON) beim allerersten Laden nach dem Umbau — ohne Zutun des
// Nutzers. Läuft asynchron im Hintergrund, damit der App-Start nicht blockiert.
function hydrateFotosFromIdb(){
  var all=collectAllFotoObjs(dat);
  if(!all.length)return;
  var toFetch=all.filter(function(f){return f.fid&&!f.data;});
  var legacy=all.filter(function(f){return f.data&&!f.fid;});
  if(toFetch.length)toast('Fotos werden geladen…');
  idbGetAllFotos().then(function(map){
    var missing=0;
    toFetch.forEach(function(f){
      if(map[f.fid]!=null){f.data=map[f.fid];persistedFotoIds.add(f.fid);}
      else missing++;
    });
    legacy.forEach(function(f){f.fid=genFid();}); // altes Format: fid nachtragen, wird bei nächstem autoSave persistiert
    if(toFetch.length||legacy.length){render();renderSch();}
    if(missing>0)toast('⚠️ '+missing+' Foto(s) konnten nicht geladen werden');
    if(legacy.length)autoSave(); // altes Format sofort migrieren
  }).catch(function(){
    toast('⚠️ Fotos konnten nicht aus dem Speicher geladen werden');
  });
}

function render(){

    empty.innerHTML='<div style="font-size:16px;margin-bottom:20px;">Noch kein Bauwerk angelegt.</div>'+
      '<button class="ps" style="padding:18px 32px;font-size:17px;font-weight:700;border-radius:10px;" onclick="startBauwerk()">🏗 Bauwerk erstellen</button>';
    grid.appendChild(empty);
    return;
  }
  grid.style.cssText='';
  var dgActive=isDurchgehendW()&&stbs.length>1;
  var w2Bar=g('wgW2Bar'),w1Bar=g('wgW1Bar');
  if(w2Bar)w2Bar.innerHTML='';
  if(w1Bar)w1Bar.innerHTML='';
  if(dgActive){
    var gridWidthPx=stbs.length*128+Math.max(0,stbs.length-1)*5; // .col{width:128px} + .grid{gap:5px}

    var w2cnt=cntKey('wg_w2',w2ugr),w1cnt=cntKey('wg_w1',w1ugr);
    if(w2Bar){var b2=mkWgBar('wg_w2','W2 (durchgehend — alle STB)',w2cnt);b2.style.width=gridWidthPx+'px';w2Bar.appendChild(b2);}
    if(w1Bar){var b1=mkWgBar('wg_w1','W1 (durchgehend — alle STB)',w1cnt);b1.style.width=gridWidthPx+'px';w1Bar.appendChild(b1);}
  }
  stbs.forEach(function(stb,si){
    var col=document.createElement('div');col.className='col';
    var hdr=document.createElement('div');hdr.className='col-hdr';
    hdr.innerHTML='STB '+(si+1)
      +((!bauwerkLocked&&stbs.length>1)?' <button class="dx" onclick="rmStb('+stb.id+')">✕</button>':'');
    col.appendChild(hdr);
    var inner=document.createElement('div');inner.className='col-table';
    if(!dgActive){
      var w2Key=isDurchgehendW()?'wg_w2':('stb'+stb.id+'_w2');
      inner.appendChild(mkKa(w2Key,isDurchgehendW()?'W2 (durchgehend)':'W2','wid'));
    }
    for(var i=stb.oeff;i>=1;i--){
      if(i===stb.oeff&&!bauwerkLocked&&stb.oeff<5){
        var pairRow=document.createElement('div');pairRow.style.cssText='display:flex;';
        var addOeTile=document.createElement('div');
        addOeTile.style.cssText='width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1.5px solid var(--line);background:var(--accs);color:var(--acc);font-size:15px;font-weight:700;cursor:pointer;';
        addOeTile.textContent='+';
        (function(sid){addOeTile.onclick=function(){addOeff(sid);};})(stb.id);
        var oeTile=mkOe(stb,i);oeTile.style.flex='1';
        pairRow.appendChild(addOeTile);pairRow.appendChild(oeTile);
        inner.appendChild(pairRow);
      } else {
        inner.appendChild(mkOe(stb,i));
      }
      if(i>1)inner.appendChild(mkKa('stb'+stb.id+'_pf'+(i-1),'Pf '+(i-1),'pf'));
    }
    if(!dgActive){
      var w1Key=isDurchgehendW()?'wg_w1':('stb'+stb.id+'_w1');
      inner.appendChild(mkKa(w1Key,isDurchgehendW()?'W1 (durchgehend)':'W1','wid'));
    }
    col.appendChild(inner);
    if(si===stbs.length-1&&!bauwerkLocked&&stbs.length<5){
      var addStbTile=document.createElement('div');
      addStbTile.style.cssText='margin-top:6px;border:1.5px solid var(--acc);border-radius:7px;background:var(--accs);color:var(--acc);text-align:center;padding:8px;font-size:12px;font-weight:700;cursor:pointer;';
      addStbTile.textContent='+ STB';
      addStbTile.onclick=addStb;
      col.appendChild(addStbTile);
    }
    grid.appendChild(col);
  });
  var sa=g('stbBtnArea');if(sa){sa.innerHTML='';
    if(stbs.length>1){
      var dgBtn=document.createElement('button');
      dgBtn.textContent=isDurchgehendW()?'🔗 Widerlager getrennt anzeigen':'🔗 Widerlager durchgehend (mehrere Überbauten, ein Widerlager)';
      dgBtn.style.cssText='width:100%;padding:9px;margin-bottom:8px;border:1.5px solid var(--acc);border-radius:7px;background:'+(isDurchgehendW()?'var(--acc)':'var(--accs)')+';color:'+(isDurchgehendW()?'#fff':'var(--acc)')+';font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;';
      dgBtn.onclick=function(){
        var turningOn=!isDurchgehendW();
        if(!confirm(turningOn?
          'Widerlager durchgehend einschalten? Vorhandene Schäden aller STBs werden je Seite (W1 bzw. W2) automatisch zusammengeführt.':
          'Widerlager wieder getrennt anzeigen? Schäden gehen zurück an den STB, aus dem sie ursprünglich stammen. Neu hinzugekommene Schäden landen beim ersten STB.'))return;
        var movedCount=migrateWiderlagerDurchgehend(turningOn);
        dat['__durchgehendW']=turningOn;
        autoSave();render();
        var msg=turningOn?'Widerlager sind jetzt durchgehend (STB-übergreifend)':'Widerlager sind jetzt wieder getrennt je STB';
        if(movedCount>0)msg+=' — '+movedCount+' bestehende Einträge automatisch übernommen';
        toast(msg);
      };
      sa.appendChild(dgBtn);
    }
    if(!bauwerkLocked){
      var lockBtn=document.createElement('button');
      lockBtn.className='ps';
      lockBtn.style.cssText='margin-top:10px;width:100%;padding:12px;font-size:14px;';
      lockBtn.textContent='✓ Bauwerk fertig — Speichern';
      lockBtn.onclick=lockBauwerk;
      sa.appendChild(lockBtn);
    } else {
      var editLink=document.createElement('button');
      editLink.textContent='✏️ Bauwerksstruktur bearbeiten';
      editLink.style.cssText='border:0;background:none;color:var(--acc);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;padding:6px 0;';
      editLink.onclick=unlockBauwerk;
      sa.appendChild(editLink);
    }
  }
}

function setKopfCollapsed(collapsed){

}

function cntKey(key,ugr){var n=0;ugr.forEach(function(u){n+=(dat[key+'___'+u]||[]).length;});return n;}
function cntExtra(key){
  if(!/_oe\d+$/.test(key))return 0;
  var n=(dat[key+'___Geländer links']||[]).length+(dat[key+'___Geländer rechts']||[]).length;
  LAGER_TYPES.forEach(function(t){
    n+=(dat[key+'___Lager: '+t]||[]).length;
    (LAGER_BAUTEILE[t]||[]).forEach(function(teil){n+=(dat[key+'___Lager: '+t+' - '+teil]||[]).length;});
  });
  FUGEN_TYPES.forEach(function(t){n+=(dat[key+'___Fugen: '+t]||[]).length;});
  return n;
}
// Liefert die passende Ugr-Liste je nach Bauteil + gewähltem Typ (dat['__t_'+k]).
// WICHTIG: Ändert sich der Typ NACH dem Speichern von Schäden, findet cntKey()/
// collectAllSchaeden() alte Einträge unter dem vorherigen Typ nicht mehr (siehe
// Warnhinweis beim "Typ zurücksetzen"-Button in openBau).
var W_UGR_ALLE=W_UGR_BETON.concat(W_UGR_MAUERWERK).filter(function(v,i,a){return a.indexOf(v)===i;});
// Kurzer Titel (z.B. "W1", "Öffnung 2", "Pfeiler 1") aus einem Basis-Schlüssel — entspricht
// derselben Schreibweise, die auch beim normalen Navigieren über die Kacheln verwendet wird
// (nicht die längere Bezeichnung aus der Gesamtschäden-Sammlung).
function shortBauTitleFromKey(baseKey){
  var oeM=baseKey.match(/^stb\d+_oe(\d+)$/);
  if(oeM)return 'Öffnung '+oeM[1];
  var wM=baseKey.match(/^stb\d+_w([12])$/);
  if(wM)return 'W'+wM[1];
  var pfM=baseKey.match(/^stb\d+_pf(\d+)$/);
  if(pfM)return 'Pfeiler '+pfM[1];
  var wgM=baseKey.match(/^wg_w([12])$/);
  if(wgM)return 'W'+wgM[1]+' (durchgehend)';
  return '';
}

// Klartext-Label für einen Ziel-Bauteil-Schlüssel bei der Übernahme-Auswahl
// (z.B. "STB 2 / Öffnung 1", "STB 1 / Widerlager 2", "Widerlager 1 (durchgehend)").
function friendlyTargetLabel(baseKey){
  var oeM=baseKey.match(/^stb(\d+)_oe(\d+)$/);
  if(oeM)return 'STB '+oeM[1]+' / Öffnung '+oeM[2];
  var wM=baseKey.match(/^stb(\d+)_w([12])$/);
  if(wM)return 'STB '+wM[1]+' / Widerlager '+wM[2];
  var pfM=baseKey.match(/^stb(\d+)_pf(\d+)$/);
  if(pfM)return 'STB '+pfM[1]+' / Pfeiler '+pfM[2];
  var wgM=baseKey.match(/^wg_w([12])$/);
  if(wgM)return 'Widerlager '+wgM[1]+' (durchgehend)';
  return baseKey;
}

function getUgr(k){
  // wg_w1/wg_w2 ("durchgehend") können Schäden aus STBs mit unterschiedlichem
  // Bauwerkstyp enthalten (z.B. ein STB Beton, ein anderer Mauerwerk) — deshalb
  // hier IMMER die vereinigte Begriffsliste verwenden, sonst werden Einträge des
  // "falschen" Typs beim Zählen/Anzeigen unsichtbar, obwohl sie noch in dat liegen.
  if(k==='wg_w1'||k==='wg_w2')return W_UGR_ALLE;
  var t=dat['__t_'+k]||'';
  if(/_w[12]$/.test(k))return t==='Mauerwerk'?W_UGR_MAUERWERK:W_UGR_BETON;
  if(/_pf\d+$/.test(k))return PF_UGR;
  if(t==='Stahl')return OE_S;
  if(t==='WIB')return OE_WIB;
  if(t==='Gew.Beton')return OE_GB;
  if(t==='Gew.Mauerwk')return OE_GM;
  return OE_B;
}

function mkWgBar(key,label,cnt){
  var bar=document.createElement('div');bar.className='wg-bar';
  var left=document.createElement('span');left.className='wgl';
  left.innerHTML='🔗 '+label;
  bar.appendChild(left);
  if(cnt>0){var c=document.createElement('span');c.className='wgc';c.textContent=cnt;bar.appendChild(c);}
  bar.onclick=function(){openBau(key,label.replace(' (durchgehend — alle STB)',' (durchgehend)'),getUgr(key));};
  return bar;
}

function mkKa(key,label,typ){
  var ugr=getUgr(key);
  var bt=dat['__t_'+key]||'';
  var tot=cntKey(key,ugr);
  var bg=typ==='wid'?'#e8f5e9':typ==='pf'?'#e3f2fd':'#fff';
  var tc=typ==='wid'?'#2e7d32':typ==='pf'?'#1565c0':'#444';
  var row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;background:'+bg+';min-height:58px;';
  row.innerHTML='<span style="font-size:18px;font-weight:700;color:'+tc+';">'+label+(bt?' <small style="font-size:14px;margin-left:5px;opacity:.75;">('+bt+')</small>':'')+'</span>'
    +(tot>0?'<span style="background:'+tc+';color:#fff;border-radius:16px;padding:2px 13px;font-size:18px;font-weight:700;">'+tot+'</span>':'');
  row.setAttribute('data-key',key);row.setAttribute('data-label',label);
  row.onclick=function(){var k=this.getAttribute('data-key');openBau(k,this.getAttribute('data-label'),getUgr(k));};
  return row;
}

function mkOe(stb,i){
  var key='stb'+stb.id+'_oe'+i;
  var ot=dat['__t_'+key]||'';
  var ugr=getUgr(key);
  var tot=cntKey(key,ugr)+cntExtra(key);
  var showDel=!bauwerkLocked&&stb.oeff>1;
  var row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;background:#fff;min-height:58px;gap:13px;';
  var lbl=document.createElement('span');
  lbl.style.cssText='font-size:18px;font-weight:700;color:#444;flex:1;';
  lbl.innerHTML='Ö'+i+(ot?' <small style="color:var(--acc);font-size:14px;margin-left:5px;">'+ot+'</small>':'');
  row.appendChild(lbl);
  if(tot>0){
    var badge=document.createElement('span');
    badge.style.cssText='background:var(--acc);color:#fff;border-radius:16px;padding:2px 13px;font-size:18px;font-weight:700;';
    badge.textContent=tot;
    row.appendChild(badge);
  }
  row.onclick=function(){openBau(key,'Öffnung '+i,ugr);};
  if(showDel){
    var del=document.createElement('button');del.textContent='✕';
    del.style.cssText='border:0;background:#ffebee;color:#c62828;border-radius:8px;padding:5px 10px;font-size:16px;cursor:pointer;flex-shrink:0;';
    (function(sid,ii){del.onclick=function(e){e.stopPropagation();if(!confirm('Öffnung löschen?'))return;delOeff(sid,ii);};})(stb.id,i);
    row.appendChild(del);
  }
  return row;
}

function startBauwerk(){
  stbs=[{id:1,oeff:1}];nxtId=2;bauwerkLocked=false;
  render();autoSave();toast('Bauwerk erstellt — jetzt Struktur festlegen');
}

function addOeff(sid){stbs.forEach(function(s){if(s.id===sid&&s.oeff<5)s.oeff++;});render();autoSave();refreshOpenSchList();}
function delOeff(sid,i){
  stbs.forEach(function(s){if(s.id===sid&&s.oeff>1)s.oeff--;});
  Object.keys(dat).forEach(function(k){if(k.indexOf('stb'+sid+'_oe'+i+'___')===0)delete dat[k];});
  render();autoSave();refreshOpenSchList();
}
function addStb(){
  if(stbs.length>=5)return;
  var src=stbs[0];var ns={id:nxtId++,oeff:src.oeff};stbs.push(ns);
  for(var i=1;i<=src.oeff;i++){var t=dat['__t_stb'+src.id+'_oe'+i];if(t)dat['__t_stb'+ns.id+'_oe'+i]=t;}
  render();autoSave();toast('STB hinzugefügt ✓');refreshOpenSchList();
}
function rmStb(id){
  if(!confirm('STB entfernen?'))return;
  stbs=stbs.filter(function(s){return s.id!==id;});
  Object.keys(dat).forEach(function(k){if(k.indexOf('stb'+id+'_')===0)delete dat[k];});
  render();autoSave();refreshOpenSchList();
}
// Bauwerksstruktur (STB/Öffnungen) kann sich ändern, während eine Schäden-Liste bereits
// geöffnet ist — deren "Übernehmen"-Knöpfe hängen von der aktuellen Anzahl STB/Öffnungen
// ab und müssen sofort neu berechnet werden, statt erst beim nächsten Öffnen des Panels.
function refreshOpenSchList(){
  var el=g('ovSch');
  if(el&&el.classList.contains('open'))renderSch();
}

// ============================================================
// BAUTEILE PANEL
// ============================================================
// Sammelt alle bereits erfassten Schäden zu einem Bauteil-Schlüssel (z.B. "stb1_w1"),
// unabhängig vom UGR-Katalog — durchsucht dat[] direkt nach allen Schlüsseln mit dem
// Präfix "<key>___", das erfasst automatisch auch Lager-, Fugen- und Links/Rechts-
// Einträge, ohne dass hier jedes Mal die genaue Bauteil-Liste nachgebildet werden muss.
function collectSchaedenForBauKey(key){
  var out=[];
  var prefix=key+'___';
  Object.keys(dat).forEach(function(k){
    if(k.indexOf(prefix)!==0)return;
    var ugr=k.slice(prefix.length);
    (dat[k]||[]).forEach(function(item,idx){
      out.push({key:key,ugr:ugr,idx:idx,item:item});
    });
  });
  return out;
}

function openBau(key,title,ugr){
  S.bauKey=key;S.bauTitle=title;S.lastUgr=ugr||OE_B;
  g('bauTitle').textContent=title;
  g('bauList').innerHTML='';
  var isOe=/_oe\d+$/.test(key)&&key.indexOf('___')===-1;
  var isW=/_w[12]$/.test(key)&&key.indexOf('___')===-1;
  var isPf=/_pf\d+$/.test(key)&&key.indexOf('___')===-1;
  if(isOe||isW||isPf){
    var curOt=dat['__t_'+key]||'';
    var options=isOe?['Beton','Stahl','WIB','Gew.Beton','Gew.Mauerwk']:['Beton','Mauerwerk'];
    var optLabels={'WIB':'WIB (Walzträger in Beton)'};
    var ugr2=getUgr(key);
    var tw=document.createElement('div');tw.style.marginBottom='12px';
    var tl=document.createElement('div');tl.style.cssText='font-size:12px;color:var(--soft);font-weight:600;margin-bottom:6px;';
    tl.textContent=isOe?'Überbautyp:':'Bauwerkstyp:';
    tw.appendChild(tl);
    var tr=document.createElement('div');tr.style.cssText='display:flex;flex-wrap:wrap;gap:6px;';
    options.forEach(function(t){
      var b=document.createElement('button');b.className='sb'+(curOt===t?' on':'');b.textContent=optLabels[t]||t;

        render();openBau(key,title,getUgr(key));

      b.innerHTML=base+' links/rechts'+(c>0?'<span class="uc">'+c+'</span>':'');
      (function(bk,bn,t){b.onclick=function(){openReliSel(bk,bn,t);};})(key,base,title);
      g('bauList').appendChild(b);
    } else {
      var k=key+'___'+u;var c=(dat[k]||[]).length;
      var b=document.createElement('button');b.className='sb'+(c>0?' on':'');
      b.innerHTML=u+(c>0?'<span class="uc">'+c+'</span>':'');

      g('bauList').appendChild(b);

  if(isOe){

// Eigener Bildschirm "Schäden <Bereich>" — zeigt die bereits erfassten Schäden dieses
// Bauteil-Bereichs im Gesamtschäden-Stil (voller Text, Fotos, Stift zum direkten
// Bearbeiten). Bewusst getrennt von der Kachel-Auswahl (openBau) zum Anlegen neuer
// Schäden, damit beides klar auseinandergehalten wird — "Zurück" führt einfach zur
// Kachel-Auswahl zurück, die im Hintergrund weiter offen bleibt.
function openBauSchaeden(key,title){
  // Sicherheitsnetz: alle .ov-Panels teilen sich denselben z-index, die Reihenfolge im
  // Sichtbaren richtet sich also rein nach DOM-Position. Bleibt z.B. ovSch im Hintergrund
  // "offen" (Klasse "open" gesetzt, auch wenn gerade nicht sichtbar — etwa nach einer
  // vorherigen Navigation oder wiederhergestelltem Zustand), würde es diesen Bildschirm
  // sonst verdecken. Deshalb hier explizit schließen, bevor ovBauSchaeden gezeigt wird.
  g('ovSch').classList.remove('open');
  g('ovMod').classList.remove('open');
  g('bauSchaedenTitle').textContent='Schäden '+title;
  var box=g('bauSchaedenList');box.innerHTML='';
  var vorhandene=collectSchaedenForBauKey(key);
  if(!vorhandene.length){
    box.innerHTML='<p style="color:var(--faint);font-size:13px;padding:10px;">Keine Schäden erfasst</p>';
    showPanel('ovBauSchaeden');
    return;
  }
  vorhandene.forEach(function(entry){
    var div=document.createElement('div');div.className='sitem';
    var lh=document.createElement('div');
    lh.style.cssText='font-size:11px;font-weight:700;color:var(--acc);padding:4px 8px;background:var(--accs);border-radius:5px;margin-bottom:6px;';
    lh.textContent=entry.ugr;div.appendChild(lh);
    var sr=document.createElement('div');sr.className='sr';
    var txt=document.createElement('div');txt.style.cssText='flex:1;font-size:13px;line-height:1.7;';
    var lines=(entry.item.d||'').split('\n').map(function(p){return p.trim();}).filter(function(p){return p;});
    txt.innerHTML=lines.map(function(p){return '<div>'+(p[0]==='-'?p:'- '+p)+'</div>';}).join('');
    var edit=document.createElement('button');edit.textContent='✏️';edit.className='dx';edit.style.cssText='background:var(--acc);transform:scale(1.8);transform-origin:center;margin-right:14px;';
    (function(en){edit.onclick=function(e){
      e.stopPropagation();
      S.key=en.key+'___'+en.ugr;S.ugr=en.ugr;
      S.schTitle=title+' / '+en.ugr;
      editS(en.idx);
    };})(entry);
    var del=document.createElement('button');del.textContent='🗑';del.className='dx';
    del.style.cssText='background:#ffebee;color:#c62828;transform:scale(1.8);transform-origin:center;margin-right:14px;';
    (function(en){del.onclick=function(e){
      e.stopPropagation();
      if(!confirm('Diesen Schaden wirklich löschen? (inkl. Fotos)'))return;
      var k=en.key+'___'+en.ugr;
      if(dat[k])dat[k].splice(en.idx,1);
      render();autoSave();
      openBauSchaeden(key,title);
    };})(entry);
    sr.appendChild(txt);sr.appendChild(edit);sr.appendChild(del);div.appendChild(sr);
    var fotos=entry.item.fotos||[];
    if(fotos.length){
      var leiste=document.createElement('div');
      leiste.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;';
      fotos.forEach(function(f){
        var img=document.createElement('img');img.src=f.data;
        img.style.cssText='height:80px;border-radius:6px;border:2px solid var(--acc);';
        leiste.appendChild(img);
      });
      div.appendChild(leiste);
    }
    box.appendChild(div);
  });
  showPanel('ovBauSchaeden');
}

function openReliSel(baseKey,baseName,bereich){
  g('bauTitle').textContent=bereich+' / '+baseName;
  g('bauList').innerHTML='';
  var wrap=document.createElement('div');wrap.style.cssText='display:flex;gap:10px;';
  ['links','rechts'].forEach(function(side){
    var fk=baseKey+'___'+baseName+' '+side;

    var b=document.createElement('button');
    b.style.cssText='flex:1;padding:20px 10px;border:2px solid '+(c>0?'var(--acc)':'var(--line)')+';border-radius:10px;background:'+(c>0?'var(--accs)':'var(--s2)')+';cursor:pointer;font-size:16px;font-weight:700;font-family:inherit;color:var(--ink);text-align:center;';
    b.innerHTML=(side==='links'?'← Links':'Rechts →')+(c>0?'<br><span style="font-size:12px;color:var(--acc);">'+c+' Schäden</span>':'');
    (function(k,n,r){b.onclick=function(){resetBeideState();openSch(k,n,r);};})(fk,baseName+' '+side,bereich);

  g('bauList').appendChild(wrap);
  // Dritte Option: Schaden für beide Seiten in einem Rutsch erfassen. Ablauf: zuerst wird
  // die Erfassungsmaske für "Links" geöffnet (alle Schäden für die linke Seite eintragen),
  // beim Antippen von "Speichern" wechselt die Maske automatisch zu "Rechts" (Schritt 2/2),
  // und erst beim zweiten "Speichern" wird EIN gemeinsamer Eintrag mit der Überschrift
  // "<Bauteil> links und rechts" angelegt (Abschnitte "Links:"/"Rechts:" getrennt, da die
  // Schäden je Seite unterschiedlich sein können). Der Eintrag wird als unabhängige Kopie
  // sowohl in der Links- als auch in der Rechts-Liste abgelegt, damit er in beiden
  // Einzelansichten sichtbar ist und mitgezählt wird.
  var bb=document.createElement('button');
  bb.style.cssText='width:100%;margin-top:10px;padding:14px 10px;border:2px solid var(--line);border-radius:10px;background:var(--s2);cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;color:var(--ink);text-align:center;';
  bb.innerHTML='↔ Beide (links + rechts)';
  (function(baseKey2,baseName2,bereich2){
    bb.onclick=function(){
      resetBeideState();
      openSch(baseKey2+'___'+baseName2+' links',baseName2+' links',bereich2);
      S.beidePhase=1;S.beideBaseKey=baseKey2;S.beideBaseName=baseName2;S.beideBereich=bereich2;
    };
  })(baseKey,baseName,bereich);
  g('bauList').appendChild(bb);
  showPanel('ovBau');
}

function openSch(key,ugr,bereich){
  if(S.beidePhase&&S.key!==key)resetBeideState();
  S.key=key;S.ugr=ugr;S.schTitle=bereich+' / '+ugr;
  var stbM=key.split('___')[0].match(/^stb(\d+)_/);
  g('schTitle').textContent=(stbM?'STB '+stbM[1]+' / ':'')+S.schTitle;
  renderUgrSwitch(ugr);
  renderSch();
  showPanel('ovSch');
}

function renderUgrSwitch(activeUgr){
  var box=g('schUgrSwitch');if(!box)return;
  box.innerHTML='';
  if(!S.bauKey||!S.lastUgr||S.lastUgr.length<2)return;
  // Flatten li/re pairs into individual chips so switching is a single tap
  S.lastUgr.forEach(function(u){
    var chip=document.createElement('button');
    chip.textContent=u;
    var isActive=(u===activeUgr);
    chip.style.cssText='border:1.5px solid '+(isActive?'var(--acc)':'var(--line)')+';background:'+(isActive?'var(--acc)':'var(--s2)')+';color:'+(isActive?'#fff':'var(--soft)')+';border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;';
    (function(uu){chip.onclick=function(){if(uu===activeUgr)return;switchUgr(uu);};})(u);
    box.appendChild(chip);
  });
}

function switchUgr(u){
  resetBeideState();
  var key=S.bauKey+'___'+u;
  openSch(key,u,S.bauTitle);
}

function renderSch(){
  var items=dat[S.key]||[];
  var el=g('schList');el.innerHTML='';
  if(!items.length){
    el.innerHTML='<p style="color:var(--faint);font-size:13px;font-style:italic;padding:6px 0;">Keine Schäden</p>';
    return;
  }
  // Gleiche fortlaufende Nummer wie in der Gesamtschäden-Übersicht (nicht neu ab 1 pro
  // Bauteil-Liste) — damit "Schaden Nr.: X" überall in der App dieselbe Zahl bedeutet.
  var baseKeyForNr=(S.key||'').split('___')[0];
  var nrLookup={};
  collectAllSchaeden().forEach(function(e){
    if(e.key===baseKeyForNr&&e.ugr===S.ugr)nrLookup[e.idx]=e.num;
  });
  items.forEach(function(it,i){
    var div=document.createElement('div');div.className='sitem';
    // Laufende Nummer dieses Schadens (Bauwerk-weit, siehe collectAllSchaeden)
    var numBadge=document.createElement('div');
    numBadge.style.cssText='display:inline-block;font-size:11px;font-weight:800;color:#fff;background:var(--acc);border-radius:10px;padding:2px 9px;margin-bottom:6px;';
    numBadge.textContent='Schaden Nr.: '+(nrLookup[i]!=null?nrLookup[i]:(i+1));
    div.appendChild(numBadge);
    // Location
    if(it.loc){
      var lh=document.createElement('div');
      lh.style.cssText='font-size:11px;font-weight:700;color:var(--acc);padding:4px 8px;background:var(--accs);border-radius:5px;margin-bottom:6px;';
      var stbMloc=(S.key||'').match(/^stb(\d+)_/);
      lh.textContent=(stbMloc?'STB '+stbMloc[1]+' / ':'')+it.loc;div.appendChild(lh);
    }
    // Text + delete
    var sr=document.createElement('div');sr.className='sr';
    var txt=document.createElement('div');txt.style.cssText='flex:1;font-size:13px;line-height:1.7;';
    var lines=(it.d||'').split('\n').map(function(p){return p.trim();}).filter(function(p){return p;});
    txt.innerHTML=lines.map(function(p){return '<div>'+(p[0]==='-'?p:'- '+p)+'</div>';}).join('');
    var del=document.createElement('button');del.textContent='✕';del.className='dx';
    (function(ii){del.onclick=function(){delS(ii);};})(i);
    var edit=document.createElement('button');edit.textContent='✏️';edit.className='dx';edit.style.background='var(--acc)';
    (function(ii){edit.onclick=function(){editS(ii);};})(i);
    var toGesamt=document.createElement('button');
    toGesamt.textContent='Zu Gesamtschäden';
    toGesamt.className='dx';
    toGesamt.style.cssText='background:var(--accs);color:var(--acc);font-size:12.5px;font-weight:700;padding:8px 12px;margin-right:14px;';
    toGesamt.onclick=function(){
      S.gesamtReturnTo={key:S.key,ugr:S.ugr,bauKey:S.bauKey,bauTitle:S.bauTitle,lastUgr:S.lastUgr.slice()};
      g('ovSch').classList.remove('open');
      g('ovBau').classList.remove('open');
      openGesamtschaeden();
    };
    sr.appendChild(txt);
    sr.appendChild(toGesamt);
    sr.appendChild(edit);sr.appendChild(del);div.appendChild(sr);
    // Übernahme auf andere Bauteile: statt sofort blind zu kopieren, wird zuerst eine
    // Auswahl der möglichen Ziele geöffnet (Chips mit Klartext-Label wie "STB 2 / Öffnung 1"
    // oder "Widerlager 2"). Jeder Chip kopiert einzeln dorthin und markiert sich danach als
    // erledigt; "Alle" kopiert auf alle noch offenen Ziele in einem Schritt.
    var wgMatch=S.key.match(/^(wg_w[12])___(.*)$/);
    var bMatch=S.key.match(/^(stb\d+)_(w[12]|oe\d+|pf\d+)___(.*)$/);
    var xferTargets=[]; // {key, label}
    var xferUgrSuffix=null;
    if(wgMatch){
      var wgPart=wgMatch[1];xferUgrSuffix=wgMatch[2];
      var wgTarget=wgPart==='wg_w1'?'wg_w2':'wg_w1';
      xferTargets.push({key:wgTarget,label:friendlyTargetLabel(wgTarget)});
    } else if(bMatch){
      var stbPrefix2=bMatch[1],bauteilPart=bMatch[2];xferUgrSuffix=bMatch[3];
      var stbIdNum2=parseInt(stbPrefix2.replace('stb',''),10);
      var stbObj=stbs.filter(function(s){return s.id===stbIdNum2;})[0];
      if(stbObj){
        // Ziele innerhalb desselben STB (anderes Widerlager / andere Öffnung / anderer Pfeiler)
        if(/^w[12]$/.test(bauteilPart)){
          ['w1','w2'].filter(function(x){return x!==bauteilPart;}).forEach(function(x){
            var k=stbPrefix2+'_'+x;xferTargets.push({key:k,label:friendlyTargetLabel(k)});
          });
        } else if(/^oe\d+$/.test(bauteilPart)){
          var curOeN=parseInt(bauteilPart.replace('oe',''),10);
          for(var j=1;j<=stbObj.oeff;j++){if(j!==curOeN){var k2=stbPrefix2+'_oe'+j;xferTargets.push({key:k2,label:friendlyTargetLabel(k2),group:'sib-oe'});}}
        } else if(/^pf\d+$/.test(bauteilPart)){
          var curPfN=parseInt(bauteilPart.replace('pf',''),10);
          var pfCount=stbObj.oeff-1;
          for(var k=1;k<=pfCount;k++){if(k!==curPfN){var k3=stbPrefix2+'_pf'+k;xferTargets.push({key:k3,label:friendlyTargetLabel(k3)});}}
        }
        // Ziele im gleichen Bauteil in anderen STB (z.B. W1 von STB1 -> W1 von STB2, STB3, ...)
        if(stbs.length>1){
          stbs.forEach(function(s){
            if(s.id===stbIdNum2)return;
            if(/^w[12]$/.test(bauteilPart)){
              var k4='stb'+s.id+'_'+bauteilPart;xferTargets.push({key:k4,label:friendlyTargetLabel(k4)});
            } else if(/^oe\d+$/.test(bauteilPart)){
              var n=parseInt(bauteilPart.replace('oe',''),10);
              if(n<=s.oeff){var k5='stb'+s.id+'_oe'+n;xferTargets.push({key:k5,label:friendlyTargetLabel(k5)});}
            } else if(/^pf\d+$/.test(bauteilPart)){
              var n2=parseInt(bauteilPart.replace('pf',''),10);
              if(n2<=s.oeff-1){var k6='stb'+s.id+'_pf'+n2;xferTargets.push({key:k6,label:friendlyTargetLabel(k6)});}
            }
          });
        }
      }
    }
    if(xferTargets.length){
      var xferToggle=document.createElement('button');
      xferToggle.textContent='📋 Auf anderes Bauteil übernehmen';
      xferToggle.className='dx';
      xferToggle.style.cssText='background:var(--accs);color:var(--acc);font-size:12.5px;font-weight:700;padding:8px 12px;margin-right:14px;';
      var xferBox=document.createElement('div');
      xferBox.style.cssText='display:none;flex-direction:column;gap:9px;margin-top:8px;width:100%;';
      (function(it2,targets,ugr3,box){
        var doneKeys={};
        var sibOeTargets=targets.filter(function(t){return t.group==='sib-oe';});
        var singleTargets=targets.filter(function(t){return t.group!=='sib-oe';});

        // --- Mehrfachauswahl für Öffnungen im selben STB: erst markieren, dann bestätigen ---
        if(sibOeTargets.length){
          var sibWrap=document.createElement('div');
          sibWrap.style.cssText='display:flex;flex-direction:column;gap:6px;';
          var sibLbl=document.createElement('div');
          sibLbl.style.cssText='font-size:11px;color:var(--soft);font-weight:600;';
          sibLbl.textContent='In andere Öffnungen (Mehrfachauswahl möglich):';
          sibWrap.appendChild(sibLbl);
          var sibChipRow=document.createElement('div');
          sibChipRow.style.cssText='display:flex;flex-wrap:wrap;gap:7px;';
          var selected={};

// Verschiebt Widerlager-Schäden zwischen den STB-eigenen Schlüsseln (stb<id>_w1/_w2)
// und den gemeinsamen "durchgehend"-Schlüsseln (wg_w1/wg_w2), damit beim Umschalten
// nichts unsichtbar wird. W1 und W2 bleiben dabei bewusst voneinander getrennt.
function migrateWiderlagerDurchgehend(turningOn){
  var allUgr=W_UGR_BETON.concat(W_UGR_MAUERWERK).filter(function(v,i,a){return a.indexOf(v)===i;});
  var movedTotal=0;
  if(turningOn){
    // getrennt -> durchgehend: alle STB-Widerlager je Seite (W1 bzw. W2) in die gemeinsamen wg_-Keys zusammenführen.
    // Jeder Eintrag wird dabei mit seinem Herkunfts-STB markiert (__origStb), damit er beim
    // späteren Trennen wieder an die richtige Stelle zurückkommt, statt pauschal im ersten STB zu landen.
    // W1 und W2 bleiben dabei bewusst getrennt voneinander.
    function mergeSide(side){
      stbs.forEach(function(stb){
        var fromKey='stb'+stb.id+'_'+side,toKey='wg_'+side;
        allUgr.forEach(function(u){
          var fromFull=fromKey+'___'+u,toFull=toKey+'___'+u;
          var items=dat[fromFull];
          if(items&&items.length){
            items.forEach(function(it){if(it.__origStb==null)it.__origStb=stb.id;});
            dat[toFull]=(dat[toFull]||[]).concat(items);
            movedTotal+=items.length;
            delete dat[fromFull];
          }
        });
      });
      if(!dat['__t_wg_'+side]){
        var t=stbs.map(function(s){return dat['__t_stb'+s.id+'_'+side];}).filter(Boolean)[0];
        if(t)dat['__t_wg_'+side]=t;
      }
    }
    mergeSide('w1');mergeSide('w2');
  } else {
    // durchgehend -> getrennt: jeder Eintrag geht zurück an seinen markierten Herkunfts-STB
    // (__origStb). Existiert dieser STB nicht mehr (gelöscht) oder ist der Eintrag neu
    // entstanden, während "durchgehend" aktiv war (keine Markierung), landet er ersatzweise
    // beim ersten STB — das ist dann die bestmögliche, verlustfreie Zuordnung.
    if(stbs.length){
      var validIds={};stbs.forEach(function(s){validIds[s.id]=true;});
      var firstId=stbs[0].id;
      function splitSide(side){
        var fromKey='wg_'+side;
        allUgr.forEach(function(u){
          var fromFull=fromKey+'___'+u;
          var items=dat[fromFull];
          if(items&&items.length){
            items.forEach(function(it){
              var targetId=(it.__origStb!=null&&validIds[it.__origStb])?it.__origStb:firstId;
              var toFull='stb'+targetId+'_'+side+'___'+u;
              dat[toFull]=(dat[toFull]||[]);
              dat[toFull].push(it);
              movedTotal++;
            });
            delete dat[fromFull];
          }
        });
        if(dat['__t_wg_'+side]){
          stbs.forEach(function(s){
            var k='stb'+s.id+'_'+side;
            if(!dat['__t_'+k])dat['__t_'+k]=dat['__t_wg_'+side];
          });
        }
      }
      splitSide('w1');splitSide('w2');
    }
  }
  return movedTotal;
}

// Konsistenz-Selbstcheck für dat[] — rein lesend, verändert nichts. Sucht gezielt nach
// Mustern, die schon zu echten Bugs geführt haben (z.B. der Beide+Bearbeiten-Datenverlust
// vom 12.07.2026): kaputte Schlüssel, Schäden ohne gesetzten Bauwerkstyp (dadurch in der
// Navigation unsichtbar, obwohl noch in dat[] vorhanden), leere Beschreibungen. Gedacht
// zum Aufruf aus der Testdatei (tests_karten_app.py) nach komplexen Abläufen, damit
// künftige Kombinations-Bugs in genau dieser Kategorie automatisch auffallen, statt erst
// beim manuellen Testen entdeckt zu werden.
function validateDatConsistency(){
  var issues=[];
  Object.keys(dat).forEach(function(key){
    if(key.indexOf('__')===0)return; // Zusatz-Schlüssel wie __t_..., __durchgehendW usw.
    var sepIdx=key.indexOf('___');
    if(sepIdx===-1){
      issues.push({type:'malformed_key',key:key,detail:'kein "___"-Trenner gefunden'});
      return;
    }
    var arr=dat[key];
    if(!Array.isArray(arr)){
      issues.push({type:'not_an_array',key:key,detail:typeof arr});
      return;
    }
    if(!arr.length)return;
    var baseKey=key.slice(0,sepIdx);
    var hatTyp=!!dat['__t_'+baseKey];
    arr.forEach(function(entry,idx){
      if(!hatTyp){
        issues.push({type:'missing_typ',key:key,idx:idx,detail:'Bauwerkstyp für "'+baseKey+'" nicht gesetzt — Eintrag ist in der Navigation unsichtbar'});
      }
      if(!entry||!entry.d||!entry.d.trim()){
        issues.push({type:'empty_description',key:key,idx:idx});
      }
    });
  });
  return issues;
}

// WICHTIG: Schlüssel-Konstruktion (bauteilKey+'___'+ugr) muss exakt mit saveS()
// und render()/mkKa() übereinstimmen — siehe DATENSCHEMA-Kommentar weiter oben.
function collectAllSchaeden(){
  var out=[];
  if(isDurchgehendW()){
    [{k:'wg_w1',l:'Widerlager 1 (durchgehend)',u:getUgr('wg_w1')},{k:'wg_w2',l:'Widerlager 2 (durchgehend)',u:getUgr('wg_w2')}].forEach(function(b){
      b.u.forEach(function(u){
        var items=dat[b.k+'___'+u]||[];
        items.forEach(function(it,idx){
          out.push({key:b.k,ugr:u,bereich:b.l,idx:idx,item:it});
        });
      });
    });
  }
  stbs.forEach(function(stb,si){
    var stbLbl='STB '+(si+1);
    var bases=isDurchgehendW()?[]:[{k:'stb'+stb.id+'_w1',l:'Widerlager 1',u:getUgr('stb'+stb.id+'_w1')}];
    for(var i=1;i<=stb.oeff;i++){
      var ok='stb'+stb.id+'_oe'+i;
      var extraU=['Geländer links','Geländer rechts'];
      LAGER_TYPES.forEach(function(t){extraU.push('Lager: '+t);(LAGER_BAUTEILE[t]||[]).forEach(function(teil){extraU.push('Lager: '+t+' - '+teil);});});
      FUGEN_TYPES.forEach(function(t){extraU.push('Fugen: '+t);});
      bases.push({k:ok,l:'Öffnung '+i,u:getUgr(ok).concat(extraU)});
      if(i<stb.oeff)bases.push({k:'stb'+stb.id+'_pf'+i,l:'Pfeiler '+i,u:PF_UGR});
    }
    if(!isDurchgehendW())bases.push({k:'stb'+stb.id+'_w2',l:'Widerlager 2',u:getUgr('stb'+stb.id+'_w2')});
    bases.forEach(function(b){
      b.u.forEach(function(u){
        var items=dat[b.k+'___'+u]||[];
        items.forEach(function(it,idx){
          out.push({key:b.k,ugr:u,bereich:stbLbl+' / '+b.l,idx:idx,item:it});
        });
      });
    });
  });
  // Fortlaufende Nummer über das gesamte Bauwerk (für Gesamtschäden-Übersicht und
  // Referenzierung, z.B. im Bericht) — Reihenfolge entspricht der Anzeige.
  out.forEach(function(entry,gi){entry.num=gi+1;});
  return out;
}

// Gesamtschäden ist bewusst eine reine Übersicht ohne eigene Filter/Suche: gezielt an
// einem Bauteil weiterarbeiten (Schaden hinzufügen, "Auf anderes Widerlager übernehmen"
// usw.) geht über den vorhandenen "← zurück zum Schaden"-Link je Eintrag, der direkt in
// die normale (voll funktionsfähige) Schadensliste dieses Bauteils springt. Das hält
// diese Übersicht einfach und ohne eigenen Zusatz-Zustand.
function openGesamtschaeden(){
  if(!stbs.length){toast('Noch kein Bauwerk angelegt');return;}
  var list=collectAllSchaeden();
  var box=g('gesamtList');box.innerHTML='';
  if(!list.length){
    box.innerHTML='<p style="color:var(--faint);font-size:13px;padding:10px;">Keine Schäden erfasst</p>';
    showPanel('ovGesamt');
    return;
  }
  box.innerHTML='<p style="color:var(--acc);font-size:19px;font-weight:800;padding:2px 0 12px;">'+list.length+' Schaden(-Einträge) insgesamt</p>';

  // Nach Bauteil (bereich) gruppieren, Reihenfolge des ersten Auftretens beibehalten
  // (entspricht bereits W1 → Öffnungen/Pfeiler → W2 je STB, siehe collectAllSchaeden)
  var groups=[],groupIdx={};
  list.forEach(function(entry){
    if(!(entry.bereich in groupIdx)){
      groupIdx[entry.bereich]=groups.length;
      groups.push({bereich:entry.bereich,entries:[]});
    }
    groups[groupIdx[entry.bereich]].entries.push(entry);
  });

  groups.forEach(function(grp,gi){
    var gbau=document.createElement('div');gbau.className='gbau';
    var hdr=document.createElement('div');hdr.className='gbau-hdr';
    var gt=document.createElement('span');gt.className='gt';
    gt.appendChild(document.createTextNode(grp.bereich));
    var garr=document.createElement('span');garr.className='garr';garr.textContent='▶';
    gt.appendChild(garr);
    var gc=document.createElement('span');gc.className='gc';gc.textContent='Schäden: '+grp.entries.length;
    var picCount=grp.entries.reduce(function(sum,en){return sum+((en.item.fotos||[]).length);},0);
    var gpics=document.createElement('span');gpics.className='gc';gpics.style.cssText='margin-left:6px;background:var(--soft);';gpics.textContent='Bilder: '+picCount;
    var gdel=document.createElement('button');gdel.textContent='🗑';gdel.className='dx';
    gdel.style.cssText='margin-left:8px;background:#ffebee;color:#c62828;';
    (function(g2){gdel.onclick=function(e){
      e.stopPropagation();
      if(!confirm('Alle '+g2.entries.length+' Schäden unter „'+g2.bereich+'" wirklich löschen? (inkl. Fotos, nicht rückgängig zu machen)'))return;
      var seen={};
      g2.entries.forEach(function(en){
        var k=en.key+'___'+en.ugr;
        if(!seen[k]){seen[k]=true;delete dat[k];}
      });
      render();autoSave();
      openGesamtschaeden();
    };})(grp);
    var gright=document.createElement('span');gright.style.cssText='display:flex;align-items:center;';
    gright.appendChild(gc);gright.appendChild(gpics);gright.appendChild(gdel);
    hdr.appendChild(gt);hdr.appendChild(gright);
