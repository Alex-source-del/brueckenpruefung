name: Karten-App Tests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Playwright installieren
        run: |
          pip install playwright --break-system-packages || pip install playwright
          playwright install --with-deps chromium

      - name: Beta-App testen
        run: python3 tests_karten_app.py "Brückenprüfung_Karten-1_BETA_Final.html"
