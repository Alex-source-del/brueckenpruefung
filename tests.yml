name: Karten-App Tests

# Läuft automatisch bei jedem Push (z.B. nach dem Hochladen einer neuen Beta-Version über
# die GitHub-Mobile-Oberfläche) und kann zusätzlich manuell über den "Actions"-Tab in
# GitHub gestartet werden ("Run workflow"-Knopf).
on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Playwright installieren
        run: |
          pip install playwright --break-system-packages || pip install playwright
          playwright install --with-deps chromium

      - name: Beta-App testen (falls vorhanden)
        if: hashFiles('Brückenprüfung_Karten-1_BETA_Final.html') != ''
        run: python3 tests_karten_app.py "Brückenprüfung_Karten-1_BETA_Final.html"

      # Hinweis: Die Produktiv-App (Brückenprüfung_Karten-1.html) wird hier bewusst NICHT
      # mitgetestet. Die Testdatei prüft aktuell auch Beta-exklusive Funktionen (z.B. die
      # "Beide"-Option, die zweispaltige Schadensart-Liste), die erst nach Freigabe durch
      # Andreas in die Produktiv-App übernommen werden. Ein Test gegen die Produktiv-App
      # würde deshalb fälschlich fehlschlagen, solange dort noch der ältere Stand liegt.
